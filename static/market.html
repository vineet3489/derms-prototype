<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>L&T Neural Grid Platform — Flexibility Energy Market</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --lt-red: #C8202F;
    --lt-navy: #1E3A5F;
    --lt-navy-light: #264a77;
    --bg: #070C18;
    --bg2: #0D1525;
    --bg3: #111d35;
    --border: #1e2e4a;
    --text: #e2e8f0;
    --muted: #7a8fab;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --cyan: #06b6d4;
    --purple: #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  #sidebar {
    width: 240px; min-width: 240px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .logo-area {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-lt {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .logo-lt svg { width: 42px; height: 42px; }
  .logo-name { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.2; }
  .logo-sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }
  .logo-badge {
    display: inline-block; background: var(--lt-red); color: #fff;
    font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
    letter-spacing: 0.08em; margin-top: 4px;
  }
  nav { flex: 1; overflow-y: auto; padding: 10px 0; }
  .nav-section { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.12em; padding: 10px 18px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 18px;
    cursor: pointer; font-size: 13px; color: var(--muted); border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-item.active { color: #fff; background: rgba(200,32,47,0.12); border-left-color: var(--lt-red); font-weight: 600; }
  .nav-icon { width: 18px; text-align: center; font-size: 15px; }
  .sidebar-footer {
    padding: 14px 18px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted); line-height: 1.6;
  }

  /* ── Main ── */
  #main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 28px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 600; color: #fff; }
  .topbar-meta { font-size: 12px; color: var(--muted); }
  .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .page { padding: 24px 28px; flex: 1; }

  /* ── Cards ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .card-sm { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .card-val { font-size: 28px; font-weight: 700; color: #fff; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── KPI Grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .kpi-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: #fff; }
  .kpi-unit  { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .kpi-note  { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .kpi-accent-red   { border-top: 3px solid var(--lt-red); }
  .kpi-accent-navy  { border-top: 3px solid var(--cyan); }
  .kpi-accent-green { border-top: 3px solid var(--green); }
  .kpi-accent-amber { border-top: 3px solid var(--amber); }
  .kpi-accent-purple{ border-top: 3px solid var(--purple); }

  /* ── Grid Layout ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .col-span-2 { grid-column: span 2; }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 8px 12px; background: var(--bg3); color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.025); }

  /* ── Badges ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-green  { background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge-amber  { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-red    { background: rgba(239,68,68,0.15);  color: var(--red); }
  .badge-blue   { background: rgba(6,182,212,0.12);  color: var(--cyan); }
  .badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
  .badge-navy   { background: rgba(30,58,95,0.5);    color: #93c5fd; }

  /* ── Buttons ── */
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.15s; }
  .btn-primary  { background: var(--lt-red); color: #fff; }
  .btn-primary:hover { background: #a81827; }
  .btn-secondary{ background: var(--lt-navy); color: #fff; }
  .btn-secondary:hover { background: var(--lt-navy-light); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Forms ── */
  .form-group { margin-bottom: 12px; }
  .form-label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .form-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 12px;
  }
  .form-input:focus { outline: none; border-color: var(--lt-red); }
  select.form-input option { background: var(--bg3); }

  /* ── Charts (CSS bars) ── */
  .bar-track { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.6s; }
  .bar-red   { background: var(--lt-red); }
  .bar-green { background: var(--green); }
  .bar-cyan  { background: var(--cyan); }
  .bar-amber { background: var(--amber); }

  /* ── Forecast chart ── */
  .chart-area { position: relative; height: 180px; margin-top: 12px; }
  .chart-svg  { width: 100%; height: 100%; }

  /* ── Merit order ── */
  .merit-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 11px; }
  .merit-bar-label { width: 120px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .merit-bar-track { flex: 1; background: var(--bg3); border-radius: 3px; height: 18px; overflow: hidden; position: relative; }
  .merit-bar-fill  { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.85); transition: width 0.6s; }
  .merit-bar-price { width: 60px; text-align: right; color: var(--muted); }
  .mcp-line { border-top: 2px dashed var(--lt-red); margin: 10px 0; position: relative; }
  .mcp-label { position: absolute; right: 0; top: -18px; font-size: 10px; color: var(--lt-red); font-weight: 700; background: var(--bg2); padding: 0 4px; }

  /* ── Energy flow SVG ── */
  .flow-container { background: var(--bg3); border-radius: 12px; padding: 20px; overflow: auto; }

  /* ── Glossary ── */
  .glossary-item { border-bottom: 1px solid var(--border); padding: 14px 0; }
  .glossary-item:last-child { border-bottom: none; }
  .glossary-term { font-weight: 700; color: var(--cyan); font-size: 13px; margin-bottom: 4px; }
  .glossary-formula { background: var(--bg3); border-left: 3px solid var(--lt-red); padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 12px; color: #fbbf24; margin: 6px 0; border-radius: 0 6px 6px 0; }
  .glossary-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* ── Integration ── */
  .proto-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .proto-name { font-weight: 700; color: #fff; font-size: 13px; margin-bottom: 6px; }
  .proto-row  { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .proto-chip { background: rgba(255,255,255,0.06); border-radius: 4px; padding: 3px 8px; font-size: 10px; color: var(--muted); }
  .proto-chip b { color: var(--text); }

  /* ── Config table ── */
  .config-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .config-table th { background: var(--bg3); color: var(--muted); font-size: 10px; padding: 8px 12px; text-align: left; text-transform: uppercase; letter-spacing: 0.06em; }
  .config-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .config-table tr:last-child td { border-bottom: none; }
  .config-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 4px 8px; font-size: 12px; width: 140px; }
  .config-input:focus { outline: none; border-color: var(--lt-red); }

  /* ── Settlement ── */
  .settlement-formula { background: var(--bg3); border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; color: #fbbf24; line-height: 1.9; }

  /* ── Login ── */
  .login-root { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
  .login-header { text-align: center; margin-bottom: 36px; }
  .login-header h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .login-header p  { font-size: 13px; color: var(--muted); }
  .login-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 720px; }
  .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; cursor: pointer; transition: 0.2s; }
  .login-card:hover { border-color: var(--lt-red); box-shadow: 0 0 0 1px var(--lt-red); }
  .login-card.selected { border-color: var(--lt-red); box-shadow: 0 0 0 2px var(--lt-red); }
  .login-card-icon { font-size: 36px; margin-bottom: 12px; }
  .login-card-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .login-card-sub { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
  .login-card-features { list-style: none; padding: 0; margin: 0 0 20px; }
  .login-card-features li { font-size: 11px; color: var(--muted); padding: 3px 0; }
  .login-card-features li::before { content: "✓ "; color: var(--green); }
  .login-form { margin-top: 4px; }
  .login-demo { font-size: 10px; color: var(--muted); margin-bottom: 4px; background: var(--bg3); padding: 4px 8px; border-radius: 4px; font-family: monospace; }
  .login-error { font-size: 11px; color: var(--red); margin-top: 8px; text-align: center; }
  .login-footer { margin-top: 28px; font-size: 11px; color: var(--muted); text-align: center; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab  { padding: 8px 16px; font-size: 12px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: 0.15s; }
  .tab:hover  { color: var(--text); }
  .tab.active { color: #fff; border-bottom-color: var(--lt-red); font-weight: 600; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Misc ── */
  .section-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .divider { border-top: 1px solid var(--border); margin: 20px 0; }
  .text-muted { color: var(--muted); }
  .text-green { color: var(--green); }
  .text-red   { color: var(--lt-red); }
  .text-amber { color: var(--amber); }
  .text-cyan  { color: var(--cyan); }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .gap-8  { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mt-8  { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--lt-red); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Alert banner ── */
  .alert { padding: 10px 16px; border-radius: 7px; font-size: 12px; margin-bottom: 14px; }
  .alert-info   { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.3); color: var(--cyan); }
  .alert-success{ background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .alert-warn   { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); }
  .alert-error  { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── API ────────────────────────────────────────────────────────────────────
const BASE = "";
async function api(path, opts={}) {
  const r = await fetch(BASE + path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.statusText); }
  return r.json();
}

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = (n, d=1) => n == null ? "—" : Number(n).toFixed(d);
const fmtMoney = (n) => n == null ? "—" : `$${Number(n).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})}`;
const perf_color = pct => pct >= 95 ? "text-green" : pct >= 90 ? "text-amber" : "text-red";

// ── SVG Logo ────────────────────────────────────────────────────────────────
function LTLogo() {
  return (
    <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="42" height="42" rx="8" fill="#C8202F"/>
      <text x="21" y="28" textAnchor="middle" fill="white" fontSize="18" fontWeight="900" fontFamily="Arial Black, sans-serif">L&T</text>
    </svg>
  );
}

// ── Sidebar ────────────────────────────────────────────────────────────────

// ── Dashboard ──────────────────────────────────────────────────────────────
function DashboardScreen() {
  const [status, setStatus] = useState(null);
  const [aggs, setAggs] = useState([]);
  const [forecast, setForecast] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = () => {
    Promise.all([
      api("/api/market/status"),
      api("/api/market/aggregators").then(d => d.aggregators),
      api("/api/market/forecast").then(d => d.hourly),
    ]).then(([s, a, f]) => { setStatus(s); setAggs(a); setForecast(f); setLoading(false); })
     .catch(() => setLoading(false));
  };
  useEffect(() => { load(); const t = setInterval(load, 30000); return () => clearInterval(t); }, []);

  if (loading) return <div className="page flex-center" style={{justifyContent:"center",height:"60vh"}}><div className="spinner"/></div>;
  if (!status) return <div className="page"><div className="alert alert-error">Failed to load market status.</div></div>;

  const totalCap = aggs.reduce((s,a)=>s+a.capacity_mw,0);
  const totalDers = aggs.reduce((s,a)=>s+a.ders,0);

  // Mini sparkline for forecast
  const hours = forecast.slice(0,24);
  const maxD = Math.max(...hours.map(h=>h.forecast_mw||0), 1);
  const pts = (arr, key) => arr.map((h,i) => `${(i/23*100).toFixed(1)},${(100 - (h[key]||0)/maxD*100).toFixed(1)}`).join(" ");

  return (
    <div className="page">
      <div className="kpi-grid">
        <div className="kpi kpi-accent-red">
          <div className="kpi-label">Total Portfolio</div>
          <div className="kpi-value">{fmt(status.total_portfolio_mw,1)}<span className="kpi-unit">MW</span></div>
          <div className="kpi-note">Available flexibility</div>
        </div>
        <div className="kpi kpi-accent-navy">
          <div className="kpi-label">Aggregators</div>
          <div className="kpi-value">{status.active_aggregators}<span className="kpi-unit">local</span></div>
          <div className="kpi-note">3 feeders · Varanasi</div>
        </div>
        <div className="kpi kpi-accent-green">
          <div className="kpi-label">Active DERs</div>
          <div className="kpi-value">{status.total_der_count}</div>
          <div className="kpi-note">Across all portfolios</div>
        </div>
        <div className="kpi kpi-accent-amber">
          <div className="kpi-label">Base Rate</div>
          <div className="kpi-value">$85<span className="kpi-unit">/MWh</span></div>
          <div className="kpi-note">+ $35 incentive</div>
        </div>
        <div className="kpi kpi-accent-purple">
          <div className="kpi-label">Open Volume</div>
          <div className="kpi-value">{fmt(status.open_volume_mw,0)}<span className="kpi-unit">MW</span></div>
          <div className="kpi-note">Pending procurement</div>
        </div>
        <div className="kpi kpi-accent-red">
          <div className="kpi-label">Events Active</div>
          <div className="kpi-value">{(status.open_events||0)+(status.cleared_events||0)}<span className="kpi-unit">events</span></div>
          <div className="kpi-note">Open + cleared</div>
        </div>
      </div>

      <div className="grid-2" style={{gap:18}}>
        {/* Forecast */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">24h Demand & Flexibility Forecast</span>
            <span className="badge badge-blue">Live</span>
          </div>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width:"100%",height:160,display:"block"}}>
            <defs>
              <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#C8202F" stopOpacity="0.4"/>
                <stop offset="100%" stopColor="#C8202F" stopOpacity="0"/>
              </linearGradient>
              <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#22c55e" stopOpacity="0.3"/>
                <stop offset="100%" stopColor="#22c55e" stopOpacity="0"/>
              </linearGradient>
            </defs>
            {hours.length>1 && <>
              <polygon points={`0,100 ${pts(hours,"forecast_mw")} 100,100`} fill="url(#gd)"/>
              <polyline points={pts(hours,"forecast_mw")} fill="none" stroke="#C8202F" strokeWidth="1.5"/>
              <polygon points={`0,100 ${pts(hours,"renewable_mw")} 100,100`} fill="url(#gr)"/>
              <polyline points={pts(hours,"renewable_mw")} fill="none" stroke="#22c55e" strokeWidth="1" strokeDasharray="3,2"/>
            </>}
          </svg>
          <div className="flex gap-12 mt-8" style={{fontSize:11}}>
            <span style={{color:"#C8202F"}}>&#9644; Demand</span>
            <span style={{color:"#22c55e"}}>&#9644;&#9644; Renewable</span>
          </div>
        </div>

        {/* Aggregator portfolio */}
        <div className="card">
          <div className="card-header"><span className="card-title">Aggregator Portfolios</span></div>
          {aggs.map(a => (
            <div key={a.id} style={{marginBottom:12}}>
              <div className="flex-center gap-8" style={{justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12}}>{a.flag} {a.name}</span>
                <span style={{fontSize:11,color:"var(--muted)"}}>{fmt(a.capacity_mw,0)} MW · {a.ders} DERs</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill bar-cyan" style={{width:`${(a.capacity_mw/totalCap*100).toFixed(0)}%`}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Performance table */}
      <div className="card mt-20">
        <div className="card-header">
          <span className="card-title">Aggregator Performance Summary</span>
          <span className="text-muted" style={{fontSize:11}}>Last 30 days</span>
        </div>
        <table>
          <thead><tr><th>Aggregator</th><th>Region</th><th>Portfolio</th><th>Capacity</th><th>Avg Performance</th><th>Earnings (USD)</th><th>Status</th></tr></thead>
          <tbody>
            {aggs.map(a => (
              <tr key={a.id}>
                <td><span style={{fontWeight:600}}>{a.flag} {a.name}</span><br/><span className="text-muted" style={{fontSize:10}}>{a.id}</span></td>
                <td><span className="badge badge-navy">{a.region}</span></td>
                <td style={{color:"var(--muted)"}}>{a.portfolio}</td>
                <td>{fmt(a.capacity_mw,0)} MW</td>
                <td><span className={perf_color(a.avg_performance_pct)}>{fmt(a.avg_performance_pct,1)}%</span></td>
                <td className="text-green">{fmtMoney(a.total_earned_usd)}</td>
                <td><span className={`badge badge-${a.status==="Active"?"green":"amber"}`}>{a.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Utility Portal ─────────────────────────────────────────────────────────
function UtilityPortalScreen() {
  const [events, setEvents] = useState([]);
  const [forecast, setForecast] = useState([]);
  const [form, setForm] = useState({ procurement_mw: 50, duration_h: 0.5, max_price_usd_per_mwh: 120, type: "Emergency DR" });
  const [msg, setMsg] = useState(null);
  const [busy, setBusy] = useState(false);

  const load = () => {
    api("/api/market/events").then(d => setEvents(d.events));
    api("/api/market/forecast").then(d => setForecast(d.hourly));
  };
  useEffect(() => { load(); }, []);

  const publish = async () => {
    setBusy(true); setMsg(null);
    try {
      await api("/api/market/events", { method:"POST", body: JSON.stringify(form) });
      setMsg({ type:"success", text: "Procurement event published. Aggregators notified via OpenADR 2.0b." });
      load();
    } catch(e) { setMsg({ type:"error", text: e.message }); }
    finally { setBusy(false); }
  };

  const hours = forecast.slice(0,24);
  const maxD = Math.max(...hours.map(h=>h.forecast_mw||0), 1);
  const pts = (arr, key) => arr.map((h,i) => `${(i/23*100).toFixed(1)},${(100-(h[key]||0)/maxD*100).toFixed(1)}`).join(" ");

  const shortfallHours = hours.filter(h => (h.shortfall_mw||0) > 0);

  return (
    <div className="page">
      <div className="section-title">⚡ Utility Operations Portal</div>
      {shortfallHours.length > 0 && (
        <div className="alert alert-warn">
          ⚠️ Forecast shows shortfall in {shortfallHours.length} hours. Peak shortfall: {fmt(Math.max(...shortfallHours.map(h=>h.shortfall_mw)),1)} MW. Consider publishing procurement event.
        </div>
      )}

      <div className="grid-2 mb-20">
        {/* Forecast chart */}
        <div className="card col-span-2">
          <div className="card-header">
            <span className="card-title">System Load Forecast vs Baseline vs Flexibility</span>
            <span className="badge badge-blue">24h Outlook</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <svg viewBox="0 0 700 160" style={{width:"100%",minWidth:400,height:160}}>
              <defs>
                <linearGradient id="gdem" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#C8202F" stopOpacity="0.35"/>
                  <stop offset="100%" stopColor="#C8202F" stopOpacity="0"/>
                </linearGradient>
              </defs>
              {hours.length>1 && <>
                <polygon points={`0,160 ${hours.map((h,i)=>`${i/23*700},${160-(h.forecast_mw||0)/maxD*140}`).join(" ")} 700,160`} fill="url(#gdem)"/>
                <polyline points={hours.map((h,i)=>`${i/23*700},${160-(h.forecast_mw||0)/maxD*140}`).join(" ")} fill="none" stroke="#C8202F" strokeWidth="2"/>
                <polyline points={hours.map((h,i)=>`${i/23*700},${160-(h.baseline_mw||0)/maxD*140}`).join(" ")} fill="none" stroke="#8b5cf6" strokeWidth="1.5" strokeDasharray="4,3"/>
                <polyline points={hours.map((h,i)=>`${i/23*700},${160-(h.renewable_mw||0)/maxD*140}`).join(" ")} fill="none" stroke="#22c55e" strokeWidth="1.5"/>
                {/* Shortfall shading */}
                {hours.map((h,i) => h.shortfall_mw>0 ? (
                  <rect key={i} x={i/23*700-10} y={0} width={30} height={160} fill="rgba(245,158,11,0.08)"/>
                ) : null)}
                {/* Hour labels */}
                {[0,4,8,12,16,20,23].map(i => (
                  <text key={i} x={i/23*700} y={158} fontSize="9" fill="#7a8fab" textAnchor="middle">{String(i).padStart(2,"0")}:00</text>
                ))}
              </>}
            </svg>
          </div>
          <div className="flex gap-12 mt-8" style={{fontSize:11}}>
            <span style={{color:"#C8202F"}}>&#9644; Demand</span>
            <span style={{color:"#8b5cf6"}}>&#9648; Baseline</span>
            <span style={{color:"#22c55e"}}>&#9644; Renewable</span>
            <span style={{color:"var(--amber)"}}>&#9647; Shortfall hours</span>
          </div>
        </div>
      </div>

      <div className="grid-2">
        {/* Publish event form */}
        <div className="card">
          <div className="card-header"><span className="card-title">Publish Procurement Event</span></div>
          {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}
          <div className="form-group">
            <label className="form-label">Event Type</label>
            <select className="form-input" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
              <option>Emergency DR</option>
              <option>Economic DR</option>
              <option>Peak Shaving</option>
              <option>Frequency Response</option>
              <option>Ancillary Services</option>
              <option>Capacity Market</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Required Flexibility (MW)</label>
            <input type="number" className="form-input" value={form.procurement_mw} onChange={e=>setForm(f=>({...f,procurement_mw:+e.target.value}))}/>
          </div>
          <div className="form-group">
            <label className="form-label">Duration (hours)</label>
            <input type="number" className="form-input" step="0.5" value={form.duration_h} onChange={e=>setForm(f=>({...f,duration_h:+e.target.value}))}/>
          </div>
          <div className="form-group">
            <label className="form-label">Price Ceiling (USD/MWh)</label>
            <input type="number" className="form-input" value={form.max_price_usd_per_mwh} onChange={e=>setForm(f=>({...f,max_price_usd_per_mwh:+e.target.value}))}/>
          </div>
          <div className="alert alert-info" style={{fontSize:11}}>
            Signal: OpenADR 2.0b → IEEE 2030.5 DERControls dispatched to each aggregator's DER portfolio.
          </div>
          <button className="btn btn-primary" style={{width:"100%",marginTop:4}} onClick={publish} disabled={busy}>
            {busy ? <><span className="spinner"/></> : "📡 Publish to Market"}
          </button>
        </div>

        {/* Recent events */}
        <div className="card">
          <div className="card-header"><span className="card-title">Recent Procurement Events</span></div>
          <table>
            <thead><tr><th>ID</th><th>Type</th><th>MW</th><th>Price Cap</th><th>Status</th></tr></thead>
            <tbody>
              {events.slice(0,8).map(e => (
                <tr key={e.event_id}>
                  <td style={{fontFamily:"monospace",fontSize:10}}>{e.event_id}</td>
                  <td>{e.type}</td>
                  <td>{fmt(e.procurement_mw,0)}</td>
                  <td>${fmt(e.max_price_usd_per_mwh,0)}</td>
                  <td><span className={`badge badge-${e.status==="Settled"?"green":e.status==="Cleared"?"blue":"amber"}`}>{e.status}</span></td>
                </tr>
              ))}
              {events.length===0 && <tr><td colSpan={5} style={{textAlign:"center",color:"var(--muted)",padding:20}}>No events yet</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Aggregator Portal ────────────────────────────────────────────────────────
function AggregatorScreen() {
  const [aggs, setAggs]     = useState([]);
  const [selAgg, setSelAgg] = useState(null);
  const [events, setEvents] = useState([]);
  const [bids, setBids]     = useState([]);
  const [merit, setMerit]   = useState(null);
  const [selEvent, setSelEvent] = useState(null);
  const [settlements, setSettlements] = useState([]);
  const [tab, setTab]       = useState("portfolio");
  const [form, setForm]     = useState({ quantity_mw: 10, price_usd_per_mwh: 80 });
  const [msg, setMsg]       = useState(null);
  const [submitting, setSubmitting] = useState(false);

  // Local DER fleet (matches Varanasi pilot topology)
  const DER_FLEET = [
    {id:"DER-1", type:"Solar PV", location:"Sigra",      feeder:"FDR-01", kw:25,  status:"Online",   cuf:72, soc:null},
    {id:"DER-2", type:"Solar PV", location:"Lanka",      feeder:"FDR-01", kw:30,  status:"Online",   cuf:68, soc:null},
    {id:"DER-3", type:"BESS",     location:"Bhelupur",   feeder:"FDR-02", kw:20,  status:"Online",   cuf:null, soc:78},
    {id:"DER-4", type:"Solar PV", location:"Cantonment", feeder:"FDR-02", kw:15,  status:"Curtailed",cuf:45, soc:null},
    {id:"DER-5", type:"Solar PV", location:"Sarnath",    feeder:"FDR-03", kw:18,  status:"Online",   cuf:65, soc:null},
    {id:"DER-6", type:"BESS",     location:"Nadesar",    feeder:"FDR-03", kw:12,  status:"Online",   cuf:null, soc:62},
  ];
  const totalCap   = DER_FLEET.reduce((s,d)=>s+d.kw, 0);
  const onlineCount= DER_FLEET.filter(d=>d.status==="Online").length;
  const currentGen = DER_FLEET.filter(d=>d.type==="Solar PV" && d.status==="Online").reduce((s,d)=>s+d.kw*(d.cuf||0)/100,0);

  const load = () => {
    api("/api/market/aggregators").then(d => {
      const list = d.aggregators || [];
      setAggs(list);
      if (list.length && !selAgg) setSelAgg(list[0]);
    });
    api("/api/market/events").then(d => {
      const ev = d.events || [];
      setEvents(ev);
      if (ev.length && !selEvent) setSelEvent(ev[0].event_id);
    });
    api("/api/market/settlements").then(d => setSettlements(d.settlements || []));
  };
  useEffect(() => { load(); }, []);
  useEffect(() => {
    if (!selEvent) return;
    api(`/api/market/merit-order/${selEvent}`).then(setMerit);
    api(`/api/market/bids?event_id=${selEvent}`).then(d => setBids(d.bids || []));
  }, [selEvent]);

  const myBids = bids.filter(b => selAgg && b.aggregator_id === selAgg.id);
  const mySettlements = settlements.slice(0, 5);

  const submitBid = async () => {
    if (!selEvent || !selAgg) return;
    setSubmitting(true); setMsg(null);
    try {
      await api("/api/market/bids", { method:"POST", body: JSON.stringify({
        event_id: selEvent, aggregator_id: selAgg.id,
        quantity_mw: form.quantity_mw, price_usd_per_mwh: form.price_usd_per_mwh,
      })});
      setMsg({ type:"success", text:"Bid submitted. Awaiting merit-order clearing." });
      api(`/api/market/merit-order/${selEvent}`).then(setMerit);
      api(`/api/market/bids?event_id=${selEvent}`).then(d => setBids(d.bids||[]));
    } catch(e) { setMsg({ type:"error", text: e.message }); }
    finally { setSubmitting(false); }
  };

  const openEvents = events.filter(e => e.status === "Open");
  const totalEarned = mySettlements.reduce((s,x)=>s+(x.amount_usd||0),0);

  const TABS = [
    {id:"portfolio", label:"My Portfolio"},
    {id:"events",    label:`DR Events${openEvents.length ? ` (${openEvents.length})` : ""}`},
    {id:"bids",      label:"My Bids"},
    {id:"earnings",  label:"Earnings"},
  ];

  return (
    <div className="page">
      <div className="section-title">🏭 Aggregator Portal</div>

      {/* Aggregator selector */}
      <div className="flex-center gap-12 mb-16" style={{flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <label className="form-label" style={{margin:0}}>Acting as:</label>
          <select className="form-input" style={{maxWidth:260}} value={selAgg?.id||""} onChange={e=>setSelAgg(aggs.find(a=>a.id===e.target.value))}>
            {aggs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>
        {selAgg && (
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <span className="badge badge-green">Online</span>
            <span style={{fontSize:11,color:"var(--muted)"}}>IEEE 2030.5 · OpenADR 2.0b</span>
          </div>
        )}
      </div>

      {/* KPI row */}
      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",marginBottom:18}}>
        <div className="kpi kpi-accent-red">
          <div className="kpi-label">My DERs</div>
          <div className="kpi-value">{onlineCount}<span className="kpi-unit">/ {DER_FLEET.length}</span></div>
          <div className="kpi-note">online in Varanasi pilot</div>
        </div>
        <div className="kpi kpi-accent-navy">
          <div className="kpi-label">Enrolled Capacity</div>
          <div className="kpi-value">{totalCap}<span className="kpi-unit">kW</span></div>
          <div className="kpi-note">nameplate total</div>
        </div>
        <div className="kpi kpi-accent-green">
          <div className="kpi-label">Now Generating</div>
          <div className="kpi-value">{fmt(currentGen,1)}<span className="kpi-unit">kW</span></div>
          <div className="kpi-note">solar PV output</div>
        </div>
        <div className="kpi kpi-accent-amber">
          <div className="kpi-label">Open Events</div>
          <div className="kpi-value">{openEvents.length}</div>
          <div className="kpi-note">DR events to respond</div>
        </div>
        <div className="kpi kpi-accent-purple">
          <div className="kpi-label">Est. Earnings</div>
          <div className="kpi-value">${fmt(totalEarned,0)}</div>
          <div className="kpi-note">last settlements</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs mb-16">
        {TABS.map(t => (
          <div key={t.id} className={`tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</div>
        ))}
      </div>

      {msg && <div className={`alert alert-${msg.type} mb-12`}>{msg.text}</div>}

      {/* ── Tab: Portfolio ── */}
      {tab === "portfolio" && (
        <div>
          <div className="card mb-16">
            <div className="card-header"><span className="card-title">My DER Fleet — Varanasi Pilot</span></div>
            <table>
              <thead><tr><th>DER ID</th><th>Type</th><th>Location</th><th>Feeder</th><th>Capacity</th><th>Status</th><th>CUF / SoC</th></tr></thead>
              <tbody>
                {DER_FLEET.map(d => (
                  <tr key={d.id}>
                    <td style={{fontWeight:700}}>{d.id}</td>
                    <td>{d.type}</td>
                    <td style={{color:"var(--muted)"}}>{d.location}, Varanasi</td>
                    <td><span className="badge badge-navy">{d.feeder}</span></td>
                    <td>{d.kw} kW</td>
                    <td><span className={`badge badge-${d.status==="Online"?"green":d.status==="Curtailed"?"amber":"red"}`}>{d.status}</span></td>
                    <td style={{color:"var(--muted)"}}>
                      {d.type==="Solar PV" ? `CUF: ${d.cuf}%` : `SoC: ${d.soc}%`}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* DER capacity bar */}
          <div className="card">
            <div className="card-header"><span className="card-title">Portfolio Capacity Breakdown</span></div>
            {DER_FLEET.map(d => {
              const pct = d.type==="Solar PV" ? (d.cuf||0) : (d.soc||0);
              const color = d.status==="Online" ? "#22c55e" : d.status==="Curtailed" ? "#f59e0b" : "#ef4444";
              return (
                <div key={d.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span><b>{d.id}</b> — {d.type} · {d.location}</span>
                    <span style={{color:"var(--muted)"}}>{d.kw} kW · {d.type==="Solar PV"?`CUF ${d.cuf}%`:`SoC ${d.soc}%`}</span>
                  </div>
                  <div style={{height:8,background:"var(--bg3)",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:4,transition:"width 0.3s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Tab: DR Events ── */}
      {tab === "events" && (
        <div className="grid-2">
          <div className="card">
            <div className="card-header"><span className="card-title">Active DR Events from DVVNL</span></div>
            {events.length === 0 && <div className="text-muted" style={{padding:20,textAlign:"center"}}>No active events</div>}
            {events.slice(0,6).map(e => (
              <div key={e.event_id} style={{padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontWeight:700,fontSize:13}}>{e.type}</span>
                  <span className={`badge badge-${e.status==="Open"?"amber":e.status==="Cleared"?"blue":"green"}`}>{e.status}</span>
                </div>
                <div style={{fontSize:11,color:"var(--muted)"}}>
                  {fmt(e.procurement_mw,0)} MW needed · Price cap: ${fmt(e.max_price_usd_per_mwh,0)}/MWh · Duration: {e.duration_h}h
                </div>
                {e.status==="Open" && (
                  <button className="btn btn-primary btn-sm" style={{marginTop:8}}
                    onClick={()=>{ setSelEvent(e.event_id); setTab("bids"); }}>
                    Respond with Bid →
                  </button>
                )}
              </div>
            ))}
          </div>

          {/* Merit order for selected event */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">Merit Order</span>
              {merit && <span style={{fontSize:11,color:"var(--muted)"}}>MCP: <b style={{color:"var(--lt-red)"}}>${fmt(merit.mcp_usd_per_mwh,2)}/MWh</b></span>}
            </div>
            <div style={{marginBottom:10}}>
              <select className="form-input" value={selEvent||""} onChange={e=>setSelEvent(e.target.value)}>
                {events.map(e=><option key={e.event_id} value={e.event_id}>[{e.status}] {e.event_id}</option>)}
              </select>
            </div>
            {merit && merit.bids.length > 0 ? merit.bids.map((b,i) => {
              const isMine = selAgg && b.aggregator_id === selAgg.id;
              const maxMW = Math.max(...merit.bids.map(x=>x.quantity_mw),1);
              return (
                <div key={b.bid_id} className="merit-bar-row" style={isMine ? {background:"rgba(200,32,47,0.08)",borderRadius:4,padding:"2px 4px"} : {}}>
                  <div className="merit-bar-label" style={isMine?{color:"#fff",fontWeight:700}:{}}>{isMine ? "★ " : ""}{b.aggregator_name}</div>
                  <div className="merit-bar-track">
                    <div className="merit-bar-fill" style={{width:`${(b.quantity_mw/maxMW*100).toFixed(0)}%`,background:isMine?"#C8202F":"#264a77"}}>
                      {b.quantity_mw>=1&&<>{fmt(b.quantity_mw,1)}MW</>}
                    </div>
                  </div>
                  <div className="merit-bar-price">${fmt(b.price_usd_per_mwh,2)}</div>
                  <span className={`badge badge-${b.selected?"green":"amber"}`} style={{minWidth:60,textAlign:"center"}}>{b.selected?"✓ Won":"–"}</span>
                </div>
              );
            }) : <div className="text-muted" style={{textAlign:"center",padding:16}}>No bids yet for this event</div>}
          </div>
        </div>
      )}

      {/* ── Tab: My Bids ── */}
      {tab === "bids" && (
        <div className="grid-2">
          <div className="card">
            <div className="card-header"><span className="card-title">Submit Bid for DR Event</span></div>
            <div className="form-group">
              <label className="form-label">DR Event</label>
              <select className="form-input" value={selEvent||""} onChange={e=>setSelEvent(e.target.value)}>
                {events.filter(e=>e.status==="Open").map(e=><option key={e.event_id} value={e.event_id}>{e.event_id} — {e.type} · {fmt(e.procurement_mw,0)}MW</option>)}
                {events.filter(e=>e.status==="Open").length===0 && <option value="">No open events</option>}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Quantity to Offer (kW)</label>
              <input type="number" className="form-input" value={form.quantity_mw} min={0.1} max={totalCap/1000}
                onChange={e=>setForm(f=>({...f,quantity_mw:+e.target.value}))}/>
              <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>Available capacity: {fmt(totalCap,0)} kW ({fmt(totalCap/1000,2)} MW)</div>
            </div>
            <div className="form-group">
              <label className="form-label">Bid Price (₹/kWh)</label>
              <input type="number" className="form-input" value={form.price_usd_per_mwh} min={1}
                onChange={e=>setForm(f=>({...f,price_usd_per_mwh:+e.target.value}))}/>
            </div>
            <div className="alert alert-info" style={{fontSize:11}}>
              Base rate: <b>₹7/kWh</b>. Performance &gt;90%: +<b>₹3/kWh</b> incentive. Below threshold: <b>₹2/kWh</b> penalty per REMC rules.
            </div>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={submitBid}
              disabled={submitting || !selEvent || events.find(e=>e.event_id===selEvent)?.status!=="Open"}>
              {submitting ? "Submitting..." : "Submit Bid to L&T DERMS"}
            </button>
          </div>

          <div className="card">
            <div className="card-header"><span className="card-title">My Bid History</span></div>
            <div style={{marginBottom:10}}>
              <select className="form-input" value={selEvent||""} onChange={e=>setSelEvent(e.target.value)}>
                {events.map(e=><option key={e.event_id} value={e.event_id}>[{e.status}] {e.event_id}</option>)}
              </select>
            </div>
            <table>
              <thead><tr><th>Event</th><th>Qty (MW)</th><th>Price</th><th>Result</th></tr></thead>
              <tbody>
                {myBids.length > 0 ? myBids.map(b => (
                  <tr key={b.bid_id}>
                    <td style={{fontSize:10,fontFamily:"monospace"}}>{b.bid_id?.slice(-8)}</td>
                    <td>{fmt(b.quantity_mw,1)}</td>
                    <td>${fmt(b.price_usd_per_mwh,2)}</td>
                    <td><span className={`badge badge-${b.status==="Selected"?"green":b.status==="Rejected"?"red":"amber"}`}>{b.status}</span></td>
                  </tr>
                )) : (
                  <tr><td colSpan={4} style={{textAlign:"center",color:"var(--muted)",padding:20}}>
                    No bids submitted yet for this event
                  </td></tr>
                )}
              </tbody>
            </table>
            <div className="alert alert-info mt-12" style={{fontSize:11}}>
              Bids are submitted to L&T DERMS which runs merit-order clearing and notifies DVVNL/SLDC of awarded flexibility.
            </div>
          </div>
        </div>
      )}

      {/* ── Tab: Earnings ── */}
      {tab === "earnings" && (
        <div className="grid-2">
          <div className="card col-span-2">
            <div className="card-header">
              <span className="card-title">Settlement &amp; Earnings History</span>
              <span style={{fontSize:11,color:"var(--muted)"}}>REMC settlement · T+1 cycle</span>
            </div>
            <table>
              <thead><tr><th>Settlement ID</th><th>Period</th><th>Events</th><th>Energy (kWh)</th><th>Performance</th><th>Amount (₹)</th><th>Status</th></tr></thead>
              <tbody>
                {mySettlements.length > 0 ? mySettlements.map((s,i) => (
                  <tr key={i}>
                    <td style={{fontFamily:"monospace",fontSize:10}}>{s.settlement_id||`STL-${String(i+1).padStart(4,"0")}`}</td>
                    <td style={{color:"var(--muted)"}}>{s.period||"Mar 2026"}</td>
                    <td>{s.events_cleared||1}</td>
                    <td>{fmt(s.total_energy_kwh||s.energy_kwh||120,1)}</td>
                    <td><span style={{color: (s.performance_pct||92) >= 90 ? "var(--green)" : "var(--amber)"}}>{fmt(s.performance_pct||92,1)}%</span></td>
                    <td className="text-green">₹{fmt((s.amount_usd||s.amount||840)*83,0)}</td>
                    <td><span className={`badge badge-${s.status==="Paid"?"green":"amber"}`}>{s.status||"Paid"}</span></td>
                  </tr>
                )) : (
                  <tr><td colSpan={7} style={{textAlign:"center",color:"var(--muted)",padding:20}}>No settlements yet</td></tr>
                )}
              </tbody>
            </table>
          </div>

          <div className="card">
            <div className="card-header"><span className="card-title">Rate Card — REMC / DVVNL</span></div>
            <div style={{fontSize:12,lineHeight:2}}>
              {[
                ["Base DR rate",       "₹7.00 / kWh"],
                ["Performance bonus (>90%)", "₹3.00 / kWh"],
                ["Shortfall penalty",  "₹2.00 / kWh"],
                ["Settlement cycle",   "T+1 business day"],
                ["Metering",           "15-min AMI intervals"],
                ["Protocol",           "IEEE 2030.5 / OpenADR 2.0b"],
              ].map(([k,v]) => (
                <div key={k} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid var(--border)",padding:"4px 0"}}>
                  <span style={{color:"var(--muted)"}}>{k}</span>
                  <span style={{fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="card">
            <div className="card-header"><span className="card-title">My DER Performance</span></div>
            {DER_FLEET.filter(d=>d.type==="Solar PV").map(d => (
              <div key={d.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                  <span><b>{d.id}</b> · {d.location}</span>
                  <span style={{color:(d.cuf||0)>=60?"var(--green)":"var(--amber)"}}>{d.cuf}% CUF</span>
                </div>
                <div style={{height:6,background:"var(--bg3)",borderRadius:3}}>
                  <div style={{height:"100%",width:`${d.cuf}%`,background:(d.cuf||0)>=60?"#22c55e":"#f59e0b",borderRadius:3}}/>
                </div>
              </div>
            ))}
            {DER_FLEET.filter(d=>d.type==="BESS").map(d => (
              <div key={d.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                  <span><b>{d.id}</b> · BESS · {d.location}</span>
                  <span style={{color:"var(--cyan)"}}>{d.soc}% SoC</span>
                </div>
                <div style={{height:6,background:"var(--bg3)",borderRadius:3}}>
                  <div style={{height:"100%",width:`${d.soc}%`,background:"#06b6d4",borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

          <rect x={SUB_X} y={SUB_Y} width={SUB_W} height={SUB_H} rx="10"

            <rect x="0" y="0" width={W-16} height="46" rx="6" fill="#0d1525" stroke="#1e2e4a"/>

              {x:10,  color:"#22c55e", dash:"",     label:"Physical energy (DERs → local 33kV feeder → substation)"},

// ── Settlement ─────────────────────────────────────────────────────────────
function SettlementScreen() {
  const [settlements, setSettlements] = useState([]);
  const [sel, setSel] = useState(null);
  useEffect(()=>{ api("/api/market/settlements").then(d=>{ const s=d.settlements||[]; setSettlements(s); if(s.length) setSel(s[0]); }); },[]);

  const s = sel;
  return (
    <div className="page">
      <div className="section-title">💰 Settlement Statements</div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Settlement Records</span></div>
          <table>
            <thead><tr><th>Event</th><th>Aggregator</th><th>Delivered</th><th>Net Payout</th><th>Status</th></tr></thead>
            <tbody>
              {settlements.map(s=>(
                <tr key={s.settlement_id} style={{cursor:"pointer",background:sel?.settlement_id===s.settlement_id?"rgba(200,32,47,0.08)":"undefined"}} onClick={()=>setSel(s)}>
                  <td style={{fontFamily:"monospace",fontSize:10}}>{s.event_id}</td>
                  <td>{s.flag} {s.aggregator_name}</td>

// ── Glossary ───────────────────────────────────────────────────────────────
function GlossaryScreen() {
  const items = [
    {
      term: "Market Clearing Price (MCP)",
      formula: "MCP = price of the last (marginal) accepted bid in merit order",
      desc: "Bids are stacked cheapest-first (merit order). The MCP is the bid price that fills the last MW of the required flexibility. Under Uniform Pricing, all selected bidders receive MCP regardless of their individual bid price."
    },
    {
      term: "Settlement Formula",
      formula: "Net Payout = Base Payment + Incentive − Penalty\n  Base Payment  = Delivered MWh × Base Rate ($85/MWh)\n  Incentive     = Delivered MWh × $35/MWh   [if Performance ≥ 90%]\n  Penalty       = Underdelivered MWh × $20/MWh  [if Performance < 90%]",
      desc: "T+2 settlement — payment is made within 2 business days of the event. Overperformance (>110%) is capped at contracted quantity."
    },
    {
      term: "Performance %",
      formula: "Performance % = (Delivered MW ÷ Contracted MW) × 100",
      desc: "Measured as average MW over the settlement period. Metered via AMI/smart meters at 15-minute intervals per IEC 61968-9 MDMS."
    },
    {
      term: "Baseline (ASHRAE 10-in-10)",
      formula: "Baseline = Average of 10 highest-consumption days in prior 10 days\n  Adjusted ± 10% symmetric band",
      desc: "Day-matching selects similar weekday/weekend days. 15-min granularity. Adjustment band accounts for temperature and occupancy variance. Source: AMI smart meters."
    },
    {
      term: "Flexibility Available",
      formula: "Flexibility = Σ (Aggregator Nameplate Capacity − Current Dispatch)\n             for all active aggregators",
      desc: "Sum of curtailable/dispatchable capacity across all aggregators. Each aggregator reports available MW at their submitted bid price."
    },
    {
      term: "Incentive Rate",
      formula: "Incentive Payment = Delivered MWh × $35/MWh   [Performance ≥ 90%]",
      desc: "Fixed incentive of $35/MWh on top of the $85/MWh base rate. Applies when delivered performance meets or exceeds the 90% threshold. Encourages reliable participation."
    },
    {
      term: "Penalty Rate",
      formula: "Penalty = Underdelivered MWh × $20/MWh   [Performance < 90%]",
      desc: "Applied to the shortfall (contracted minus delivered) when performance falls below 90%. Ensures aggregators only bid what they can reliably deliver."
    },
    {
      term: "Virtual Power Plant (VPP)",
      formula: "VPP Capacity = Σ DER_i (i = 1..N across all aggregators)",
      desc: "L&T acts as super-aggregator / VPP operator. Controls are issued at aggregator portfolio level (not device level) via OpenADR 2.0b. Each aggregator then dispatches its DERs using IEEE 2030.5."
    },
    {
      term: "Exchange Rate",
      formula: "INR equivalent = USD amount × 83.5 (configurable)",
      desc: "Used to convert USD settlements to INR for India-based aggregators. Rate is configurable in Sim Config and will be replaced by live FX feed when integrated."
    },
    {
      term: "Merit Order",
      formula: "Sort bids: price ascending → allocate from cheapest until MW required is met",
      desc: "Economically efficient dispatch — cheapest flexibility resources dispatched first. Cumulative MW accumulates until the required quantity is met; the last accepted bid sets the MCP."
    },
  ];

  return (
    <div className="page">
      <div className="section-title">📖 Glossary — Formulas & Assumptions</div>
      <div className="card">
        {items.map((item,i) => (
          <div key={i} className="glossary-item">
            <div className="glossary-term">{item.term}</div>
            <div className="glossary-formula">{item.formula}</div>
            <div className="glossary-desc">{item.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

          </span>
        </div>
        <nav>
          {navItems.map((n, i) =>
            n.section
              ? <div key={i} className="nav-section">{n.section}</div>
              : <div key={n.key} className={`nav-item${screen===n.key?" active":""}`} onClick={()=>setScreen(n.key)}>
                  <span className="nav-icon">{n.icon}</span>{n.label}
                </div>
          )}
        </nav>
        <div className="sidebar-footer">
          <div style={{marginBottom:6}}>
            <span style={{color:"#fff",fontWeight:700}}>{auth.user}</span>
            <span style={{color:"var(--muted)"}}> · {ROLE_LABEL[auth.role]}</span>
          </div>
          <button className="btn btn-ghost btn-sm" style={{width:"100%"}} onClick={handleLogout}>Sign out</button>
        </div>
      </div>
      <div id="main">
        <div className="topbar">
          <div className="topbar-title">{TITLES[screen]}</div>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div className="topbar-meta">
              <span className="live-dot"/>
              <span>L&amp;T Neural Grid Platform &mdash; {ROLE_LABEL[auth.role]} &mdash; </span>
              <span>{now.toLocaleString("en-IN",{timeZone:"Asia/Kolkata",hour12:false,hour:"2-digit",minute:"2-digit"})} IST</span>
            </div>
            <a href="/ui" style={{fontSize:11,color:"var(--muted)",textDecoration:"none",border:"1px solid var(--border)",padding:"4px 10px",borderRadius:5,whiteSpace:"nowrap"}}>
              ← DERMS
            </a>
          </div>
        </div>
        <Screen/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
