<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Grid Platform · L&T — DERMS Varanasi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<style>
:root {
  --bg: #0B1121; --bg-card: #151F32; --bg-hover: #1E2D47;
  --primary: #0A2540; --secondary: #1A4B6E; --accent: #F7B32B;
  --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
  --solar: #FCD34D; --grid: #60A5FA; --purple: #8B5CF6; --cyan: #06B6D4;
  --text: #F1F5F9; --text-muted: #8B9CB8; --border: #2A3A52; --p2p: #14B8A6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; }
.app { display: flex; height: 100vh; overflow: hidden; }
/* Sidebar */
.sidebar { width: 220px; background: var(--primary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-logo { padding: 18px 16px; border-bottom: 1px solid var(--border); }
.logo-text { font-size: 16px; font-weight: 700; color: var(--accent); }
.logo-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.nav { padding: 8px 0; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; font-size: 13px; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--bg-hover); color: var(--accent); border-left-color: var(--accent); }
.nav-badge { background: var(--danger); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: auto; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
/* Login */
.login-root { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
.login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 400px; }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo-icon { font-size: 40px; }
.login-logo-title { font-size: 22px; font-weight: 800; color: var(--accent); margin-top: 6px; }
.login-logo-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.login-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; box-sizing: border-box; }
.login-input:focus { outline: none; border-color: var(--accent); }
.login-btn { width: 100%; padding: 11px; background: var(--accent); color: #000; font-weight: 700; font-size: 13px; border: none; border-radius: 7px; cursor: pointer; margin-top: 4px; }
.login-btn:hover { opacity: 0.9; }
.login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.login-error { color: #EF4444; font-size: 12px; text-align: center; margin-top: 10px; }
.login-demo { font-size: 11px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; margin-bottom: 18px; font-family: monospace; }
.login-footer { margin-top: 20px; font-size: 11px; color: var(--text-muted); text-align: center; }
/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.badge-pills { display: flex; gap: 8px; }
.pill { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
.pill.green { border-color: var(--success); color: var(--success); }
.pill.amber { border-color: var(--warning); color: var(--warning); }
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }
/* Cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.card-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.kpi-value { font-size: 28px; font-weight: 700; margin: 4px 0; }
.kpi-sub { font-size: 11px; color: var(--text-muted); }
.kpi-icon { font-size: 20px; float: right; margin-top: -24px; }
/* Grid layout */
.row { display: grid; gap: 16px; margin-bottom: 16px; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-3 { grid-template-columns: 2fr 1fr; }
.row-4 { grid-template-columns: 3fr 2fr; }
/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); }
td { padding: 8px 10px; border-bottom: 1px solid rgba(42,58,82,0.5); }
tr:hover td { background: var(--bg-hover); }
/* Status Badges */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
.badge-online { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.badge-offline { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.badge-degraded { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.badge-curtailed { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
.badge-critical { background: rgba(239,68,68,0.15); color: var(--danger); }
.badge-info { background: rgba(96,165,250,0.15); color: var(--grid); }
/* Alert items */
.alert-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(42,58,82,0.5); font-size: 12px; }
.alert-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.alert-dot.critical { background: var(--danger); }
.alert-dot.warning { background: var(--warning); }
.alert-dot.info { background: var(--grid); }
.alert-msg { flex: 1; color: var(--text); }
.alert-time { color: var(--text-muted); font-size: 10px; white-space: nowrap; }
/* Feeder bars */
.feeder-bar { margin-bottom: 10px; }
.feeder-bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
.feeder-bar-track { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.feeder-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
/* Integration status */
.int-status { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(42,58,82,0.3); font-size: 12px; }
.int-icon { font-size: 18px; }
.int-info { flex: 1; }
.int-name { font-weight: 600; }
.int-detail { font-size: 10px; color: var(--text-muted); }
/* Charts */
.recharts-tooltip-wrapper .recharts-default-tooltip { background: var(--bg-card) !important; border: 1px solid var(--border) !important; border-radius: 8px; }
/* Map */
.map-placeholder { background: linear-gradient(135deg, #0d1a2e 0%, #0a2540 100%); border-radius: 8px; position: relative; overflow: hidden; }
.map-grid { position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.1; background-image: linear-gradient(rgba(96,165,250,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(96,165,250,0.5) 1px, transparent 1px); background-size: 30px 30px; }
.der-marker { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; }
.der-marker.online { background: var(--success); box-shadow: 0 0 8px var(--success); animation: glow 2s infinite; }
.der-marker.offline { background: var(--danger); }
.der-marker.curtailed { background: var(--purple); }
@keyframes glow { 0%,100%{box-shadow:0 0 6px var(--success)} 50%{box-shadow:0 0 14px var(--success)} }
.feeder-line { position: absolute; background: var(--cyan); height: 2px; opacity: 0.5; transform-origin: left center; }
.leaflet-map-wrap { border-radius: 8px; overflow: hidden; }
.leaflet-map-wrap .leaflet-container { background: #0d1a2e; }
.leaflet-popup-content-wrapper { background: #151F32; border: 1px solid #2A3A52; color: #F1F5F9; border-radius: 8px; }
.leaflet-popup-tip { background: #151F32; }
.leaflet-popup-content { margin: 10px 14px; font-size: 12px; }
/* Voltage gauge */
.voltage-cell { font-weight: 600; }
.v-ok { color: var(--success); }
.v-warn { color: var(--warning); }
.v-crit { color: var(--danger); }
/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg-card); border-radius: 8px; padding: 4px; border: 1px solid var(--border); width: fit-content; }
.tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text-muted); transition: all 0.15s; }
.tab.active { background: var(--secondary); color: var(--text); }
/* DR */
.dr-progress-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.dr-progress-ring svg { transform: rotate(-90deg); }
.dr-center { position: absolute; text-align: center; }
/* Scroll */
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
/* Tag */
.tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; background: var(--bg-hover); color: var(--text-muted); margin: 1px; }
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"><div style="color:#F7B32B;font-family:sans-serif;padding:40px;font-size:18px;">⏳ Loading DERMS UI… (if this persists, check browser console for errors)</div></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
// ─── Pure SVG Chart Components (no external lib) ──────────────────────────────
function SvgLineChart({ data, lines, height = 200 }) {
  if (!data || data.length === 0) return null;
  const W = 600, H = height, PL = 36, PR = 8, PT = 8, PB = 28;
  const cw = W - PL - PR, ch = H - PT - PB;
  const allVals = lines.flatMap(l => data.map(d => d[l.key] ?? null).filter(v => v !== null));
  const minV = 0, maxV = Math.max(...allVals, 1);
  const xs = i => PL + (i / (data.length - 1)) * cw;
  const ys = v => PT + ch - ((v - minV) / (maxV - minV)) * ch;
  const labelEvery = Math.ceil(data.length / 8);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      {[0,0.25,0.5,0.75,1].map(t => (
        <line key={t} x1={PL} x2={W-PR} y1={PT + ch*t} y2={PT + ch*t} stroke="#2A3A52" strokeDasharray="3 3" />
      ))}
      {data.map((d, i) => i % labelEvery === 0 && (
        <text key={i} x={xs(i)} y={H-8} textAnchor="middle" fontSize={9} fill="#8B9CB8">{d.label || d.time || d.hour || ""}</text>
      ))}
      {[0,0.5,1].map(t => (
        <text key={t} x={PL-4} y={ys(minV + (maxV-minV)*( 1-t))+4} textAnchor="end" fontSize={9} fill="#8B9CB8">{Math.round(minV+(maxV-minV)*t)}</text>
      ))}
      {lines.map(l => {
        const pts = data.map((d, i) => d[l.key] != null ? `${xs(i)},${ys(d[l.key])}` : null).filter(Boolean);
        if (l.fill) {
          const first = data.findIndex(d => d[l.key] != null);
          const last = data.map((d,i)=>d[l.key]!=null?i:-1).filter(v=>v>=0).pop();
          const area = `M${xs(first)},${PT+ch} ` + pts.join(" L") + ` L${xs(last)},${PT+ch} Z`;
          return <g key={l.key}><path d={area} fill={l.fill} opacity={0.18} /><polyline points={pts.join(" ")} fill="none" stroke={l.color} strokeWidth={2} strokeDasharray={l.dash||""} /></g>;
        }
        return <polyline key={l.key} points={pts.join(" ")} fill="none" stroke={l.color} strokeWidth={l.width||1.5} strokeDasharray={l.dash||""} />;
      })}
      {lines.map((l, li) => (
        <g key={l.key} transform={`translate(${PL + li*110},${H-2})`}>
          <line x1={0} y1={-6} x2={16} y2={-6} stroke={l.color} strokeWidth={2} strokeDasharray={l.dash||""} />
          <text x={20} y={-3} fontSize={9} fill="#8B9CB8">{l.label}</text>
        </g>
      ))}
    </svg>
  );
}

function SvgBarChart({ data, bars, height = 200 }) {
  if (!data || data.length === 0) return null;
  const W = 600, H = height, PL = 36, PR = 8, PT = 8, PB = 36;
  const cw = W - PL - PR, ch = H - PT - PB;
  const allVals = bars.flatMap(b => data.map(d => d[b.key] ?? 0));
  const maxV = Math.max(...allVals, 1);
  const bw = (cw / data.length) * 0.8 / bars.length;
  const gap = (cw / data.length) * 0.2;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      {[0,0.25,0.5,0.75,1].map(t => (
        <line key={t} x1={PL} x2={W-PR} y1={PT+ch*t} y2={PT+ch*t} stroke="#2A3A52" strokeDasharray="3 3" />
      ))}
      {data.map((d, i) => {
        const gx = PL + gap/2 + i * (cw/data.length);
        return (
          <g key={i}>
            {bars.map((b, bi) => {
              const val = d[b.key] ?? 0;
              const bh = (val/maxV)*ch;
              return <rect key={b.key} x={gx+bi*bw} y={PT+ch-bh} width={bw} height={bh} fill={b.color} rx={2} />;
            })}
            <text x={gx+(bw*bars.length/2)} y={H-20} textAnchor="middle" fontSize={8} fill="#8B9CB8" transform={`rotate(-30,${gx+(bw*bars.length/2)},${H-20})`}>{d.name||d.label||""}</text>
          </g>
        );
      })}
      {[0,0.5,1].map(t => (
        <text key={t} x={PL-4} y={ys2(maxV*t,ch,PT)+4} textAnchor="end" fontSize={9} fill="#8B9CB8">{Math.round(maxV*t)}</text>
      ))}
      {bars.map((b, bi) => (
        <g key={b.key} transform={`translate(${PL+bi*110},${H-4})`}>
          <rect x={0} y={-10} width={12} height={8} fill={b.color} rx={2}/>
          <text x={16} y={-3} fontSize={9} fill="#8B9CB8">{b.label}</text>
        </g>
      ))}
    </svg>
  );
}
function ys2(v, ch, PT, maxV=100) { return PT + ch - (v/maxV)*ch; }

const API = ""; // Same-origin

// ─── API Helpers ──────────────────────────────────────────────────────────────
async function apiFetch(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) { console.warn(`API ${path}:`, e.message); return null; }
}

// ─── Reusable Components ─────────────────────────────────────────────────────

function Badge({ status }) {
  const cls = { Online: "badge-online", Offline: "badge-offline", Degraded: "badge-degraded",
    Curtailed: "badge-curtailed", Warning: "badge-warning", Normal: "badge-online",
    Critical: "badge-critical" };
  return <span className={`badge ${cls[status] || "badge-info"}`}>{status}</span>;
}

function KpiCard({ label, value, unit, sub, color = "var(--accent)", icon }) {
  return (
    <div className="kpi-card">
      <div className="kpi-label">{label}</div>
      {icon && <span className="kpi-icon">{icon}</span>}
      <div className="kpi-value" style={{ color }}>{value}<span style={{ fontSize: 14, color: "var(--text-muted)", marginLeft: 4 }}>{unit}</span></div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function AlertsList({ alerts }) {
  if (!alerts || !alerts.length) return <div className="loading">No alerts</div>;
  return alerts.slice(0, 8).map((a, i) => (
    <div key={i} className="alert-item">
      <div className={`alert-dot ${a.alert_type}`}></div>
      <div className="alert-msg">{a.message}</div>
      <div className="alert-time">{a.priority} · {new Date(a.created_at).toLocaleTimeString()}</div>
    </div>
  ));
}

function FeederBar({ feeder }) {
  const used = feeder.used_capacity_kw || 0;
  const total = feeder.hosting_capacity_kw || 1;
  const pct = Math.min(100, (used / total) * 100);
  const loading = feeder.current_loading_pct || 0;
  const color = loading > 80 ? "var(--danger)" : loading > 60 ? "var(--warning)" : "var(--success)";
  const hcColor = pct > 85 ? "var(--danger)" : pct > 60 ? "var(--warning)" : "var(--cyan)";
  return (
    <div className="feeder-bar">
      <div className="feeder-bar-label">
        <span>{feeder.name || feeder.feeder_id}</span>
        <span style={{ color }}>{loading.toFixed(1)}% load | <span style={{ color: hcColor }}>{pct.toFixed(0)}% HC</span></span>
      </div>
      <div className="feeder-bar-track">
        <div className="feeder-bar-fill" style={{ width: `${loading}%`, background: color }}></div>
      </div>
    </div>
  );
}

// ─── Leaflet GIS Map Component ────────────────────────────────────────────────

function LeafletMap({ ders, dts, height = 300, onDTClick }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const [layers, setLayers] = React.useState({ dts: true, ders: true, oe: true, rpf: true, alerts: false });
  const [oeData, setOeData] = React.useState({});
  const [rpfData, setRpfData] = React.useState({});

  // Fetch OE + RPF data
  React.useEffect(() => {
    fetch("/api/oe/current").then(r => r.json()).then(d => {
      const m = {};
      (d.dts || []).forEach(dt => { m[dt.dt_id] = dt; });
      setOeData(m);
    }).catch(() => {});
    fetch("/api/oe/rpf").then(r => r.json()).then(d => {
      const m = {};
      (d.dts || []).forEach(dt => { m[dt.dt_id] = dt; });
      setRpfData(m);
    }).catch(() => {});
  }, []);

  useEffect(() => {
    if (!containerRef.current || typeof window.L === "undefined") return;
    if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }

    const L = window.L;
    const map = L.map(containerRef.current, { center: [25.2692, 82.9975], zoom: 14 });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OSM", opacity: 0.55 }).addTo(map);

    // Substation marker
    L.marker([25.2692, 82.9975], {
      icon: L.divIcon({ html: `<div style="background:#F59E0B;width:16px;height:16px;border-radius:2px;border:2px solid #fff;transform:rotate(45deg)"></div>`, iconSize:[16,16], iconAnchor:[8,8], className:"" })
    }).addTo(map).bindPopup("<b>SS-BHU-001</b><br>33/11 kV BHU Substation<br>Lanka Feeder LK1");

    const dtPoints = [];

    // DT markers — color by OE status when OE layer active
    if (layers.dts) {
      (dts || []).forEach(dt => {
        if (!dt.lat || !dt.lng) return;
        dtPoints.push([dt.lat, dt.lng]);
        const kva = dt.rated_kva || 100;
        const r = Math.max(8, Math.min(18, kva / 16));
        const oe = oeData[dt.dt_id];
        const rpf = rpfData[dt.dt_id];

        let fillColor, label;
        if (layers.oe && oe) {
          const st = oe.oe_status;
          fillColor = st === "RPF" ? "#EF4444" : st === "EXCEEDING" ? "#F97316" : st === "WARNING" ? "#F59E0B" : "#10B981";
          label = `OE: ${st}`;
        } else {
          const vAvg = ((dt.voltage_l1||230)+(dt.voltage_l2||230)+(dt.voltage_l3||230))/3;
          fillColor = vAvg > 244 || vAvg < 216 ? "#EF4444" : vAvg > 240 || vAvg < 220 ? "#F59E0B" : "#10B981";
          label = `V: ${vAvg.toFixed(0)} V`;
        }

        const loading = dt.current_loading_pct || 0;
        const circle = L.circleMarker([dt.lat, dt.lng], {
          radius: r, fillColor, color: "#fff", weight: 1.5, fillOpacity: 0.85,
        }).addTo(map);

        // RPF outer ring
        if (layers.rpf && rpf && rpf.rpf) {
          L.circleMarker([dt.lat, dt.lng], {
            radius: r + 5, fillColor: "transparent", color: "#EF4444",
            weight: 2.5, opacity: 0.8, dashArray: "4 3",
          }).addTo(map);
        }

        const oeHtml = oe ? `<br>OE Status: <b style="color:${fillColor}">${oe.oe_status}</b><br>RPF: ${oe.rpf ? "⚠️ YES" : "No"} | Load: ${oe.consumer_load_kw?.toFixed(0)||"?"}kW` : "";
        circle.bindPopup(
          `<b>${dt.name || dt.dt_id}</b><br>` +
          `Feeder: ${dt.feeder_id} | ${kva}kVA<br>` +
          `Loading: ${loading.toFixed(1)}% | ${label}${oeHtml}`
        );
        if (onDTClick) circle.on("click", () => onDTClick(dt.dt_id));
      });
    }

    // Feeder polyline
    if (dtPoints.length > 0) {
      L.polyline([[25.2692, 82.9975], ...dtPoints], { color: "#06B6D4", weight: 2.5, opacity: 0.75, dashArray: "6 3" }).addTo(map);
    }

    // DER markers
    if (layers.ders) {
      (ders || []).forEach(der => {
        if (!der.lat || !der.lng) return;
        const c = der.status === "Online" ? "#10B981" : der.status === "Curtailed" ? "#8B5CF6" : "#EF4444";
        L.marker([der.lat, der.lng], {
          icon: L.divIcon({ html: `<div style="background:${c};width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,0.8);box-shadow:0 0 6px ${c}"></div>`, iconSize:[10,10], iconAnchor:[5,5], className:"" })
        }).addTo(map).bindPopup(`<b>${der.der_id}</b><br>${der.der_type} · ${der.nameplate_kw}kW<br>${der.location_name}<br>Now: <b>${(der.current_kw||0).toFixed(1)} kW</b>`);
      });
    }

    mapRef.current = map;
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [ders, dts, layers, oeData, rpfData]);

  const btnStyle = (active) => ({
    padding: "3px 9px", borderRadius: 4, fontSize: 11, cursor: "pointer", border: "none",
    background: active ? "var(--accent)" : "rgba(255,255,255,0.08)", color: active ? "#fff" : "var(--text-muted)",
    fontWeight: active ? 600 : 400,
  });

  return (
    <div style={{ position: "relative" }}>
      <div style={{ display: "flex", gap: 4, padding: "4px 6px", background: "rgba(0,0,0,0.5)", borderRadius: "6px 6px 0 0", flexWrap: "wrap" }}>
        <span style={{ fontSize: 10, color: "var(--text-muted)", alignSelf: "center", marginRight: 4 }}>Layers:</span>
        {[["dts","DTs"],["ders","DERs"],["oe","OE Heat"],["rpf","RPF"],["alerts","Alerts"]].map(([k,lbl]) => (
          <button key={k} style={btnStyle(layers[k])} onClick={() => setLayers(p => ({...p,[k]:!p[k]}))}>
            {lbl}
          </button>
        ))}
        <span style={{ marginLeft: "auto", fontSize: 10, color: "var(--text-muted)", alignSelf: "center" }}>
          🟢 Normal &nbsp;🟡 Warning &nbsp;🔴 RPF/Violation &nbsp;⭕ RPF ring
        </span>
      </div>
      <div className="leaflet-map-wrap" style={{ height, position: "relative" }}>
        <div ref={containerRef} style={{ height: "100%", width: "100%" }} />
      </div>
    </div>
  );
}

function GISMap({ ders, dts, feeders, onDTClick }) {

  const overlay = { position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center" };

  return (
    <div style={overlay} onClick={onClose}>
      <div style={modal} onClick={e => e.stopPropagation()}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>

                ["DERs on DT", data.der_count],

                  <div style={{ fontSize: 10, color: "var(--text-muted)" }}>{l}</div>

                  <span>Loading: <b>{data.loadflow.loading_pct?.toFixed(1)}%</b></span>

                </div>

            {/* OE summary */}

              <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 6, padding: 12, marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: "var(--accent)", marginBottom: 6, fontWeight: 600 }}>Operating Envelope (OE)</div>
                <div style={{ display: "flex", gap: 20, fontSize: 12, flexWrap: "wrap" }}>
                  <span>Status: <b style={{ color: data.oe.oe_status === "NORMAL" ? "#10B981" : "#EF4444" }}>{data.oe.oe_status}</b></span>
                  <span>Consumer Load: <b>{data.oe.consumer_load_kw} kW</b></span>
                  <span>DER Gen: <b>{data.oe.total_der_gen_kw} kW</b></span>

              <div style={{ fontSize: 11, color: "var(--accent)", marginBottom: 6, fontWeight: 600 }}>Hosting Capacity</div>
              <div style={{ display: "flex", gap: 20, fontSize: 12 }}>
                <span>HC: <b>{data.hosting_capacity?.hc_kw} kW</b></span>
                <span>Used: <b>{data.hosting_capacity?.used_kw} kW ({data.hosting_capacity?.used_pct}%)</b></span>
                <span>Status: <b style={{ color: data.hosting_capacity?.traffic_light === "green" ? "#10B981" : data.hosting_capacity?.traffic_light === "amber" ? "#F59E0B" : "#EF4444" }}>{data.hosting_capacity?.traffic_light?.toUpperCase()}</b></span>

                  const doc = data.loadflow?.doc?.find(x => x.der_id === d.der_id);
                  const oeD = data.oe?.ders?.find(x => x.der_id === d.der_id);
                  return (
                    <tr key={d.der_id} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)" }}>

                      <td style={{ padding: "5px 8px" }}>{(d.current_kw||0).toFixed(1)}</td>
                      <td style={{ padding: "5px 8px" }}>{doc ? `${doc.doc_kw} kW (${doc.doc_pct}%)` : "—"}</td>
                      <td style={{ padding: "5px 8px", color: oeD?.exceeding ? "#EF4444" : "#10B981" }}>{oeD ? `${oeD.oe_kw} kW` : "—"}</td>
                      <td style={{ padding: "5px 8px", color: d.status === "Online" ? "#10B981" : "#EF4444" }}>{d.status}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>

            {/* OE 24h chart */}
            {data.oe_chart_24h && data.oe_chart_24h.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 11, color: "var(--accent)", fontWeight: 600, marginBottom: 6 }}>Today's OE Schedule vs Forecast (24 slots)</div>
                <SvgLineChart
                  data={data.oe_chart_24h.map(b => ({ ...b, label: b.time }))}
                  lines={[
                    { key: "oe_kw", label: "OE Limit", color: "#10B981", dash: "5 3" },
                    { key: "forecast_kw", label: "Forecast Gen", color: "#FCD34D" },
                    { key: "consumer_load_kw", label: "Consumer Load", color: "#60A5FA", dash: "3 3" },
                  ]}

                />
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function DashboardScreen({ summary, genProfile, ders }) {
  const [dtDrilldown, setDtDrilldown] = React.useState(null);
  const [oeSummary, setOeSummary] = React.useState(null);
  const [drActiveCount, setDrActiveCount] = React.useState(0);
  const [mdmsStale, setMdmsStale] = React.useState(false);

  React.useEffect(() => {
    fetch("/api/oe/summary").then(r => r.json()).then(setOeSummary).catch(() => {});
    apiFetch("/api/ders/dispatch/dr-events").then(d => setDrActiveCount((d?.events || []).filter(e => e.status === "Active").length));
    // Check MDMS freshness — stale if any DER last_update > 30 min ago
    const oldest = (ders || []).reduce((min, d) => {
      if (!d.last_update) return min;
      const t = new Date(d.last_update).getTime();
      return t < min ? t : min;
    }, Date.now());
    setMdmsStale(Date.now() - oldest > 30 * 60 * 1000);
  }, [ders]);

  if (!summary) return <div className="loading">Loading dashboard...</div>;
  const { total_ders, online_ders, offline_ders, curtailed_ders, total_generation_kw, total_export_kw,
    total_capacity_kw, system_cuf_pct, active_alerts, feeders, recent_alerts,
    adms_sync_status, ieee_aggregators_online, active_der_controls, distribution_transformers } = summary;

  const pendingApprovals = (ders || []).filter(d => d.lifecycle_status === "PENDING_APPROVAL" || d.status === "Pending").length;
  const dtsInRed = (distribution_transformers || []).filter(dt => ((dt.total_der_kw || 0) / ((dt.rated_kva || 100) * 0.95 * 0.80)) > 0.85).length;
  const installedKwp = (ders || []).reduce((s, d) => s + (d.nameplate_kw || 0), 0);
  const estGenToday = (ders || []).filter(d => d.status === "Online").reduce((s, d) => s + (d.generation_kw || d.current_kw || 0) * 5, 0); // approx 5h sun

  return (
    <div>
      {dtDrilldown && <DTDrilldownModal dtId={dtDrilldown} onClose={() => setDtDrilldown(null)} />}

      {/* MDMS stale banner */}
      {mdmsStale && (
        <div style={{ background: "rgba(245,158,11,0.12)", border: "1px solid rgba(245,158,11,0.4)", borderRadius: 8, padding: "8px 16px", marginBottom: 10, fontSize: 12, color: "var(--warning)" }}>
          ⏱ MDMS data has not refreshed in over 30 minutes — estimated values may be outdated
        </div>
      )}

      {/* 8 KPI cards — per PRD Section 6.1 */}
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4,1fr)" }}>
        <KpiCard label="Active DERs" value={online_ders || 0} sub={`of ${total_ders || 0} registered · ${offline_ders || 0} offline`} color="var(--success)" icon="⚡" />
        <KpiCard label="Installed kWp" value={installedKwp.toFixed(0)} unit="kWp" sub="Total nameplate capacity" color="var(--cyan)" icon="🔋" />
        <KpiCard label="Est. Gen Now" value={(total_generation_kw || 0).toFixed(1)} unit="kW" sub={<span style={{ fontStyle: "italic", color: "var(--text-muted)", fontSize: 10 }}>Estimated · Net export: {(total_export_kw || 0).toFixed(1)} kW</span>} color="var(--solar)" icon="☀️" />
        <KpiCard label="Est. Gen Today" value={estGenToday.toFixed(0)} unit="kWh" sub={<span style={{ fontStyle: "italic", color: "var(--text-muted)", fontSize: 10 }}>Estimated · irradiance model</span>} color="var(--solar)" icon="📈" />
      </div>
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4,1fr)", marginTop: 8 }}>
        <KpiCard label="DTs in Red" value={dtsInRed} sub="HC utilised > 85%" color={dtsInRed > 0 ? "var(--danger)" : "var(--success)"} icon="🔴" />
        <KpiCard label="Pending Approvals" value={pendingApprovals} sub="DER applications awaiting HC check" color={pendingApprovals > 0 ? "var(--warning)" : "var(--text-muted)"} icon="⏳" />
        <KpiCard label="Active DR Events" value={drActiveCount} sub="Live demand response events" color={drActiveCount > 0 ? "var(--accent)" : "var(--text-muted)"} icon="📉" />
        <KpiCard label="Active Alarms" value={active_alerts || 0} sub={(recent_alerts || []).filter(a => !a.resolved && a.priority === "HIGH").length + " HIGH priority unacknowledged"} color={(active_alerts || 0) > 0 ? "var(--danger)" : "var(--success)"} icon="🔔" />
      </div>

      {/* OE status banner if issues */}
      {oeSummary && (oeSummary.rpf_dts > 0 || oeSummary.ders_exceeding_oe > 0) && (
        <div style={{ background: "rgba(239,68,68,0.12)", border: "1px solid rgba(239,68,68,0.35)", borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 13, color: "#FCA5A5", display: "flex", gap: 16, flexWrap: "wrap", marginTop: 12 }}>
          <span>⚠️ <b>Grid Conditions:</b></span>
          {oeSummary.rpf_dts > 0 && <span>🔴 RPF detected on <b>{oeSummary.rpf_dts} DT(s)</b></span>}
          {oeSummary.ders_exceeding_oe > 0 && <span>🟠 <b>{oeSummary.ders_exceeding_oe} DER(s)</b> exceeding OE limit</span>}
          <span style={{ marginLeft: "auto", color: "var(--text-muted)", fontSize: 11 }}>See OE Monitor for details</span>
        </div>
      )}

      <div className="row row-4" style={{ marginBottom: 16, marginTop: 12 }}>
        <div className="card" style={{ minHeight: 340 }}>
          <div className="card-title">🗺️ DER Fleet — Lanka Feeder LK1 <span style={{ fontSize: 10, color: "var(--text-muted)" }}>(click DT for drill-down)</span></div>
          <LeafletMap ders={ders} dts={distribution_transformers} height={300} onDTClick={setDtDrilldown} />
        </div>
        <div className="card" style={{ overflow: "auto" }}>
          <div className="card-title">🔔 Active Alarms <span style={{ fontSize: 11, fontWeight: 400, color: "var(--text-muted)" }}>— last 10 unacknowledged</span></div>
          {(recent_alerts || []).filter(a => !a.resolved).length === 0 ? (
            <div style={{ textAlign: "center", padding: "32px 16px", color: "var(--success)" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>✅</div>
              <div style={{ fontWeight: 600 }}>No active alarms</div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4 }}>All systems normal</div>
            </div>
          ) : (
            <AlertsList alerts={recent_alerts} />
          )}
        </div>
      </div>

      <div className="row row-3">
        <div className="card">
          <div className="card-title">☀️ 24-Hour Est. Generation Profile <span style={{ fontSize: 10, fontStyle: "italic", color: "var(--text-muted)" }}>Estimated</span></div>
          {genProfile && genProfile.data && (
            <SvgLineChart
              data={genProfile.data.slice(-48).map(d => ({ ...d, label: d.time }))}
              lines={[
                { key: "solar_kw", label: "Est. Solar (kW)", color: "#FCD34D", fill: "#FCD34D" },
                { key: "load_kw",  label: "Net Load (kW)",  color: "#60A5FA", dash: "5 5" },
                { key: "clear_sky_kw", label: "Clear-sky Ref", color: "#8B9CB8", dash: "3 3" },
              ]}
              height={200}
            />
          )}
          <div style={{ fontSize: 10, fontStyle: "italic", color: "var(--text-muted)", marginTop: 4 }}>
            ℹ Estimated from installed kWp × irradiance model (NASA POWER). Not a direct inverter reading.
          </div>
        </div>
        <div className="card">
          <div className="card-title">⚡ Feeder Loading & Hosting Capacity</div>
          {(feeders || []).map(f => <FeederBar key={f.feeder_id} feeder={f} />)}
          <div style={{ marginTop: 12, fontSize: 11, color: "var(--text-muted)" }}>
            <div style={{ marginBottom: 4 }}>🔗 MDMS Integration: <span style={{ color: adms_sync_status === "Connected" ? "var(--success)" : "var(--danger)" }}>{adms_sync_status}</span></div>
            <div>IEEE 2030.5 aggregators: {ieee_aggregators_online || 0} online</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function DERFleetScreen({ ders, summary }) {
  const [view, setView] = useState("table");
  const [selected, setSelected] = useState(null);
  const [filterFeeder, setFilterFeeder] = useState("All");
  const [filterType, setFilterType] = useState("All");

  const feeders = [...new Set((ders || []).map(d => d.feeder_id))];
  const types = [...new Set((ders || []).map(d => d.der_type))];

  const filtered = (ders || []).filter(d =>
    (filterFeeder === "All" || d.feeder_id === filterFeeder) &&
    (filterType === "All" || d.der_type === filterType)
  );

  const totalGen = filtered.reduce((s, d) => s + (d.generation_kw > 0 ? d.generation_kw : (d.current_kw > 0 ? d.current_kw : 0)), 0);
  const totalExport = filtered.reduce((s, d) => s + (d.export_kw != null ? d.export_kw : (d.current_kw > 0 ? d.current_kw : 0)), 0);
  const totalCap = filtered.reduce((s, d) => s + d.nameplate_kw, 0);
  const avgPR = filtered.filter(d => d.pr_pct > 0).reduce((s, d) => s + d.pr_pct, 0) / (filtered.filter(d => d.pr_pct > 0).length || 1);

  return (
    <div>
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(5,1fr)" }}>
        <KpiCard label="Registered" value={filtered.length} sub={`${filtered.filter(d=>d.status==="Online").length} active · ${filtered.filter(d=>d.status==="Pending"||d.lifecycle_status==="PENDING_APPROVAL").length} pending`} icon="🔋" />
        <KpiCard label="Installed Capacity" value={totalCap.toFixed(0)} unit="kWp" sub="Total nameplate (active + pending)" color="var(--cyan)" icon="📐" />
        <KpiCard label="Est. Gen Now" value={totalGen.toFixed(1)} unit="kW" sub={<span style={{ fontStyle: "italic", fontSize: 10 }}>Estimated · irradiance model</span>} color="var(--solar)" icon="☀️" />
        <KpiCard label="Net Export Now" value={totalExport.toFixed(1)} unit="kW" sub="Grid injection (MDMS export channel)" color="var(--accent)" icon="⚡" />
        <KpiCard label="Avg PR" value={avgPR.toFixed(1)} unit="%" color={avgPR > 65 ? "var(--success)" : "var(--warning)"} icon="📊" sub={avgPR < 65 ? "⚠ Below 65% — review systems" : "Performance Ratio"} />
      </div>

      {showRegister && <RegisterDERModal onClose={() => setShowRegister(false)} onDone={(id) => alert(`✅ DER ${id} registered — reload page to see updated fleet`)} />}
      <div style={{ display: "flex", gap: 12, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <select value={filterFeeder} onChange={e => setFilterFeeder(e.target.value)} style={{ background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 10px", borderRadius: 6, fontSize: 12 }}>
          <option value="All">All Feeders</option>
          {feeders.map(f => <option key={f} value={f}>{f}</option>)}
        </select>
        <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{ background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 10px", borderRadius: 6, fontSize: 12 }}>
          <option value="All">All Types</option>
          {types.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <div className="tabs">
          <div className={`tab ${view === "table" ? "active" : ""}`} onClick={() => setView("table")}>📋 Table</div>
          <div className={`tab ${view === "map" ? "active" : ""}`} onClick={() => setView("map")}>🗺️ Map</div>
        </div>
        <button onClick={() => setShowRegister(true)} style={{ marginLeft: "auto", padding: "7px 14px", background: "rgba(99,102,241,0.12)", border: "1px solid rgba(99,102,241,0.3)", color: "var(--accent)", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
          + Register DER Manually
        </button>

        <div className="card" style={{ padding: 0 }}>
          {view === "table" ? (
            <table>
              <thead><tr>
                <th>Prosumer Name</th><th>Consumer No.</th><th>DT</th><th>Feeder</th><th>kWp</th>
                <th>Status</th><th>Last MDMS</th><th>Est. Gen Today</th><th>HC%</th>
              </tr></thead>
              <tbody>
                {filtered.map(d => {
                  const genKw = d.generation_kw != null ? d.generation_kw : d.current_kw;
                  const lcStatus = d.lifecycle_status || (d.status === "Online" ? "ACTIVE" : d.status === "Pending" ? "PENDING_APPROVAL" : "ACTIVE");
                  const lcColor = { ACTIVE: "var(--success)", PENDING_APPROVAL: "var(--warning)", DRAFT: "var(--text-muted)", SUSPENDED: "var(--danger)" }[lcStatus] || "var(--text-muted)";
                  const lastUpd = d.last_update ? new Date(d.last_update) : null;
                  const staleMins = lastUpd ? (Date.now() - lastUpd.getTime()) / 60000 : 999;
                  const stale = staleMins > 30;
                  const estGenToday = (genKw || 0) * 5; // approx kWh
                  // HC contribution: der kWp / (DT kVA * 0.95 * 0.80)
                  const dtKva = (summary?.distribution_transformers || []).find(dt => dt.dt_id === d.dt_id)?.rated_kva || 100;
                  const hcPct = ((d.nameplate_kw || 0) / (dtKva * 0.95 * 0.80)) * 100;
                  return (
                  <tr key={d.der_id} onClick={() => setSelected(selected?.der_id === d.der_id ? null : d)}
                    style={{ cursor: "pointer", background: selected?.der_id === d.der_id ? "var(--bg-hover)" : "", borderLeft: stale ? "3px solid var(--warning)" : "" }}>
                    <td style={{ fontWeight: 600 }}>{d.consumer_name || d.location_name || d.der_id}</td>
                    <td style={{ fontSize: 11, fontFamily: "monospace", color: "var(--text-muted)" }}>{d.consumer_id || "—"}</td>
                    <td style={{ fontSize: 11, color: "var(--cyan)" }}>{d.dt_id}</td>
                    <td style={{ fontSize: 11 }}>{d.feeder_id}</td>
                    <td style={{ fontWeight: 600 }}>{d.nameplate_kw} kWp</td>
                    <td><span style={{ fontSize: 10, fontWeight: 700, color: lcColor }}>{lcStatus}</span></td>
                    <td style={{ fontSize: 11, color: stale ? "var(--warning)" : "var(--text-muted)" }}>
                      {lastUpd ? lastUpd.toLocaleTimeString() : "—"}
                      {stale && <span title="MDMS data stale > 30 min"> ⏱</span>}
                    </td>
                    <td style={{ fontStyle: "italic", color: "var(--solar)" }}>{estGenToday.toFixed(1)} kWh</td>
                    <td>
                      <span style={{ fontSize: 11, fontWeight: 600, color: hcPct > 85 ? "var(--danger)" : hcPct > 60 ? "var(--warning)" : "var(--success)" }}>
                        {hcPct.toFixed(0)}%
                      </span>
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          ) : (
            <div style={{ height: 400, padding: 8 }}>
              <LeafletMap ders={filtered} dts={[]} height={390} />
            </div>
          )}
        </div>

        {selected && (
          <div className="card">
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{selected.der_id}</div>
              <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "var(--text-muted)", cursor: "pointer", fontSize: 16 }}>✕</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 12 }}>
              {[["Type", selected.der_type], ["OEM", selected.inverter_oem], ["Capacity", `${selected.nameplate_kw}kW`],
                ["Generation (Gross)", `${(selected.generation_kw ?? selected.current_kw ?? 0).toFixed(2)}kW`],
                ["Net Export", `${(selected.export_kw ?? selected.current_kw ?? 0).toFixed(2)}kW`],
                ["Self-Consumed", `${(selected.self_consumption_kw ?? 0).toFixed(2)}kW`],
                ["Grid Import", `${(selected.import_kw ?? 0).toFixed(2)}kW`],
                ["CUF", `${(selected.cuf_pct||0).toFixed(1)}%`],
                ["PR", `${(selected.pr_pct||0).toFixed(1)}%`], ["Feeder", selected.feeder_id], ["DT", selected.dt_id],
                ["Consumer", selected.consumer_id], ["Meter", selected.meter_id],
                ["Aggregator", selected.aggregator_id], ["Curtailment", `${selected.curtailment_pct||100}%`],
              ].map(([k, v]) => (
                <div key={k} style={{ background: "var(--bg)", borderRadius: 6, padding: "6px 8px" }}>
                  <div style={{ color: "var(--text-muted)", fontSize: 10 }}>{k}</div>
                  <div style={{ fontWeight: 600, fontSize: 12 }}>{v}</div>
                </div>
              ))}
            </div>
            {selected.soc_pct && (
              <div style={{ marginTop: 12, padding: "8px", background: "var(--bg)", borderRadius: 6 }}>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>BESS State of Charge</div>
                <div style={{ height: 8, background: "rgba(42,58,82,0.5)", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${selected.soc_pct}%`, background: selected.soc_pct > 50 ? "var(--success)" : "var(--warning)", borderRadius: 4 }}></div>
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, marginTop: 4 }}>{selected.soc_pct.toFixed(0)}%</div>
              </div>
            )}
            <div style={{ marginTop: 12, padding: "8px", background: "var(--bg)", borderRadius: 6, fontSize: 11 }}>
              <div style={{ color: "var(--text-muted)", marginBottom: 4 }}>IEEE 2030.5 Connection</div>
              <div>Aggregator: <span style={{ color: "var(--cyan)" }}>{selected.aggregator_id}</span></div>
              <div>Protocol: SEP 2.0 · Function Set 10 (DER)</div>
              <div>Last Update: {selected.last_update ? new Date(selected.last_update).toLocaleTimeString() : "—"}</div>

    </div>
  );
}

// ─── Network / DT Monitoring Screen ──────────────────────────────────────────

function NetworkScreen({ summary }) {
  const [initData, setInitData] = useState(null);
  const [oeData, setOeData] = useState(null);
  const [lfResult, setLfResult] = useState(null);
  const [running, setRunning] = useState(false);
  const [lastRun, setLastRun] = useState(null);
  const [activeTab, setActiveTab] = useState("monitoring");

  useEffect(() => {
    apiFetch("/api/loadflow/sandbox/init?feeder_id=LK1").then(setInitData);
    apiFetch("/api/oe/summary").then(setOeData);
    apiFetch("/api/loadflow/results/LK1").then(d => { if (d && !d.detail) { setLfResult(d); setLastRun(d.computed_at || d.timestamp); } }).catch(() => {});
  }, []);

  const runLoadFlow = async () => {
    if (!initData) return;
    setRunning(true);
    try {
      const dtLoads = {};
      (initData.dts || []).forEach(dt => { dtLoads[dt.dt_id] = dt.total_load_kw; });
      const derGen = {};
      (initData.ders || []).forEach(d => { derGen[d.der_id] = d.current_kw; });
      const r = await apiFetch("/api/loadflow/run/LK1", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ dt_loads: dtLoads, der_generation: derGen, run_type: "on_demand" }),
      });
      setLfResult(r);
      setLastRun(new Date().toISOString());
      apiFetch("/api/oe/summary").then(setOeData);
    } catch(e) {}
    setRunning(false);
  };

  const dts = summary?.distribution_transformers || initData?.dts || [];
  const lfDts = lfResult?.dt_results || {};

  // Traffic-light from OE or loading
  const getEnvelopeStatus = (dt) => {
    const loading = dt.loading_pct || ((dt.total_der_kw || dt.total_load_kw || 0) / ((dt.rated_kva || 100) * 0.95) * 100);
    const hcPct = ((dt.total_der_kw || 0) / ((dt.rated_kva || 100) * 0.95 * 0.80)) * 100;
    if (loading > 85 || hcPct > 85) return "RED";
    if (loading > 60 || hcPct > 60) return "AMBER";
    return "GREEN";
  };

  const envColor = { GREEN: "var(--success)", AMBER: "var(--warning)", RED: "var(--danger)" };
  const envIcon = { GREEN: "🟢", AMBER: "🟡", RED: "🔴" };

  // Feeder rollup
  const totalNetLoad = dts.reduce((s, dt) => s + (dt.total_load_kw || 0), 0);
  const totalEstGen = dts.reduce((s, dt) => s + (dt.total_der_kw || 0), 0);
  const totalKva = dts.reduce((s, dt) => s + (dt.rated_kva || 0), 0);
  const avgLoadingPct = totalKva > 0 ? (totalNetLoad / (totalKva * 0.95)) * 100 : 0;

  return (
    <div>
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(5,1fr)" }}>
        <KpiCard label="Distribution Transformers" value={dts.length} sub="on pilot feeder LK1" icon="🏗️" />
        <KpiCard label="Net Load" value={totalNetLoad.toFixed(1)} unit="kW" sub="MDMS DT meter (measured)" color="var(--cyan)" icon="📊" />
        <KpiCard label="Est. Gen" value={totalEstGen.toFixed(1)} unit="kW" sub={<span style={{ fontStyle: "italic" }}>Estimated · behind DTs</span>} color="var(--solar)" icon="☀️" />
        <KpiCard label="Avg Loading" value={avgLoadingPct.toFixed(1)} unit="%" sub="Thermal loading % (net load / kVA)" color={avgLoadingPct > 85 ? "var(--danger)" : avgLoadingPct > 60 ? "var(--warning)" : "var(--success)"} icon="⚡" />
        <KpiCard label="DTs in Red" value={dts.filter(dt => getEnvelopeStatus(dt) === "RED").length} sub="Envelope or HC > 85%" color={dts.filter(dt => getEnvelopeStatus(dt) === "RED").length > 0 ? "var(--danger)" : "var(--success)"} icon="🔴" />
      </div>

      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 12, marginTop: 4 }}>
        <div className="tabs">
          {[["monitoring","📋 DT Monitoring"],["loadflow","⚡ Load Flow"],["feeder","📈 Feeder Summary"]].map(([id,label]) => (
            <div key={id} className={`tab ${activeTab===id?"active":""}`} onClick={() => setActiveTab(id)}>{label}</div>
          ))}
        </div>
        <button onClick={runLoadFlow} disabled={running} style={{ marginLeft: "auto", padding: "8px 18px", background: running ? "var(--bg)" : "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.4)", color: "var(--accent)", borderRadius: 6, cursor: running ? "default" : "pointer", fontWeight: 600, fontSize: 12 }}>
          {running ? "⏳ Running..." : "▶ Run Load Flow Now"}
        </button>
        {lastRun && <span style={{ fontSize: 11, color: "var(--text-muted)" }}>Last run: {new Date(lastRun).toLocaleTimeString()}</span>}
      </div>

      {activeTab === "monitoring" && (
        <div className="card" style={{ padding: 0 }}>
          <table>
            <thead>
              <tr>
                <th>DT Name</th><th>kVA</th>
                <th>Net Load (kW) <span style={{ fontSize: 9, fontWeight: 400, color: "var(--text-muted)" }}>measured</span></th>
                <th>Loading %</th>
                <th>Est. Gen (kW) <span style={{ fontSize: 9, fontWeight: 400, fontStyle: "italic", color: "var(--text-muted)" }}>est.</span></th>
                <th>Voltage (pu)</th>
                <th>DOC (kW)</th>
                <th>Envelope Status</th>
              </tr>
            </thead>
            <tbody>
              {/* Feeder rollup row */}
              <tr style={{ background: "rgba(99,102,241,0.08)", fontWeight: 700 }}>
                <td style={{ color: "var(--accent)" }}>⚡ LK1 Feeder Total</td>
                <td style={{ color: "var(--text-muted)" }}>{totalKva} kVA</td>
                <td style={{ fontWeight: 700 }}>{totalNetLoad.toFixed(1)}</td>
                <td style={{ color: avgLoadingPct > 85 ? "var(--danger)" : avgLoadingPct > 60 ? "var(--warning)" : "var(--success)", fontWeight: 700 }}>{avgLoadingPct.toFixed(1)}%</td>
                <td style={{ fontStyle: "italic", color: "var(--solar)" }}>{totalEstGen.toFixed(1)}</td>
                <td>—</td><td>—</td>
                <td><span style={{ fontSize: 11, fontWeight: 700, color: dts.filter(dt=>getEnvelopeStatus(dt)==="RED").length>0?"var(--danger)":"var(--success)" }}>{dts.filter(dt=>getEnvelopeStatus(dt)==="RED").length} RED DTs</span></td>
              </tr>
              {dts.map(dt => {
                const lf = lfDts[dt.dt_id] || {};
                const netLoad = dt.total_load_kw || 0;
                const estGen = dt.total_der_kw || 0;
                const kva = dt.rated_kva || 100;
                const loadingPct = (netLoad / (kva * 0.95)) * 100;
                const voltage = lf.voltage_pu || "—";
                const doc = lf.doc_kw != null ? lf.doc_kw.toFixed(1) : "—";
                const env = getEnvelopeStatus(dt);
                return (
                  <tr key={dt.dt_id}>
                    <td style={{ fontWeight: 600 }}>{dt.dt_name || dt.dt_id}<br/><span style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "monospace" }}>{dt.dt_id}</span></td>
                    <td style={{ color: "var(--text-muted)" }}>{kva} kVA</td>
                    <td style={{ fontWeight: 600 }}>{netLoad.toFixed(1)}</td>
                    <td>
                      <span style={{ color: loadingPct > 85 ? "var(--danger)" : loadingPct > 60 ? "var(--warning)" : "var(--success)", fontWeight: 600 }}>{loadingPct.toFixed(1)}%</span>
                    </td>
                    <td style={{ fontStyle: "italic", color: "var(--solar)" }}>{estGen.toFixed(1)}</td>
                    <td style={{ color: "var(--text-muted)", fontSize: 11 }}>{typeof voltage === "number" ? voltage.toFixed(3) : voltage} pu</td>
                    <td style={{ color: "var(--cyan)", fontSize: 11 }}>{doc}</td>
                    <td>
                      <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 10, background: env === "RED" ? "rgba(239,68,68,0.15)" : env === "AMBER" ? "rgba(245,158,11,0.15)" : "rgba(16,185,129,0.12)", color: envColor[env], border: `1px solid ${envColor[env]}33` }}>
                        {envIcon[env]} {env}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {dts.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px 16px", color: "var(--text-muted)" }}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>🏗️</div>
              <div>Loading DT data...</div>
            </div>
          )}
        </div>
      )}

      {activeTab === "loadflow" && (
        <div className="card">
          <div className="card-title">⚡ Load Flow Results <span style={{ fontSize: 11, fontWeight: 400, color: "var(--text-muted)" }}>— pandapower BFS (Backward-Forward Sweep)</span></div>
          {lfResult ? (
            <div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 16 }}>
                {[
                  ["Run Type", lfResult.run_type || "on_demand"],
                  ["Converged", lfResult.converged ? "✅ Yes" : "❌ No"],
                  ["Iterations", lfResult.iterations || "—"],
                  ["Timestamp", lastRun ? new Date(lastRun).toLocaleTimeString() : "—"],
                ].map(([k,v]) => (
                  <div key={k} style={{ background: "var(--bg)", borderRadius: 6, padding: "8px 10px" }}>
                    <div style={{ fontSize: 10, color: "var(--text-muted)" }}>{k}</div>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{v}</div>
                  </div>
                ))}
              </div>
              {Object.keys(lfDts).length > 0 ? (
                <table>
                  <thead><tr><th>DT</th><th>Voltage (pu)</th><th>Loading %</th><th>DOC (kW)</th><th>Binding Constraint</th></tr></thead>
                  <tbody>
                    {Object.entries(lfDts).map(([dtId, r]) => (
                      <tr key={dtId}>
                        <td style={{ fontSize: 11, fontFamily: "monospace" }}>{dtId}</td>
                        <td style={{ color: (r.voltage_pu||1) > 1.06 || (r.voltage_pu||1) < 0.94 ? "var(--danger)" : "var(--success)", fontWeight: 600 }}>
                          {(r.voltage_pu||0).toFixed(4)} pu
                        </td>
                        <td style={{ color: (r.loading_pct||0) > 85 ? "var(--danger)" : "var(--success)", fontWeight: 600 }}>{(r.loading_pct||0).toFixed(1)}%</td>
                        <td style={{ color: "var(--cyan)" }}>{r.doc_kw != null ? r.doc_kw.toFixed(1) : "—"} kW</td>
                        <td style={{ fontSize: 11, color: "var(--text-muted)" }}>{r.binding_constraint || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <div style={{ color: "var(--text-muted)", fontSize: 12 }}>No per-DT results yet. Run Load Flow to compute.</div>
              )}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "32px 16px" }}>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 12 }}>No load flow run yet for this session</div>
              <button onClick={runLoadFlow} style={{ padding: "8px 20px", background: "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.4)", color: "var(--accent)", borderRadius: 6, cursor: "pointer", fontWeight: 600 }}>
                ▶ Run Load Flow Now
              </button>
            </div>
          )}
        </div>
      )}

      {activeTab === "feeder" && (
        <div className="card">
          <div className="card-title">📈 Feeder Summary — LK1</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 8 }}>DT Envelope Status Distribution</div>
              {["GREEN","AMBER","RED"].map(env => {
                const count = dts.filter(dt => getEnvelopeStatus(dt) === env).length;
                const pct = dts.length > 0 ? (count/dts.length)*100 : 0;
                return (
                  <div key={env} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                      <span style={{ color: envColor[env], fontWeight: 600 }}>{envIcon[env]} {env}</span>
                      <span>{count} DTs ({pct.toFixed(0)}%)</span>
                    </div>
                    <div style={{ height: 6, background: "var(--bg)", borderRadius: 3, marginTop: 3 }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: envColor[env], borderRadius: 3 }} />
                    </div>
                  </div>
                );
              })}
            </div>
            <div>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 8 }}>Network Parameters</div>
              {[
                ["Conductor type", "ACSR Rabbit (75mm²)"],
                ["R (Ω/km)", "0.271 (IS 398)"],
                ["X (Ω/km)", "0.381 (IS 398)"],
                ["Voltage band", "0.94 – 1.06 pu (CEA)"],
                ["Thermal limit", "85% of rated kVA"],
                ["Slack bus V", "1.0 pu (33/11kV SS)"],
              ].map(([k,v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, padding: "4px 0", borderBottom: "1px solid var(--border)" }}>
                  <span style={{ color: "var(--text-muted)" }}>{k}</span>
                  <span style={{ fontWeight: 600 }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PlanningScreen({ ders, summary }) {
  const [hc, setHc] = useState(null);
  const [newDer, setNewDer] = useState({ type: "Solar PV", kw: 5, feeder_id: "FDR-01", dt_id: "DT-VAR-0234" });
  const [impact, setImpact] = useState(null);

  useEffect(() => {
    apiFetch("/api/adms/hosting-capacity").then(setHc);
  }, []);

  const feeders = summary?.feeders || [];
  const dts = summary?.distribution_transformers || [];

  const simulateImpact = () => {
    const dt = dts.find(d => d.dt_id === newDer.dt_id);
    const feeder = feeders.find(f => f.feeder_id === newDer.feeder_id);
    if (!dt || !feeder) return;
    const hcEntry = hc?.hosting_capacity?.find(h => h.dt_id === newDer.dt_id);
    const currentUsed = dt.used_capacity_kw || 0;
    const newUsed = currentUsed + newDer.kw;
    const hcKw = hcEntry?.hosting_capacity_kw || dt.hosting_capacity_kw || 0;
    const voltageRise = (newDer.kw / (dt.rated_kva || 315)) * 5.2;
    const feasible = newUsed <= hcKw;
    setImpact({
      dt_name: dt.name,
      feeder_name: feeder.name,
      hc_kw: hcKw,
      current_used_kw: currentUsed,
      new_used_kw: newUsed,
      headroom_kw: hcKw - newUsed,
      voltage_rise_v: voltageRise.toFixed(2),
      feasible,
      voltage_ok: voltageRise < 3.0,
      thermal_ok: newUsed <= (hcEntry?.thermal_constraint_kw || hcKw),
    });
  };

  const derTypeBreakdown = ders.reduce((acc, d) => {
    acc[d.der_type] = (acc[d.der_type] || 0) + 1; return acc;
  }, {});

  // Static HC formula: HC_limit = DT_kVA × 0.95 × 0.80
  const hcRows = dts.map(dt => {
    const ratedKva = dt.rated_kva || 100;
    const hcLimit = Math.round(ratedKva * 0.95 * 0.80);
    const usedKw = dt.used_capacity_kw || dt.current_der_kw || 0;
    const utilPct = hcLimit > 0 ? (usedKw / hcLimit * 100) : 0;
    const availKw = Math.max(0, hcLimit - usedKw);
    const tl = utilPct > 85 ? "red" : utilPct > 60 ? "amber" : "green";
    const tlColor = tl === "red" ? "var(--danger)" : tl === "amber" ? "var(--warning)" : "var(--success)";
    const derCount = ders.filter(d => d.dt_id === dt.dt_id).length;
    return { ...dt, hcLimit, usedKw: Math.round(usedKw), utilPct: Math.round(utilPct), availKw, tl, tlColor, derCount, ratedKva };
  });
  const hcRedCount = hcRows.filter(r => r.tl === "red").length;

  return (
    <div>
      {/* PRD D.4 KPI strip */}
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4,1fr)" }}>
        <KpiCard label="DER Assets (Active)" value={ders.filter(d => d.status === "Online" || !d.status).length} sub={`of ${ders.length} registered`} color="var(--success)" icon="⚡" />
        <KpiCard label="HC Red DTs" value={hcRedCount} sub="HC utilised > 85% — pause approvals" color={hcRedCount > 0 ? "var(--danger)" : "var(--success)"} icon="🔴" />
        <KpiCard label="Total HC Available" value={`${hcRows.reduce((s,r) => s+r.availKw, 0)} kW`} sub="Across all pilot DTs" color="var(--cyan)" icon="🏗️" />
        <KpiCard label="PM Surya Ghar Pipeline" value={ders.filter(d => d.status === "Pending" || d.lifecycle_status === "PENDING_APPROVAL").length} sub="Applications pending approval" color="var(--warning)" icon="📋" />
      </div>

      {/* HC formula box */}
      <div style={{ background: "rgba(6,182,212,0.07)", border: "1px solid rgba(6,182,212,0.25)", borderRadius: 8, padding: "10px 16px", marginBottom: 14, fontSize: 12, color: "var(--text-muted)" }}>
        <strong style={{ color: "var(--cyan)" }}>Static HC Formula (Phase 1):</strong>&nbsp;

              {hcRows.length === 0 && <tr><td colSpan={7} style={{ textAlign: "center", color: "var(--text-muted)", padding: 16 }}>Loading DT data…</td></tr>}
            </tbody>

        </div>

        <div className="card">
          <div className="card-title">🔬 DER Connection Impact Simulator</div>
          <div style={{ display: "grid", gap: 8, marginBottom: 12 }}>

              { label: "Feeder", key: "feeder_id", type: "select", options: ["FDR-01","FDR-02","FDR-03"] },

              {[
                ["DT", impact.dt_name],

                ["After Connection", `${impact.new_used_kw.toFixed(1)} kW`],
                ["Headroom", `${impact.headroom_kw.toFixed(1)} kW`],

      <div className="card">

        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 12 }}>
