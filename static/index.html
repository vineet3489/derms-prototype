}

// ─── Scheduling Screen (Day-ahead Schedule + DR Planning Dashboard) ────────────

function SchedulingScreen({ ders }) {
  const [activeTab, setActiveTab] = useState("dayahead");
  const [drForm, setDrForm] = useState({ target_kw: 50, duration_min: 60, feeder_id: "FDR-01", reason: "Peak Shaving" });
  const [drResult, setDrResult] = useState(null);
  const [controls, setControls] = useState([]);

  // 96-block day-ahead schedule state (15-min intervals, D+1)
  const generate96Blocks = () => {
    const blocks = [];
    for (let i = 0; i < 96; i++) {
      const h = Math.floor(i / 4);
      const m = (i % 4) * 15;
      const timeStr = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      // Simulated demand (sinusoidal with morning/evening peaks)
      const demandMw = +(0.8 + 0.4 * Math.sin(Math.PI * (h - 6) / 14) + 0.2 * Math.sin(Math.PI * (h - 18) / 6 + Math.PI)).toFixed(3);
      // Solar generation — 0 at night, peak at noon
      const solarMw = h >= 6 && h <= 18 ? +(0.3 * Math.sin(Math.PI * (h - 6) / 12)).toFixed(3) : 0;
      blocks.push({ time: timeStr, demand_mw: Math.max(0.2, demandMw), solar_mw: solarMw, gen_mw: solarMw });
    }
    return blocks;
  };

  const [blocks, setBlocks] = useState(generate96Blocks);
  const [scheduleUploaded, setScheduleUploaded] = useState(false);
  const [showCreateEvent, setShowCreateEvent] = useState(false);
  const [eventForm, setEventForm] = useState({ program_id: "PROG-001", start_time: "", end_time: "", target_mw: 0.5, channels: ["email", "sms"] });

  useEffect(() => {
    apiFetch("/api/ders/dispatch/der-controls").then(d => setControls(d?.der_controls || []));
    const iv = setInterval(() => {
      apiFetch("/api/ders/dispatch/der-controls").then(d => setControls(d?.der_controls || []));
    }, 10000);
    return () => clearInterval(iv);
  }, []);

  const submitDR = async () => {
    try {
      const r = await fetch("/api/ders/dispatch/dr-event", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(drForm),
      });
      setDrResult(await r.json());
      apiFetch("/api/ders/dispatch/der-controls").then(d => setControls(d?.der_controls || []));
    } catch(e) { setDrResult({ error: e.message }); }
  };

  // Identify deficit blocks (demand > gen) for DR planning
  const deficitBlocks = blocks.filter(b => b.demand_mw > b.gen_mw + 0.1);
  const peakDeficit = deficitBlocks.reduce((max, b) => Math.max(max, b.demand_mw - b.gen_mw), 0);
  const enrolledCapacity = 2.5; // MW enrolled (simulated)
  const coverageRatio = enrolledCapacity / (peakDeficit || 0.01);
  const coverageColor = coverageRatio >= 1.5 ? "var(--success)" : coverageRatio >= 1.0 ? "var(--warning)" : "var(--danger)";

  const inp = { background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 8px", borderRadius: 4, fontSize: 12, width: "100%" };

  // Mini SVG chart for 96-block demand/gen/forecast
  const chartW = 700, chartH = 140;
  const maxMw = Math.max(...blocks.map(b => b.demand_mw)) * 1.1 || 1;
  const bw = chartW / 96;
  const toY = v => chartH - (v / maxMw) * chartH;
  const genPath = blocks.map((b,i) => `${i===0?"M":"L"}${i*bw+bw/2},${toY(b.gen_mw)}`).join(" ");
  const demandPath = blocks.map((b,i) => `${i===0?"M":"L"}${i*bw+bw/2},${toY(b.demand_mw)}`).join(" ");

  return (
    <div>
      <div className="tabs" style={{ marginBottom: 16 }}>
        {[["dayahead","📅 Day-ahead Schedule"],["drplanning","📊 DR Planning Dashboard"],["dispatch","⚡ Manual Dispatch"]].map(([id,label]) => (
          <div key={id} className={`tab ${activeTab===id?"active":""}`} onClick={() => setActiveTab(id)}>{label}</div>
        ))}
      </div>

      {/* TAB 1: Day-ahead Schedule Input */}
      {activeTab === "dayahead" && (
        <div>
          <div className="row row-2" style={{ marginBottom: 12 }}>
            <div className="card">
              <div className="card-title">📅 D+1 Schedule Input <span style={{ fontSize: 11, fontWeight: 400, color: "var(--text-muted)" }}>— 96 × 15-min blocks for tomorrow</span></div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center" }}>
                <button onClick={() => setScheduleUploaded(false)} style={{ padding: "6px 14px", background: !scheduleUploaded?"rgba(99,102,241,0.15)":"var(--bg)", border: `1px solid ${!scheduleUploaded?"rgba(99,102,241,0.4)":"var(--border)"}`, color: !scheduleUploaded?"var(--accent)":"var(--text-muted)", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>📝 Manual Entry</button>
                <button onClick={() => setScheduleUploaded(true)} style={{ padding: "6px 14px", background: scheduleUploaded?"rgba(99,102,241,0.15)":"var(--bg)", border: `1px solid ${scheduleUploaded?"rgba(99,102,241,0.4)":"var(--border)"}`, color: scheduleUploaded?"var(--accent)":"var(--text-muted)", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>📂 CSV Upload</button>
                <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--warning)" }}>⚠ Demo data — enter real schedule before 21:00 IST</span>
              </div>
              {scheduleUploaded ? (
                <div style={{ border: "2px dashed var(--border)", borderRadius: 8, padding: "40px", textAlign: "center" }}>
                  <div style={{ fontSize: 24, marginBottom: 8 }}>📂</div>
                  <div style={{ fontWeight: 600, marginBottom: 4 }}>Drag & drop CSV or click to browse</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 12 }}>Expected columns: time, scheduled_gen_mw, projected_demand_mw</div>
                  <a href="#" style={{ fontSize: 11, color: "var(--accent)" }}>⬇ Download Template</a>
                </div>
              ) : (
                <div style={{ maxHeight: 360, overflowY: "auto", fontSize: 12 }}>
                  <table>
                    <thead style={{ position: "sticky", top: 0, background: "var(--bg-card)", zIndex: 1 }}>
                      <tr><th>Time (IST)</th><th>Sched. Gen (MW)</th><th>Proj. Demand (MW)</th><th>D+1 Solar (MW)</th></tr>
                    </thead>
                    <tbody>
                      {blocks.slice(0, 24).map((b, i) => (
                        <tr key={i}>
                          <td style={{ fontFamily: "monospace", color: "var(--text-muted)" }}>{b.time}</td>
                          <td><input style={{ ...inp, width: 80, textAlign: "right" }} type="number" step="0.01" value={b.gen_mw} onChange={e => setBlocks(prev => { const n=[...prev]; n[i]={...n[i],gen_mw:+e.target.value}; return n; })} /></td>
                          <td><input style={{ ...inp, width: 80, textAlign: "right", color: "var(--warning)" }} type="number" step="0.01" value={b.demand_mw} onChange={e => setBlocks(prev => { const n=[...prev]; n[i]={...n[i],demand_mw:+e.target.value}; return n; })} /></td>
                          <td style={{ fontStyle: "italic", color: "var(--solar)" }}>{b.solar_mw.toFixed(3)}</td>
                        </tr>
                      ))}
                      <tr><td colSpan={4} style={{ textAlign: "center", color: "var(--text-muted)", fontSize: 11, padding: "8px" }}>… showing 00:00–05:45 · scroll to see all 96 blocks</td></tr>
                    </tbody>
                  </table>
                </div>
              )}
              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                <button style={{ flex: 1, padding: "8px", background: "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.4)", color: "var(--accent)", borderRadius: 6, cursor: "pointer", fontWeight: 600, fontSize: 12 }}>
                  💾 Save Schedule
                </button>
                <button onClick={() => setActiveTab("drplanning")} style={{ padding: "8px 16px", background: "rgba(16,185,129,0.12)", border: "1px solid rgba(16,185,129,0.3)", color: "var(--success)", borderRadius: 6, cursor: "pointer", fontWeight: 600, fontSize: 12 }}>
                  → DR Planning Dashboard
                </button>
              </div>
            </div>
            <div className="card">
              <div className="card-title">📋 Schedule Summary</div>
              {[
                ["Total Scheduled Gen", (blocks.reduce((s,b)=>s+b.gen_mw,0)/4).toFixed(2)+" MWh"],
                ["Total Projected Demand", (blocks.reduce((s,b)=>s+b.demand_mw,0)/4).toFixed(2)+" MWh"],
                ["Est. Solar Contribution", (blocks.reduce((s,b)=>s+b.solar_mw,0)/4).toFixed(2)+" MWh"],
                ["Deficit Blocks", deficitBlocks.length + " of 96"],
                ["Peak Deficit", peakDeficit.toFixed(3)+" MW at "+((deficitBlocks.sort((a,b)=>(b.demand_mw-b.gen_mw)-(a.demand_mw-a.gen_mw))[0]||{}).time||"—")],
                ["DR Suggested", deficitBlocks.length > 0 ? "⚠ Yes" : "✅ No"],
              ].map(([k,v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
                  <span style={{ color: "var(--text-muted)" }}>{k}</span>
                  <span style={{ fontWeight: 600 }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* TAB 2: DR Planning Dashboard */}
      {activeTab === "drplanning" && (
        <div>
          {/* Deficit banner with DR suggestion */}
          {deficitBlocks.length > 0 && (
            <div style={{ background: "rgba(245,158,11,0.12)", border: "1px solid rgba(245,158,11,0.4)", borderRadius: 8, padding: "12px 16px", marginBottom: 12, display: "flex", alignItems: "center", gap: 16 }}>
              <span style={{ fontSize: 14 }}>⚠️</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: "var(--warning)", fontSize: 13 }}>Supply-demand deficit identified in {deficitBlocks.length} blocks</div>
                <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Peak deficit: {peakDeficit.toFixed(2)} MW · Consider scheduling a DR event</div>
              </div>
              <button onClick={() => setShowCreateEvent(true)} style={{ padding: "8px 16px", background: "rgba(245,158,11,0.2)", border: "1px solid rgba(245,158,11,0.5)", color: "var(--warning)", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 12 }}>
                + Create DR Event
              </button>
            </div>
          )}

          {/* 96-block chart */}
          <div className="card" style={{ marginBottom: 12 }}>
            <div className="card-title">📊 D+1 Supply-Demand Balance (96 × 15-min blocks)</div>
            <svg width="100%" viewBox={`0 0 ${chartW} ${chartH + 30}`} style={{ overflow: "visible" }}>
              {/* Deficit highlights */}
              {blocks.map((b,i) => b.demand_mw > b.gen_mw + 0.05 && (
                <rect key={i} x={i*bw} y={0} width={bw} height={chartH} fill="rgba(239,68,68,0.08)" />
              ))}
              {/* Solar area fill */}
              <path d={`M0,${chartH} ${blocks.map((b,i) => `L${i*bw+bw/2},${toY(b.solar_mw)}`).join(" ")} L${chartW},${chartH} Z`} fill="rgba(252,211,77,0.25)" />
              {/* Gen line */}
              <path d={genPath} fill="none" stroke="#FCD34D" strokeWidth={1.5} />
              {/* Demand line */}
              <path d={demandPath} fill="none" stroke="#60A5FA" strokeWidth={1.5} strokeDasharray="4 2" />
              {/* Hour labels */}
              {[0,12,24,36,48,60,72,84].map(i => (
                <text key={i} x={i*bw} y={chartH+18} fontSize={9} fill="var(--text-muted)">{blocks[i]?.time}</text>
              ))}
            </svg>
            <div style={{ display: "flex", gap: 16, fontSize: 11, marginTop: 6 }}>
              <span style={{ color: "#FCD34D" }}>─── Scheduled Gen (MW)</span>
              <span style={{ color: "#60A5FA" }}>- - - Projected Demand (MW)</span>
              <span style={{ color: "rgba(239,68,68,0.7)" }}>▓ Deficit blocks</span>
            </div>
          </div>

          {/* Enrolled capacity panel */}
          <div className="row row-2">
            <div className="card">
              <div className="card-title">⚡ Enrolled DR Capacity vs Deficit</div>
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 12 }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: coverageColor }}>{coverageRatio.toFixed(2)}×</div>
                <div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Coverage ratio (enrolled / peak deficit)</div>
                  <div style={{ fontSize: 11, marginTop: 2, color: coverageColor, fontWeight: 600 }}>
                    {coverageRatio >= 1.5 ? "✅ SUFFICIENT — well covered" : coverageRatio >= 1.0 ? "⚠ MARGINAL — borderline coverage" : "🔴 INSUFFICIENT — enrolled capacity below target"}
                  </div>
                </div>
              </div>
              {[["Enrolled capacity",enrolledCapacity.toFixed(2)+" MW"],["Peak deficit",peakDeficit.toFixed(2)+" MW"],["Buffer",Math.max(0,enrolledCapacity-peakDeficit).toFixed(2)+" MW"]].map(([k,v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
                  <span style={{ color: "var(--text-muted)" }}>{k}</span><span style={{ fontWeight: 600 }}>{v}</span>
                </div>
              ))}
            </div>
            <div className="card">
              <div className="card-title">📅 Create DR Event</div>
              {[
                { label: "Program", key: "program_id", type: "select", options: ["PROG-001","PROG-002"] },
                { label: "Start Time (IST)", key: "start_time", type: "datetime-local" },
                { label: "End Time (IST)", key: "end_time", type: "datetime-local" },
                { label: "Target MW", key: "target_mw", type: "number" },
              ].map(f => (
                <div key={f.key} style={{ marginBottom: 8 }}>
                  <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 2 }}>{f.label}</label>
                  {f.type === "select" ? (
                    <select style={inp} value={eventForm[f.key]} onChange={e => setEventForm(p => ({ ...p, [f.key]: e.target.value }))}>
                      {f.options.map(o => <option key={o}>{o}</option>)}
                    </select>
                  ) : (
                    <input style={inp} type={f.type} step={f.type==="number"?"0.1":undefined} value={eventForm[f.key]} onChange={e => setEventForm(p => ({ ...p, [f.key]: f.type==="number"?+e.target.value:e.target.value }))} />
                  )}
                </div>
              ))}
              <div style={{ marginBottom: 8 }}>
                <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>Notification Channels</label>
                <div style={{ display: "flex", gap: 12 }}>
                  {["email","sms"].map(ch => (
                    <label key={ch} style={{ fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                      <input type="checkbox" checked={eventForm.channels.includes(ch)} onChange={e => setEventForm(p => ({ ...p, channels: e.target.checked ? [...p.channels,ch] : p.channels.filter(c=>c!==ch) }))} />
                      {ch === "email" ? "📧 Email" : "📱 SMS"}
                    </label>
                  ))}
                </div>
              </div>
              <button style={{ width: "100%", padding: "8px", background: "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.4)", color: "var(--accent)", borderRadius: 6, cursor: "pointer", fontWeight: 600, fontSize: 12, marginTop: 4 }}>
                📤 Publish Event & Send Notifications
              </button>
            </div>
          </div>
        </div>
      )}

      {/* TAB 3: Manual Dispatch */}
      {activeTab === "dispatch" && (
        <div className="row row-2">
          <div className="card">
            <div className="card-title">⚡ Manual DR Dispatch (IEEE 2030.5)</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
              {[{label:"Target kW",key:"target_kw"},{label:"Duration (min)",key:"duration_min"}].map(f => (
                <div key={f.key}>
                  <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 2 }}>{f.label}</label>
                  <input type="number" value={drForm[f.key]} onChange={e => setDrForm({...drForm,[f.key]:+e.target.value})} style={{ ...inp }} />
                </div>
              ))}
              <div>
                <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 2 }}>Feeder</label>
                <select value={drForm.feeder_id} onChange={e => setDrForm({...drForm,feeder_id:e.target.value})} style={inp}>
                  <option value="">All Feeders</option>
                  {["FDR-01","FDR-02","LK1"].map(f => <option key={f}>{f}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 2 }}>Reason</label>
                <select value={drForm.reason} onChange={e => setDrForm({...drForm,reason:e.target.value})} style={inp}>
                  {["Peak Shaving","Voltage Regulation","Frequency Response","Grid Congestion","Manual Override"].map(r => <option key={r}>{r}</option>)}

      )}
    </div>
  );
}

function ControlScreen({ ders, summary }) {
  const [gridState, setGridState] = useState(null);

  const [remoteCmd, setRemoteCmd] = useState({ action: "curtail", pct: 50 });
  const [cmdResult, setCmdResult] = useState(null);
  const [optimLog, setOptimLog] = useState([]);

  useEffect(() => {
    apiFetch("/api/adms/grid-state").then(setGridState);
    const iv = setInterval(() => apiFetch("/api/adms/grid-state").then(setGridState), 15000);
    // Simulated optimization log
    const actions = [
      { time: "13:42:10", action: "Peak Shaving", target: "FDR-02", result: "Dispatched 17.5kW BESS", status: "Success" },
      { time: "13:27:05", action: "Voltage Regulation", target: "DT-VAR-0445", result: "Curtailed 2 Solar DERs 80%", status: "Success" },
      { time: "13:12:00", action: "HC Alert Cleared", target: "FDR-01", result: "Loading dropped below 75%", status: "Info" },
      { time: "12:58:33", action: "Frequency Response", target: "All", result: "BESS ramp up +12kW in 1.2s", status: "Success" },
      { time: "12:45:20", action: "Solar Curtailment", target: "FDR-03", result: "3 DERs curtailed — overvoltage", status: "Warning" },
      { time: "12:30:00", action: "Storage Optimization", target: "AGG-002", result: "Charged 4 BESS units to 85% SoC", status: "Success" },
    ];
    setOptimLog(actions);
    return () => clearInterval(iv);
  }, []);

  const sendRemoteCommand = async () => {
    if (!selectedDer) return;
    try {
      const r = await fetch("/api/ders/dispatch/dr-event", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          target_kw: remoteCmd.action === "stop" ? 0 : selectedDer.nameplate_kw * (remoteCmd.pct/100),
          duration_min: 30, feeder_id: selectedDer.feeder_id,
          reason: `Remote Control: ${remoteCmd.action} ${selectedDer.der_id}`,
        }),
      });
      const res = await r.json();
      setCmdResult({ ok: true, msg: `Command sent — Event ${res.event_id} (${res.dispatched_kw}kW)` });
    } catch(e) { setCmdResult({ ok: false, msg: e.message }); }
  };

  const feeders = summary?.feeders || [];

  return (
    <div>
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4,1fr)" }}>

        <KpiCard label="Auto-Control" value="Active" sub="Dispatch + voltage loops" color="var(--cyan)" icon="🤖" />
        <KpiCard label="Avg Feeder Load" value={feeders.length ? (feeders.reduce((s,f)=>s+f.current_loading_pct,0)/feeders.length).toFixed(1)+"%" : "—"} sub="Across 3 feeders" icon="📈" />
        <KpiCard label="Network Efficiency" value="94.2%" sub="vs 89% baseline" color="var(--success)" icon="⚡" />
      </div>

      <div className="row row-2">
        <div className="card">
          <div className="card-title">🎛️ Remote DER Control</div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>Select DER</label>
            <select onChange={e => setSelectedDer(ders.find(d => d.der_id === e.target.value) || null)}

              <option value="">-- Select DER --</option>
              {ders.map(d => <option key={d.der_id} value={d.der_id}>{d.der_id} ({d.der_type}, {d.nameplate_kw}kW, {d.feeder_id})</option>)}
            </select>
          </div>
          {selectedDer && (
            <div style={{ background: "var(--bg)", borderRadius: 6, padding: 10, marginBottom: 10, fontSize: 12 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
                {[["Type", selectedDer.der_type], ["Nameplate", selectedDer.nameplate_kw+"kW"],
                  ["Current", selectedDer.current_kw+"kW"], ["Status", selectedDer.status],
                  ["Available", (selectedDer.available_kw||0).toFixed(1)+"kW"], ["SoC", selectedDer.soc_pct ? selectedDer.soc_pct+"%" : "N/A"]
                ].map(([k,v]) => <div key={k}><span style={{ color: "var(--text-muted)" }}>{k}: </span>{v}</div>)}
              </div>
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
            <div>
              <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 2 }}>Action</label>
              <select value={remoteCmd.action} onChange={e => setRemoteCmd({...remoteCmd, action: e.target.value})}
                style={{ width: "100%", background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 8px", borderRadius: 4, fontSize: 12 }}>
                {["start","stop","curtail","ramp_up","charge","discharge"].map(a => <option key={a} value={a}>{a}</option>)}

            <div>
              <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 2 }}>Power %</label>
              <input type="number" min={0} max={100} value={remoteCmd.pct} onChange={e => setRemoteCmd({...remoteCmd, pct: +e.target.value})}

            </div>
          </div>
          <button onClick={sendRemoteCommand} disabled={!selectedDer}

            📡 Send Remote Command
          </button>
          {cmdResult && (
            <div style={{ marginTop: 8, fontSize: 12, color: cmdResult.ok ? "var(--success)" : "var(--danger)" }}>

          )}

          <div style={{ marginTop: 16 }}>
            <div className="card-title">🔋 Storage Management</div>
            {ders.filter(d => d.der_type === "BESS").map(b => (

        <div className="card">

                <Badge status={f.status || "Normal"} />
              </div>
              {[
                { label: "Grid Loading", value: f.current_loading_pct, max: 100, warn: 75, unit: "%" },
                { label: "HC Used", value: f.used_capacity_kw, max: f.hosting_capacity_kw, warn: f.hosting_capacity_kw * 0.8, unit: "kW" },

                  <div style={{ fontWeight: 600 }}>{l.action} — {l.target}</div>
                  <div style={{ color: "var(--text-muted)" }}>{l.result}</div>

          </div>

      </div>
    </div>
  );
}

function AnalyticsScreen({ ders, genProfile }) {
  const [forecast, setForecast] = useState([]);
  const [anomalies, setAnomalies] = useState([]);

  useEffect(() => {
    // Simulated 24h forecast vs actual
    const now = new Date();
    const pts = [];
    for (let h = 0; h < 24; h++) {
      const solar = h >= 6 && h <= 18 ? Math.sin(Math.PI * (h - 6) / 12) * 190 : 0;
      const noise = Math.random() * 12 - 6;
      pts.push({
        hour: `${String(h).padStart(2,"0")}:00`,
        forecast: Math.max(0, Math.round(solar + noise)),
        actual: h <= now.getHours() ? Math.max(0, Math.round(solar + (Math.random()*16-8))) : null,
      });
    }
    setForecast(pts);

    // Simulated anomalies
    setAnomalies([
      { id: "ANO-001", der_id: "AGG-001-DER-003", type: "Performance Drop", desc: "Generation 32% below expected for irradiance level", priority: "Warning", time: "13:15" },
      { id: "ANO-002", der_id: "AGG-002-DER-011", type: "BESS Degradation", desc: "SoC cycle efficiency dropped to 87% (baseline 94%)", priority: "Warning", time: "12:40" },
      { id: "ANO-003", der_id: "AGG-003-DER-002", type: "Communication Loss", desc: "No telemetry for 8 minutes — investigating", priority: "Critical", time: "11:55" },

  const solarDers = ders.filter(d => d.der_type === "Solar PV");

  const perfData = ders.slice(0, 10).map(d => ({

        <KpiCard label="Avg PR" value={avgPr+"%"} sub="Performance Ratio" color="var(--cyan)" icon="📈" />
        <KpiCard label="Anomalies" value={anomalies.length} sub="Active detections" color={anomalies.length > 0 ? "var(--warning)" : "var(--success)"} icon="🔍" />
        <KpiCard label="AI Model" value="Active" sub="ML forecasting enabled" color="var(--purple)" icon="🤖" />
      </div>

      <div className="row row-2">
        <div className="card">
          <div className="card-title">📈 Solar Generation Forecast vs Actual (24h)</div>
          <SvgLineChart
            data={forecast}
            lines={[
              { key: "forecast", label: "ML Forecast", color: "#06B6D4", fill: "#06B6D4", dash: "4 2" },
              { key: "actual",   label: "Actual",      color: "#FCD34D", width: 2 },
            ]}
            height={220}
          />
          <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 6, display: "flex", gap: 16 }}>
            <span>Model: LSTM + weather API</span>
            <span>MAPE: 4.2%</span>
            <span>Horizon: 48h</span>
          </div>
        </div>

        <div className="card">
          <div className="card-title">🔍 Anomaly Detection (AI/ML)</div>
          {anomalies.map(a => (
            <div key={a.id} style={{ background: "var(--bg)", borderRadius: 6, padding: 10, marginBottom: 8, borderLeft: `3px solid ${a.priority==="Critical"?"var(--danger)":"var(--warning)"}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontWeight: 600, fontSize: 12 }}>{a.type}</span>
                <span style={{ fontSize: 10, color: "var(--text-muted)" }}>{a.time}</span>

            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6, color: "var(--purple)" }}>🤖 AI/ML Capabilities Active</div>

// ─── Consumer Enrollment Panel ────────────────────────────────────────────────

function ConsumerEnrollmentPanel({ consumers, onRefresh }) {
  const [lookupNo, setLookupNo]       = useState("");
  const [lookupResult, setLookupResult] = useState(null);
  const [lookupBusy, setLookupBusy]   = useState(false);
  const [consent, setConsent]         = useState(false);
  const [enrollBusy, setEnrollBusy]   = useState(null); // consumer_no being actioned
  const [actionMsg, setActionMsg]     = useState(null);

  const doLookup = async () => {
    if (!lookupNo.trim()) return;
    setLookupBusy(true);
    setLookupResult(null);
    setConsent(false);
    const data = await apiFetch(`/api/dr/consumers/lookup?consumer_no=${encodeURIComponent(lookupNo.trim())}`);
    setLookupResult(data);
    setLookupBusy(false);
  };

  const doEnroll = async (consumer_no, consumerData) => {
    setEnrollBusy(consumer_no);
    setActionMsg(null);
    try {
      const r = await fetch(`/api/dr/consumers/${encodeURIComponent(consumer_no)}/enroll`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(consumerData || {}),
      });
      const res = await r.json();
      setActionMsg({ ok: res.status !== "error", text: res.message });
      setLookupResult(null);
      setLookupNo("");
      setConsent(false);
      onRefresh();
    } catch(e) { setActionMsg({ ok: false, text: e.message }); }
    setEnrollBusy(null);
  };

  const doUnenroll = async (consumer_no) => {
    setEnrollBusy(consumer_no);
    setActionMsg(null);
    try {
      const r = await fetch(`/api/dr/consumers/${encodeURIComponent(consumer_no)}/unenroll`, { method: "POST" });
      const res = await r.json();
      setActionMsg({ ok: res.status !== "error", text: res.message });
      onRefresh();
    } catch(e) { setActionMsg({ ok: false, text: e.message }); }
    setEnrollBusy(null);
  };

  const btnStyle = (color) => ({
    background: color, color: color === "var(--border)" ? "var(--text-muted)" : "#fff",
    border: "none", padding: "4px 10px", borderRadius: 4, cursor: "pointer",
    fontSize: 11, fontWeight: 600, whiteSpace: "nowrap",
  });

  const enrolled  = (consumers?.consumers || []).filter(c =>  c.enrolled);
  const prospects = (consumers?.consumers || []).filter(c => !c.enrolled);

  return (
    <div>
      {/* ── Summary KPIs ── */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 16 }}>
        {[
          { label: "Total Consumers",  value: consumers?.total_consumers || 0,    color: "var(--text)" },
          { label: "Enrolled",          value: consumers?.enrolled_count || 0,     color: "var(--success)" },
          { label: "Not Enrolled",      value: (consumers?.total_consumers||0) - (consumers?.enrolled_count||0), color: "var(--warning)" },
          { label: "Available Flex",    value: `${((consumers?.total_enrolled_demand_kw||0)*0.3).toFixed(0)} kW`, color: "var(--cyan)" },
        ].map(({ label, value, color }) => (
          <div key={label} className="card" style={{ textAlign: "center", padding: "12px" }}>
            <div style={{ fontSize: 10, color: "var(--text-muted)", marginBottom: 4 }}>{label}</div>
            <div style={{ fontWeight: 700, fontSize: 24, color }}>{value}</div>
          </div>
        ))}
      </div>

      {/* ── Action feedback ── */}
      {actionMsg && (
        <div style={{ background: actionMsg.ok ? "rgba(16,185,129,0.12)" : "rgba(239,68,68,0.12)",
          border: `1px solid ${actionMsg.ok ? "var(--success)" : "var(--danger)"}`,
          borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13,
          color: actionMsg.ok ? "var(--success)" : "var(--danger)", display: "flex", alignItems: "center", gap: 8 }}>
          {actionMsg.ok ? "✅" : "❌"} {actionMsg.text}
          <button onClick={() => setActionMsg(null)} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: "inherit", fontSize: 16 }}>✕</button>
        </div>
      )}

      <div className="row row-2" style={{ marginBottom: 16 }}>
        {/* ── Billing System Lookup & Enrollment ── */}
        <div className="card">
          <div className="card-title">🔍 Enroll New Consumer — Billing System Lookup</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 12 }}>
            Enter a consumer number to fetch master data from the PuVVNL billing system, review details, and enroll in the DR program.
          </div>

          {/* Step 1: Lookup */}
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            <input
              value={lookupNo}
              onChange={e => setLookupNo(e.target.value)}
              onKeyDown={e => e.key === "Enter" && doLookup()}
              placeholder="e.g. VAR-C-005"
              style={{ flex: 1, background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text)",
                padding: "7px 10px", borderRadius: 4, fontSize: 13 }}
            />
            <button onClick={doLookup} disabled={lookupBusy}
              style={{ background: "var(--cyan)", color: "#000", border: "none", padding: "7px 16px",
                borderRadius: 4, cursor: "pointer", fontWeight: 600, fontSize: 13 }}>
              {lookupBusy ? "⏳" : "Lookup"}
            </button>
          </div>

          {/* Step 2: Review billing data */}
          {lookupResult && !lookupResult.found && (
            <div style={{ color: "var(--danger)", fontSize: 12 }}>❌ {lookupResult.message}</div>
          )}

          {lookupResult?.found && lookupResult.consumer && (
            <div style={{ background: "var(--bg)", borderRadius: 8, padding: 14, fontSize: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{lookupResult.consumer.name}</div>
                <span className="tag" style={{ fontSize: 10, color: "var(--cyan)" }}>{lookupResult.source}</span>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 12 }}>
                {[
                  ["Consumer No.",      lookupResult.consumer.consumer_no],
                  ["Address",           lookupResult.consumer.address],
                  ["Contact",           lookupResult.consumer.contact],
                  ["Tariff",            lookupResult.consumer.tariff_category],
                  ["Voltage Level",     lookupResult.consumer.voltage_level],
                  ["Contractual Demand",`${lookupResult.consumer.contractual_demand_kva} kVA`],
                  ["Max Demand",        `${lookupResult.consumer.max_demand_kw} kW`],
                  ["Avg Demand",        `${lookupResult.consumer.avg_demand_kw} kW`],
                  ["Feeder",            lookupResult.consumer.feeder_id],
                  ["DT",                lookupResult.consumer.dt_id],
                ].map(([k, v]) => (
                  <div key={k} style={{ background: "var(--bg-card)", borderRadius: 4, padding: "5px 8px" }}>
                    <div style={{ fontSize: 10, color: "var(--text-muted)" }}>{k}</div>
                    <div style={{ fontWeight: 600 }}>{v}</div>
                  </div>
                ))}
              </div>

              {lookupResult.consumer.enrolled ? (
                <div style={{ color: "var(--success)", fontWeight: 600, fontSize: 12 }}>
                  ✅ This consumer is already enrolled in the DR program.
                </div>
              ) : (
                <>
                  {/* Step 3: Consent */}
                  <label style={{ display: "flex", alignItems: "flex-start", gap: 8, cursor: "pointer",
                    background: "rgba(247,179,43,0.08)", border: "1px solid rgba(247,179,43,0.3)",
                    borderRadius: 6, padding: "10px 12px", marginBottom: 12 }}>
                    <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)}
                      style={{ marginTop: 2, flexShrink: 0 }} />
                    <span style={{ fontSize: 11, lineHeight: 1.5 }}>
                      I confirm that the consumer has been informed about the PUVVNL Demand Response program,
                      understands the terms including voluntary load reduction and incentive structure
                      (₹3/kWh), and has given written consent to participate.
                    </span>
                  </label>

                  {/* Step 4: Enroll */}
                  <button
                    disabled={!consent || enrollBusy === lookupResult.consumer.consumer_no}
                    onClick={() => doEnroll(lookupResult.consumer.consumer_no, lookupResult.consumer)}
                    style={{ background: consent ? "var(--success)" : "var(--border)",
                      color: consent ? "#fff" : "var(--text-muted)",
                      border: "none", padding: "10px", borderRadius: 6,
                      cursor: consent ? "pointer" : "default", fontWeight: 600, fontSize: 13, width: "100%" }}>
                    {enrollBusy === lookupResult.consumer.consumer_no
                      ? "⏳ Enrolling…"
                      : "✅ Confirm Enrollment in DR Program"}
                  </button>
                </>
              )}
            </div>
          )}

          {/* Enrollment process steps */}
          {!lookupResult && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: "var(--text-muted)" }}>Enrollment Process</div>
              {[
                ["1", "Lookup",   "Enter consumer number to fetch billing system data"],
                ["2", "Review",   "Verify master data: demand, tariff, feeder assignment"],
                ["3", "Consent",  "Confirm consumer has agreed to DR program terms"],
                ["4", "Enroll",   "Consumer added to DR program — receives SMS/email confirmation"],
              ].map(([step, title, desc]) => (
                <div key={step} style={{ display: "flex", gap: 10, padding: "6px 0", borderBottom: "1px solid var(--border)", alignItems: "flex-start" }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", background: "var(--secondary)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{step}</div>
                  <div style={{ fontSize: 12 }}>
                    <span style={{ fontWeight: 600 }}>{title}</span>
                    <span style={{ color: "var(--text-muted)", marginLeft: 6 }}>{desc}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── Prospects (not yet enrolled) ── */}
        <div className="card">
          <div className="card-title">📋 Prospects — Not Yet Enrolled</div>
          {prospects.length === 0 ? (
            <div style={{ color: "var(--success)", fontSize: 12, padding: 16, textAlign: "center" }}>
              All known consumers are enrolled!
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {prospects.map(c => (
                <div key={c.consumer_no} style={{ background: "var(--bg)", borderRadius: 8, padding: "10px 12px",
                  border: "1px solid var(--border)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 12 }}>{c.name}</div>
                      <div style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "monospace" }}>{c.consumer_no}</div>
                    </div>
                    <button onClick={() => { setLookupNo(c.consumer_no); setLookupResult({ found: true, source: "DERMS Registry", consumer: c }); setConsent(false); }}
                      style={btnStyle("var(--cyan)")}>
                      Review &amp; Enroll
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 12, fontSize: 11, color: "var(--text-muted)" }}>
                    <span><span className="tag">{c.tariff_category}</span></span>
                    <span>Avg: <b style={{ color: "var(--text)" }}>{c.avg_demand_kw} kW</b></span>
                    <span>Max: <b style={{ color: "var(--text)" }}>{c.max_demand_kw} kW</b></span>
                    <span style={{ color: "var(--cyan)" }}>{c.feeder_id}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ── Enrolled consumers registry ── */}
      <div className="card">
        <div className="card-title">✅ Enrolled Consumers — Active DR Program Members</div>
        <table>
          <thead>
            <tr>
              <th>Consumer No.</th><th>Name</th><th>Tariff</th><th>Avg Demand</th>
              <th>Enrolled Since</th><th>Events</th><th>Total Savings (INR)</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            {enrolled.length === 0 && (
              <tr><td colSpan={8} style={{ textAlign: "center", color: "var(--text-muted)", padding: 20 }}>
                No consumers enrolled yet. Use the lookup panel above to enroll consumers.
              </td></tr>
            )}
            {enrolled.map(c => (
              <tr key={c.consumer_no}>
                <td style={{ fontFamily: "monospace", fontSize: 10 }}>{c.consumer_no}</td>
                <td style={{ fontSize: 11 }}>{c.name}</td>
                <td><span className="tag">{c.tariff_category}</span></td>
                <td>{c.avg_demand_kw} kW</td>
                <td style={{ fontSize: 10, color: "var(--text-muted)" }}>{c.enrollment_date || "—"}</td>
                <td style={{ fontWeight: 600, color: c.events_participated > 0 ? "var(--success)" : "var(--text-muted)" }}>
                  {c.events_participated}
                </td>
                <td style={{ fontWeight: 600, color: "var(--solar)" }}>
                  {c.total_savings_inr > 0 ? `₹${c.total_savings_inr.toLocaleString()}` : "—"}
                </td>
                <td>
                  <button onClick={() => doUnenroll(c.consumer_no)}
                    disabled={enrollBusy === c.consumer_no}
                    style={btnStyle("var(--danger)")}>
                    {enrollBusy === c.consumer_no ? "⏳" : "Unenroll"}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* ── Month-wise consumption ── */}
      {enrolled.length > 0 && (
        <div className="card" style={{ marginTop: 16 }}>
          <div className="card-title">📊 Month-wise Energy Consumption — Enrolled Consumers (kWh)</div>
          <div style={{ overflowX: "auto" }}>
            <table>
              <thead>
                <tr>
                  <th>Consumer</th>
                  {["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"].map(m => <th key={m}>{m}</th>)}
                  <th>Avg/Mo</th>
                </tr>
              </thead>
              <tbody>
                {enrolled.map(c => {
                  const avg = Math.round(c.monthly_consumption_kwh.reduce((s,v) => s+v, 0) / 12);
                  return (
                    <tr key={c.consumer_no}>
                      <td style={{ fontSize: 10, fontWeight: 600 }}>{c.consumer_no}</td>
                      {c.monthly_consumption_kwh.map((v, i) => (
                        <td key={i} style={{ fontSize: 10, textAlign: "right",
                          color: v > avg * 1.2 ? "var(--danger)" : v > avg ? "var(--warning)" : "var(--text)" }}>
                          {v.toLocaleString()}
                        </td>
                      ))}
                      <td style={{ fontWeight: 600, color: "var(--cyan)", fontSize: 11 }}>{avg.toLocaleString()}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ fontSize: 10, color: "var(--text-muted)", marginTop: 6 }}>
            Red = 20%+ above average · Amber = above average · kWh per month
          </div>
        </div>
      )}
    </div>
  );
}

function DemandResponseScreen({ ders, summary, area }) {
  const isNoida = area === "noida";
  const [drEvents, setDrEvents] = useState([]);
  const [controls, setControls] = useState([]);
  const [drForm, setDrForm] = useState({ target_kw: 50, duration_min: 60, feeder_id: "", reason: "Peak Shaving" });
  const [drResult, setDrResult] = useState(null);
  const [activeTab, setActiveTab] = useState("demand");
  const [submitting, setSubmitting] = useState(false);
  const [demandData, setDemandData] = useState(null);
  const [consumers, setConsumers] = useState(null);
  const [cba, setCba] = useState(null);
  const [cblData, setCblData] = useState(null);
  const [cblConsumer, setCblConsumer] = useState("");
  const [cblLoading, setCblLoading] = useState(false);
  const [inviteEventId, setInviteEventId] = useState("");
  const [invitations, setInvitations] = useState(null);
  const [inviting, setInviting] = useState(false);
  const [responding, setResponding] = useState(null);
  const [mvsEventId, setMvsEventId] = useState("");
  const [mvsData, setMvsData] = useState(null);
  const [mvsLoading, setMvsLoading] = useState(false);

  useEffect(() => {
    const load = () => {
      apiFetch("/api/ders/dispatch/dr-events").then(d => setDrEvents(d?.events || []));
      apiFetch("/api/ders/dispatch/der-controls").then(d => setControls(d?.controls || []));
      apiFetch("/api/dr/demand-analysis").then(setDemandData);
      apiFetch("/api/dr/consumers").then(setConsumers);
      apiFetch("/api/dr/cost-benefit").then(setCba);
    };
    load();
    const iv = setInterval(load, 30000);
    return () => clearInterval(iv);
  }, []);

  const submitDR = async () => {
    setSubmitting(true);
    try {
      const r = await fetch("/api/ders/dispatch/dr-event", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(drForm),
      });
      const result = await r.json();
      setDrResult(result);
      apiFetch("/api/ders/dispatch/dr-events").then(d => setDrEvents(d?.events || []));
      apiFetch("/api/ders/dispatch/der-controls").then(d => setControls(d?.controls || []));
      apiFetch("/api/dr/cost-benefit").then(setCba);
    } catch(e) { setDrResult({ error: e.message }); }
    finally { setSubmitting(false); }
  };

  const bess = ders.filter(d => d.der_type === "BESS");
  const totalAvailKw = bess.reduce((s,d) => s + (d.available_kw||0), 0);
  const activeEvents = drEvents.filter(e => e.status === "Active");
  const totalDispatchedKw = activeEvents.reduce((s,e) => s + (e.dispatched_kw||0), 0);

  const historicalEvents = [
    { event_id: "DR-202603011430", reason: "Peak Shaving", target_kw: 75, dispatched_kw: 68.5, duration_min: 60, feeder_id: "FDR-02", dispatched_ders: ["BESS-01","BESS-04"], status: "Completed", created_at: "2026-03-01T14:30:00Z" },
    { event_id: "DR-202602281100", reason: "Voltage Regulation", target_kw: 40, dispatched_kw: 40.0, duration_min: 30, feeder_id: "FDR-01", dispatched_ders: ["BESS-02"], status: "Completed", created_at: "2026-02-28T11:00:00Z" },
    { event_id: "DR-202602271700", reason: "Grid Congestion", target_kw: 100, dispatched_kw: 87.2, duration_min: 90, feeder_id: null, dispatched_ders: ["BESS-01","BESS-02","BESS-03","BESS-04"], status: "Completed", created_at: "2026-02-27T17:00:00Z" },
  ];
  const allEvents = [...drEvents, ...historicalEvents];

  const drPrograms = [
    { name: "Peak Shaving",       trigger: "Feeder loading > 80%",              response: "Dispatch BESS, curtail EV chargers",    target: "Reduce 20–100 kW",     duration: "30–120 min",   protocol: "IEEE 2030.5" },
    { name: "Voltage Regulation", trigger: "Voltage > 245V or < 215V at DT",    response: "Curtail solar DERs at affected DT",     target: "Restore 230±5V",       duration: "10–60 min",    protocol: "IEEE 2030.5" },
    { name: "Frequency Response", trigger: "Grid frequency < 49.8 Hz",           response: "BESS fast ramp-up within 1s",           target: "+12 kW fast dispatch", duration: "5–15 min",     protocol: "IEEE 2030.5" },
    { name: "Scheduled DR",       trigger: "PUVVNL / SLDC day-ahead schedule",   response: "Pre-charge BESS, schedule curtailment", target: "Per schedule block",   duration: "Per schedule", protocol: "OpenADR 2.0b" },
  ];

  const allTabs = [
    ["demand",      "📊 Demand Analysis",     ["varanasi","noida"]],
    ["consumers",   "👥 Consumers",           ["varanasi","noida"]],
    ["invitations", "📨 Invitations",         ["varanasi","noida"]],
    ["cbl",         "📉 CBL Engine",          ["varanasi","noida"]],
    ["live_monitor","🔴 Live Monitor",        ["varanasi","noida"]],
    ["mvs",         "✅ MV&S",               ["varanasi","noida"]],
    ["history",     "📋 Event History",       ["varanasi","noida"]],
    ["programme",   "📜 DR Programme",        ["varanasi","noida"]],

          <span style={{ fontSize: 18 }}>🏙</span>
          <div>
            <div style={{ fontWeight: 700, color: "var(--accent)", fontSize: 13 }}>PVVNL Noida — Demand Response Management</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)" }}>C&I consumer curtailment · Measurement & Verification · Incentive tracking</div>

        </div>

      <div className="kpi-grid" style={{ gridTemplateColumns: `repeat(${isNoida ? 4 : 5},1fr)` }}>

        <KpiCard label="Enrolled Consumers" value={consumers?.enrolled_count || 0} sub={`of ${consumers?.total_consumers || 0} C&I consumers`} color="var(--cyan)" icon="👥" />

        {isNoida ? (
          <KpiCard label="kW Curtailed Today" value={totalDispatchedKw.toFixed(1)} unit="kW" sub="Via active DR events" color="var(--purple)" icon="⚡" />

                  ["Auto-trigger",         "DR event recommended when shortfall ≥ threshold"],

                <select value={drForm.feeder_id} onChange={e => setDrForm({...drForm, feeder_id: e.target.value})}

function LiveEventMonitorTab({ events }) {
  const [selEvent, setSelEvent] = React.useState("");
  const [monData, setMonData] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  const activeEvents = (events || []).filter(e => ["Active","ACTIVE","Approved","APPROVED"].includes(e.status));

  const poll = (id) => {
    if (!id) return;
    setLoading(true);
    fetch(`/api/dr/events/${id}/monitor`).then(r=>r.json()).then(d => { setMonData(d); setLoading(false); }).catch(()=>setLoading(false));
  };

  React.useEffect(() => {
    if (!selEvent) return;
    poll(selEvent);
    const iv = setInterval(() => poll(selEvent), 15000);
    return () => clearInterval(iv);
  }, [selEvent]);

  return (
    <div>
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14 }}>
        <select value={selEvent} onChange={e => { setSelEvent(e.target.value); setMonData(null); }}
          style={{ padding: "6px 12px", background: "var(--secondary)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6 }}>
          <option value="">Select active event…</option>
          {(events||[]).map(e => <option key={e.event_id} value={e.event_id}>{e.event_id} — {e.reason} ({e.status})</option>)}
        </select>
        {selEvent && <button onClick={() => poll(selEvent)} style={{ padding: "6px 14px", background: "var(--accent)", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer" }}>⟳ Refresh</button>}
        {selEvent && <span style={{ fontSize: 11, color: "var(--text-muted)" }}>Auto-refreshes every 15s</span>}
      </div>
      {loading && <div style={{ color: "var(--text-muted)", textAlign: "center", padding: 30 }}>Loading…</div>}
      {monData && (
        <div>
          <div className="kpi-grid" style={{ marginBottom: 16 }}>
            <KpiCard label="Total CBL" value={(monData.aggregate?.total_cbl_kw||0).toFixed(1)} unit="kW" sub="Baseline demand" color="var(--cyan)" icon="📊" />
            <KpiCard label="Actual Demand" value={(monData.aggregate?.total_actual_kw||0).toFixed(1)} unit="kW" sub="Live metered" color="var(--solar)" icon="⚡" />
            <KpiCard label="Curtailment" value={(monData.aggregate?.total_curtailed_kw||0).toFixed(1)} unit="kW" sub={`${(monData.aggregate?.curtailment_pct||0).toFixed(1)}% reduction`} color="var(--success)" icon="📉" />
            <KpiCard label="On Track" value={monData.aggregate?.consumers_on_track||0} sub={`of ${monData.aggregate?.consumers_total||0} consumers`} color="var(--success)" icon="✅" />
          </div>
          {/* Curtailment gauge */}
          <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: 16, marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 8 }}>Aggregate Curtailment Progress</div>
            <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 4, height: 24, overflow: "hidden" }}>
              <div style={{ width: `${Math.min(100, monData.aggregate?.curtailment_pct||0)}%`, height: "100%", background: monData.aggregate?.curtailment_pct >= 25 ? "#10B981" : "#F59E0B", borderRadius: 4, transition: "width 0.5s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--text-muted)", marginTop: 4 }}>
              <span>0%</span><span>Target: 25%+</span><span>100%</span>
            </div>
          </div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ color: "var(--text-muted)" }}>
                {["Consumer","CBL kW","Actual kW","Curtailed kW","Reduction%","Committed","Status"].map(h => (
                  <th key={h} style={{ padding: "6px 10px", textAlign: "left", borderBottom: "1px solid var(--border)", fontWeight: 500 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {(monData.consumers||[]).map(c => (
                <tr key={c.consumer_no} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                  <td style={{ padding: "6px 10px" }}>{c.name}</td>
                  <td style={{ padding: "6px 10px" }}>{c.current_cbl_kw}</td>
                  <td style={{ padding: "6px 10px" }}>{c.current_actual_kw}</td>
                  <td style={{ padding: "6px 10px", color: "#10B981", fontWeight: 600 }}>{c.curtailed_kw}</td>
                  <td style={{ padding: "6px 10px" }}>{c.curtailment_pct}%</td>
                  <td style={{ padding: "6px 10px" }}>{c.committed_kw} kW</td>
                  <td style={{ padding: "6px 10px", color: c.on_track ? "#10B981" : "#F59E0B", fontWeight: 600 }}>{c.status}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 8 }}>
            Event: {monData.event_id} | Elapsed: {monData.elapsed_min} min | Phase 1: settlement rate ₹0 (soft launch)
          </div>
