    <div>
      {/* ── Header ── */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", marginBottom: 4 }}>
            Power Flow Sandbox — Lanka Feeder (LK1)
          </div>
          <div style={{ fontSize: 12, color: "var(--text-muted)" }}>
            Adjust feeder head voltage, conductor type, consumer loads, and DER generation.
            Results are isolated — they do not update the live dashboard cache.
          </div>
        </div>
        <button onClick={loadInit} title="Reload live values"
          style={{ padding: "5px 12px", background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", borderRadius: 6, color: "var(--text-muted)", cursor: "pointer", fontSize: 11, flexShrink: 0, marginLeft: 16 }}>
          ↺ Reload
        </button>
      </div>

      {/* ── Feeder parameters ── */}
      <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: 14, marginBottom: 12, border: "1px solid var(--border)" }}>
        <div style={{ fontSize: 11, color: "var(--accent)", fontWeight: 600, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.05em" }}>Feeder Parameters</div>
        <div style={{ display: "flex", gap: 24, flexWrap: "wrap", alignItems: "center", fontSize: 12 }}>
          <label style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: "var(--text-muted)" }}>Head voltage (pu)</span>
            <input style={inp} type="number" step="0.01" min="0.95" max="1.10" value={headVoltage} onChange={e => setHeadVoltage(e.target.value)} />
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: "var(--text-muted)" }}>Conductor type</span>
            <select style={sel} value={conductorType} onChange={e => setConductorType(e.target.value)}>
              {Object.entries(conductors).map(([k, v]) => (
                <option key={k} value={k}>{v.label} ({v.r_ohm_per_km} Ω/km, {v.max_current_a} A)</option>
              ))}
            </select>
          </label>
        </div>
      </div>

      {/* ── DT Consumer Loads ── */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: 14, border: "1px solid var(--border)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.05em" }}>DT Consumer Loads</div>
            <div style={{ fontSize: 10, color: "var(--text-muted)", background: "rgba(255,255,255,0.06)", padding: "2px 6px", borderRadius: 4 }}>MDMS Pipeline A</div>
          </div>
          {dtList.length === 0 ? (
            <div style={{ padding: "20px 0", color: "var(--text-muted)", fontSize: 12, textAlign: "center" }}>
              No DTs found for LK1
            </div>
          ) : (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr>
                <th style={{ padding: "5px 6px", textAlign: "left", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>DT Name</th>
                <th style={{ padding: "5px 6px", textAlign: "right", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>kVA</th>
                <th style={{ padding: "5px 6px", textAlign: "right", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>Load (kW)</th>
              </tr>
            </thead>
            <tbody>
              {dtList.map(dt => (
                <tr key={dt.dt_id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                  <td style={{ padding: "5px 6px" }}>
                    <div style={{ fontSize: 12, color: "var(--text)" }}>{dt.dt_name || dt.dt_id}</div>
                    <div style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "monospace" }}>{dt.dt_id}</div>
                  </td>
                  <td style={{ padding: "5px 6px", textAlign: "right", color: "var(--text-muted)", fontSize: 12 }}>{dt.rated_kva}</td>
                  <td style={{ padding: "5px 6px", textAlign: "right" }}>
                    <input style={{ ...inp, width: 70, textAlign: "right" }} type="number" step="1" min="0"
                      value={dtLoads[dt.dt_id] ?? ""}
                      onChange={e => setDtLoads(prev => ({ ...prev, [dt.dt_id]: e.target.value }))} />
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          )}
        </div>

        {/* ── DER Generation Inputs ── */}

            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.05em" }}>DER Generation</div>
            <div style={{ fontSize: 10, color: "var(--text-muted)", background: "rgba(255,255,255,0.06)", padding: "2px 6px", borderRadius: 4 }}>MDMS Pipeline C</div>
          </div>
          {ders.length === 0 ? (
            <div style={{ padding: "20px 0", color: "var(--text-muted)", fontSize: 12, textAlign: "center" }}>
              No DERs found for LK1
            </div>
          ) : (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr>
                <th style={{ padding: "5px 6px", textAlign: "left", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>DER ID</th>
                <th style={{ padding: "5px 6px", textAlign: "right", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>Plate</th>
                <th style={{ padding: "5px 6px", textAlign: "right", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>Gen (kW)</th>
              </tr>
            </thead>
            <tbody>
              {ders.map(d => (
                <tr key={d.der_id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>

                    <div style={{ fontSize: 10, color: "var(--text-muted)" }}>{d.dt_id}</div>
                  </td>
                  <td style={{ padding: "5px 6px", textAlign: "right", color: "var(--text-muted)", fontSize: 12 }}>{d.nameplate_kw} kW</td>
                  <td style={{ padding: "5px 6px", textAlign: "right" }}>
                    <input style={{ ...inp, width: 70, textAlign: "right" }} type="number" step="0.1" min="0" max={d.nameplate_kw}
                      value={derGens[d.der_id] ?? ""}

                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          )}
        </div>
      </div>

      {/* ── Run button ── */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <button onClick={runSandbox} disabled={running || (dtList.length === 0 && ders.length === 0)}

          {running ? "⏳ Running pandapower…" : "▶ Run Load Flow"}
        </button>
        <div style={{ fontSize: 11, color: "var(--text-muted)" }}>
          {dtList.length} DTs · {ders.length} DERs · pandapower BFS solver
        </div>
      </div>

      {error && (
        <div style={{ background: "rgba(239,68,68,0.12)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 8, padding: 12, marginBottom: 12, fontSize: 12, color: "#EF4444" }}>
          ❌ {error}
        </div>
      )}

      {/* ── Results ── */}
      {result && (
        <div>
          {/* Summary strip */}
          <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
            <KpiCard label="Run time" value={result.elapsed_s?.toFixed(2)} unit="s" sub={`${result.inputs?.conductor_label}`} color="var(--cyan)" icon="⚡" />
            <KpiCard label="Voltage violations" value={result.summary?.voltage_violations} sub="buses outside ±6%" color={result.summary?.voltage_violations > 0 ? "var(--danger)" : "var(--success)"} icon="⚡" />
            <KpiCard label="Thermal violations" value={result.summary?.thermal_violations} sub="lines over rated current" color={result.summary?.thermal_violations > 0 ? "var(--danger)" : "var(--success)"} icon="🌡️" />
            <KpiCard label="DERs exceeding OE" value={result.summary?.ders_exceeding_oe} sub={`of ${result.summary?.total_ders} DERs`} color={result.summary?.ders_exceeding_oe > 0 ? "var(--danger)" : "var(--success)"} icon="🚫" />
          </div>

          {/* Bus voltages */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, color: "var(--accent)", fontWeight: 600, marginBottom: 6 }}>Bus Voltages — LV Secondary (0.4 kV)</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ color: "var(--text-muted)" }}>
                  {["DT","Order","Voltage (pu)","Voltage (V)","Status"].map(h => (
                    <th key={h} style={{ padding: "5px 10px", textAlign: "left", borderBottom: "1px solid var(--border)", fontWeight: 500 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(result.loadflow?.bus_voltages || []).map(bv => {
                  const stColor = bv.status === "violation" ? "#EF4444" : bv.status === "pre_alert" ? "#F59E0B" : "#10B981";
                  return (
                    <tr key={bv.dt_id} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                      <td style={{ padding: "5px 10px", fontFamily: "monospace", color: "var(--accent)" }}>{bv.dt_id}</td>
                      <td style={{ padding: "5px 10px", color: "var(--text-muted)" }}>{bv.order}</td>
                      <td style={{ padding: "5px 10px", fontWeight: 600 }}>{bv.vm_pu?.toFixed(4)}</td>
                      <td style={{ padding: "5px 10px" }}>{bv.vm_v} V</td>
                      <td style={{ padding: "5px 10px", color: stColor, fontWeight: 600 }}>{(bv.status || "normal").toUpperCase()}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* OE per DER */}
          <div>
            <div style={{ fontSize: 12, color: "var(--accent)", fontWeight: 600, marginBottom: 6 }}>Operating Envelope per DER</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 6 }}>OE = min(nameplate, voltage_DOC, thermal_HC, RPF_limit)</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead>
                <tr style={{ color: "var(--text-muted)" }}>
                  {["DER","DT","Nameplate","Gen kW","OE kW","V-DOC","Thermal","RPF","Binding","Status"].map(h => (
                    <th key={h} style={{ padding: "5px 8px", textAlign: "left", borderBottom: "1px solid var(--border)", fontWeight: 500 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(result.oe_per_der || []).map(r => (
                  <tr key={r.der_id} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)", background: r.exceeding ? "rgba(239,68,68,0.06)" : "transparent" }}>
                    <td style={{ padding: "5px 8px", fontFamily: "monospace" }}>{r.der_id}</td>
                    <td style={{ padding: "5px 8px", color: "var(--text-muted)" }}>{r.dt_id}</td>
                    <td style={{ padding: "5px 8px" }}>{r.nameplate_kw} kW</td>
                    <td style={{ padding: "5px 8px" }}>{r.current_kw} kW</td>
                    <td style={{ padding: "5px 8px", color: r.exceeding ? "#EF4444" : "#10B981", fontWeight: 700 }}>{r.oe_kw} kW</td>
                    <td style={{ padding: "5px 8px", color: "var(--text-muted)" }}>{r.oe_voltage_kw} kW</td>
                    <td style={{ padding: "5px 8px", color: "var(--text-muted)" }}>{r.oe_thermal_kw} kW</td>
                    <td style={{ padding: "5px 8px", color: "var(--text-muted)" }}>{r.oe_rpf_kw} kW</td>
                    <td style={{ padding: "5px 8px", fontSize: 10, color: "#F59E0B" }}>{r.binding_constraint}</td>
                    <td style={{ padding: "5px 8px", color: r.exceeding ? "#EF4444" : "#10B981", fontWeight: 600 }}>{r.exceeding ? `EXCEEDING +${r.excess_kw}kW` : "OK"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

const DERMS_CREDS = [
  { user: "derms_admin",  pass: "derms@123", role: "Admin",    area: "varanasi", label: "PuVVNL Varanasi" },
  { user: "operator",     pass: "op@123",    role: "Operator", area: "varanasi", label: "PuVVNL Varanasi" },
  { user: "noida_dr",     pass: "noida@123", role: "DR Operator", area: "noida", label: "PVVNL Noida" },
];

function LoginScreen({ onLogin }) {
  const [user, setUser]   = useState("");
  const [pass, setPass]   = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy]   = useState(false);

  const handleLogin = () => {
    setBusy(true); setError("");
    setTimeout(() => {
      const match = DERMS_CREDS.find(c => c.user === user.trim() && c.pass === pass);
      if (match) {
        onLogin(match.user, match.role, match.area, match.label);
      } else {
        setError("Invalid credentials. Use the demo credentials shown below.");
        setBusy(false);
      }
    }, 500);
  };

  return (
    <div className="login-root">
      <div className="login-box">
        <div className="login-logo">
          <div className="login-logo-icon">⚡</div>
          <div className="login-logo-title">Neural Grid Platform</div>
          <div className="login-logo-sub">L&amp;T DERMS · Demand Response Management</div>
        </div>
        <div className="login-demo" style={{ fontSize: 11 }}>
          <div style={{ fontWeight: 600, color: "var(--text-muted)", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Demo accounts</div>
          <div style={{ marginBottom: 2 }}>🏙 Varanasi DERMS admin: <b>derms_admin</b> / <b>derms@123</b></div>
          <div style={{ marginBottom: 2 }}>🏙 Varanasi operator: <b>operator</b> / <b>op@123</b></div>
          <div>🏙 Noida DR operator: <b>noida_dr</b> / <b>noida@123</b></div>
        </div>
        <label className="login-label">Username</label>
        <input className="login-input" value={user} autoFocus
          onChange={e => setUser(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleLogin()}/>
        <label className="login-label">Password</label>
        <input className="login-input" type="password" value={pass}
          onChange={e => setPass(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleLogin()}/>
        <button className="login-btn" onClick={handleLogin} disabled={busy}>
          {busy ? "Signing in…" : "Sign In"}
        </button>
        {error && <div className="login-error">{error}</div>}
        <div className="login-footer">
          L&amp;T Neural Grid Platform · Phase 1<br/>
          <span style={{color:"var(--warning)"}}>Prototype — not for production use</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [auth, setAuth]   = useState(null);   // { user, role, area, label }
  const isNoida = auth?.area === "noida";
  const [screen, setScreen] = useState(null);  // null until auth determines default
  const [summary, setSummary] = useState(null);
  const [genProfile, setGenProfile] = useState(null);
  const [ders, setDers] = useState([]);
  const [ws, setWs] = useState(null);
  const [connected, setConnected] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);

  // WebSocket for real-time updates
  useEffect(() => {
    const connect = () => {
      const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const wsUrl = `${wsProtocol}://${window.location.host}/ws`;
      const socket = new WebSocket(wsUrl);
      socket.onopen = () => { setConnected(true); setWs(socket); };
      socket.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === "fleet_summary") {
          setSummary(msg.data);
          setLastUpdate(new Date().toLocaleTimeString());
        }
      };
      socket.onclose = () => { setConnected(false); setTimeout(connect, 3000); };
      return socket;
    };
    const s = connect();
    return () => s.close();
  }, []);

  // Initial data load
  useEffect(() => {
    apiFetch("/api/dashboard/summary").then(setSummary);
    apiFetch("/api/dashboard/generation-profile?hours=24").then(setGenProfile);
    apiFetch("/api/ders").then(d => d && setDers(d.ders || []));
    const iv = setInterval(() => {
      apiFetch("/api/ders").then(d => d && setDers(d.ders || []));
      apiFetch("/api/dashboard/generation-profile?hours=24").then(setGenProfile);
    }, 30000);
    return () => clearInterval(iv);
  }, []);

  const alertCount = summary?.active_alerts || 0;
  const [drActiveCount, setDrActiveCount] = useState(0);
  useEffect(() => {
    const load = () => apiFetch("/api/ders/dispatch/dr-events").then(d => setDrActiveCount((d?.events || []).filter(e => e.status === "Active").length));
    load();
    const iv = setInterval(load, 15000);
    return () => clearInterval(iv);
  }, []);

  const allNavItems = [
    { id: "dashboard",       icon: "📊", label: "Overview",          areas: ["varanasi"] },
    { id: "fleet",           icon: "⚡", label: "DER Fleet",         areas: ["varanasi"] },
    { id: "network",         icon: "🏗️", label: "Network",           areas: ["varanasi"] },
    { id: "planning",        icon: "🗺️", label: "Hosting Capacity",  areas: ["varanasi"] },
    { id: "scheduling",      icon: "📅", label: "Scheduling",        areas: ["varanasi"] },
    { id: "analytics",       icon: "📈", label: "Analytics",         areas: ["varanasi"] },
    { id: "demand-response", icon: "📉", label: "Demand Response",   areas: ["varanasi", "noida"] },
    { id: "programs",        icon: "📋", label: "Programs",          areas: ["varanasi", "noida"] },
    { id: "integrations",    icon: "🔌", label: "Integrations",      areas: ["varanasi"] },
    { id: "oe-monitor",      icon: "🔁", label: "OE Monitor",        areas: ["varanasi"] },
    { id: "alerts",          icon: "🔔", label: "Alarms",            areas: ["varanasi", "noida"] },
    { id: "settings",        icon: "⚙️", label: "Settings",          areas: ["varanasi"] },
    { id: "__prosumer__",    icon: "🏠", label: "Prosumer Portal ↗", areas: ["varanasi"] },
  ];
  const navItems = allNavItems.filter(n => n.areas.includes(auth?.area || "varanasi"));

  if (!auth) return <LoginScreen onLogin={(user, role, area, label) => {
    setAuth({ user, role, area, label });
    setScreen(area === "noida" ? "demand-response" : "dashboard");
  }} />;

  const activeScreen = screen || (isNoida ? "demand-response" : "dashboard");

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-text">⚡ Neural Grid</div>
          <div className="logo-sub">
            {isNoida ? "L&T DR Platform · PVVNL Noida" : "L&T DERMS · PuVVNL Varanasi"}
          </div>
        </div>

        {/* Noida area badge */}
        {isNoida && (
          <div style={{ margin: "0 12px 10px", padding: "6px 10px", background: "rgba(99,102,241,0.12)", border: "1px solid rgba(99,102,241,0.3)", borderRadius: 6, fontSize: 11 }}>
            <div style={{ fontWeight: 700, color: "var(--accent)" }}>🏙 Noida — DR Only</div>
            <div style={{ color: "var(--text-muted)", marginTop: 2 }}>PVVNL · Demand Response</div>
          </div>
        )}

        <div className="nav">
          {navItems.map(n => (
            <div key={n.id} className={`nav-item ${activeScreen === n.id ? "active" : ""}`} onClick={() => {
              if (n.id === "__prosumer__") window.open("/prosumer", "_blank");
              else setScreen(n.id);
            }} style={n.id==="__prosumer__"?{marginTop:8,borderTop:"1px solid var(--border)",paddingTop:14}:{}}>
              <span>{n.icon}</span>
              <span>{n.label}</span>
              {n.id === "alerts" && alertCount > 0 && <span className="nav-badge">{alertCount}</span>}
              {n.id === "demand-response" && drActiveCount > 0 && <span className="nav-badge">{drActiveCount}</span>}
              {n.id === "fleet" && (summary?.distribution_transformers || []).filter(d => d.pending_approvals > 0).length > 0 && <span className="nav-badge">!</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div><span className="status-dot"></span>{connected ? "Live" : "Connecting..."}</div>
          {lastUpdate && <div style={{ marginTop: 2 }}>Updated: {lastUpdate}</div>}
          {!isNoida && (
            <div style={{ marginTop: 6, fontSize: 10 }}>
              <div>GE ADMS: CIM / IEC 61970</div>
              <div>Aggregators: IEEE 2030.5</div>
            </div>
          )}
          <div style={{ marginTop: 10, borderTop: "1px solid var(--border)", paddingTop: 10 }}>
            <div style={{ fontSize: 11, marginBottom: 6 }}>
              <span style={{ color: "var(--text)" }}>{auth.user}</span>
              <span style={{ color: "var(--text-muted)" }}> · {auth.role}</span>
              <div style={{ color: "var(--text-muted)", fontSize: 10, marginTop: 1 }}>{auth.label}</div>
            </div>
            <button onClick={() => { setAuth(null); setScreen(null); }} style={{ width: "100%", padding: "5px 0", background: "transparent", border: "1px solid var(--border)", color: "var(--text-muted)", borderRadius: 5, cursor: "pointer", fontSize: 11 }}>
              Sign out
            </button>
          </div>
        </div>
      </div>

      <div className="main">
        <div className="header">
          <div>
            <div className="header-title">
              {navItems.find(n => n.id === activeScreen)?.icon} {navItems.find(n => n.id === activeScreen)?.label}
            </div>
            <div className="header-sub">
              Neural Grid Platform · {auth.label} · Phase 1 · {new Date().toLocaleDateString()}
            </div>
          </div>
          <div className="header-right">
            <div className="badge-pills">
              <div className={`pill ${connected ? "green" : "amber"}`}>
                <span className="status-dot" style={{ width: 6, height: 6, display: "inline-block" }}></span>
                {connected ? "Live" : "Reconnecting"}
              </div>
              {!isNoida && <div className="pill green">🏭 ADMS: {summary?.adms_sync_status || "—"}</div>}
              {!isNoida && <div className="pill green">📡 {ders.length} DERs</div>}
              {isNoida && <div className="pill" style={{ borderColor: "var(--accent)", color: "var(--accent)" }}>🏙 PVVNL Noida — DR</div>}
              {alertCount > 0 && <div className="pill" style={{ borderColor: "var(--danger)", color: "var(--danger)" }}>🔔 {alertCount} Alerts</div>}
            </div>
          </div>
        </div>

        <div className="content">
          {activeScreen === "dashboard"       && !isNoida && <DashboardScreen summary={summary} genProfile={genProfile} ders={ders} />}
          {activeScreen === "fleet"           && !isNoida && <DERFleetScreen ders={ders} summary={summary} />}
          {activeScreen === "network"         && !isNoida && <NetworkScreen summary={summary} />}
          {activeScreen === "planning"        && !isNoida && <PlanningScreen ders={ders} summary={summary} />}
          {activeScreen === "scheduling"      && !isNoida && <SchedulingScreen ders={ders} />}
          {activeScreen === "analytics"       && !isNoida && <AnalyticsScreen ders={ders} genProfile={genProfile} />}
          {activeScreen === "demand-response" && <DemandResponseScreen ders={ders} summary={summary} area={auth.area} />}
          {activeScreen === "programs"        && <ProgramsScreen area={auth.area} />}
          {activeScreen === "integrations"    && !isNoida && <IntegrationScreen />}
          {activeScreen === "oe-monitor"      && !isNoida && <OEMonitorScreen />}
          {activeScreen === "alerts"          && <AlertsScreen area={auth.area} />}
          {activeScreen === "settings"        && !isNoida && <SettingsScreen />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
