      )}
      {!selEvent && <div style={{ color: "var(--text-muted)", textAlign: "center", padding: 40, fontSize: 13 }}>Select an active event to monitor real-time curtailment (PRD Stage 7)</div>}
    </div>
  );
}

function SLDCScheduleTab() {
  const [schedule, setSchedule] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  React.useEffect(() => {
    fetch("/api/dr/sldc-schedule").then(r=>r.json()).then(setSchedule).catch(()=>{});
  }, []);

  const chartData = (schedule?.blocks||[]).map(b => ({
    label: `${String(Math.floor((b.block_number-1)*0.5)).padStart(2,"0")}:${(b.block_number%2===0?"30":"00")}`,
    demand: b.scheduled_demand_mw,
    supply: b.available_supply_mw,
    shortfall: b.shortfall_mw,
  }));

  const shortfallBlocks = (schedule?.blocks||[]).filter(b => b.shortfall_mw > 0);

  return (
    <div>
      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <h3 style={{ margin: 0 }}>SLDC Day-Ahead Schedule</h3>
        <span style={{ fontSize: 11, color: "var(--text-muted)" }}>
          {schedule?.source === "simulated (no upload yet)" ? "⚠️ Demo data (no upload yet)" : `Uploaded by ${schedule?.uploaded_by} at ${schedule?.uploaded_at ? new Date(schedule.uploaded_at).toLocaleTimeString() : "—"}`}
        </span>
        {shortfallBlocks.length > 0 && (
          <span style={{ background: "rgba(239,68,68,0.15)", color: "#FCA5A5", borderRadius: 4, padding: "2px 8px", fontSize: 11 }}>
            ⚠️ {shortfallBlocks.length} shortfall blocks — DR event may be needed
          </span>
        )}
      </div>

      {schedule && (
        <>
          <div className="kpi-grid" style={{ marginBottom: 14 }}>
            <KpiCard label="Date" value={schedule.date||"—"} sub="Schedule date" color="var(--cyan)" icon="📅" />
            <KpiCard label="Shortfall Blocks" value={shortfallBlocks.length} sub="Blocks with demand > supply" color={shortfallBlocks.length > 0 ? "var(--danger)" : "var(--success)"} icon="⚡" />
            <KpiCard label="Total Shortfall" value={(shortfallBlocks.reduce((s,b)=>s+b.shortfall_mw*0.5,0)).toFixed(2)} unit="MWh" sub="Energy deficit" color={shortfallBlocks.length > 0 ? "var(--warning)" : "var(--success)"} icon="📉" />
          </div>
          <SvgLineChart
            data={chartData}
            lines={[
              { key: "demand", label: "Scheduled Demand (MW)", color: "#60A5FA" },
              { key: "supply", label: "Available Supply (MW)", color: "#10B981", dash: "5 3" },
              { key: "shortfall", label: "Shortfall (MW)", color: "#EF4444", fill: "#EF4444" },
            ]}
            height={220}
          />
          <div style={{ marginTop: 10, fontSize: 11, color: "var(--text-muted)" }}>
            In Phase 1 DR Manager uploads SLDC CSV manually (PRD §17.4). Phase 2: automated SFTP/API from UP SLDC.
          </div>
        </>
      )}
    </div>
  );
}

function LifecycleTab({ events }) {
  const [selEvent, setSelEvent] = React.useState("");
  const [lc, setLc] = React.useState(null);
  const [transStage, setTransStage] = React.useState("");
  const [transNote, setTransNote] = React.useState("");
  const [busy, setBusy] = React.useState(false);

  const STAGES = ["DRAFT","APPROVED","NOTIFIED","COMMITTED","ACTIVE","PAUSED","COMPLETED","VERIFIED","SETTLED","ARCHIVED"];
  const STAGE_COLOR = { DRAFT:"#6B7280",APPROVED:"#3B82F6",NOTIFIED:"#8B5CF6",COMMITTED:"#F59E0B",ACTIVE:"#10B981",PAUSED:"#F97316",COMPLETED:"#06B6D4",VERIFIED:"#10B981",SETTLED:"#22C55E",ARCHIVED:"#9CA3AF" };

  const loadLc = (id) => {
    if (!id) return;
    fetch(`/api/dr/events/${id}/lifecycle`).then(r=>r.json()).then(setLc).catch(()=>{});
  };
  React.useEffect(() => { loadLc(selEvent); }, [selEvent]);

  const advance = () => {
    if (!transStage || !selEvent) return;
    setBusy(true);
    fetch(`/api/dr/events/${selEvent}/lifecycle`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ stage: transStage, user: "dr_manager", note: transNote }),
    }).then(r=>r.json()).then(d => { setLc(d); setTransStage(""); setTransNote(""); setBusy(false); }).catch(()=>setBusy(false));
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
        <select value={selEvent} onChange={e => { setSelEvent(e.target.value); setLc(null); }}
          style={{ padding: "6px 12px", background: "var(--secondary)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6 }}>
          <option value="">Select event…</option>
          {(events||[]).map(e => <option key={e.event_id} value={e.event_id}>{e.event_id} — {e.reason}</option>)}
        </select>
      </div>

      {/* Stage pipeline */}
      <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 2, marginBottom: 20 }}>
        {STAGES.map((s, i) => {
          const isActive = lc?.stage === s;
          const isPast = lc ? STAGES.indexOf(lc.stage) > i : false;
          return (
            <React.Fragment key={s}>
              <div style={{ padding: "5px 12px", borderRadius: 4, fontSize: 11, fontWeight: isActive ? 700 : 400,
                background: isActive ? STAGE_COLOR[s] : isPast ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)",
                color: isActive ? "#fff" : isPast ? "var(--text-muted)" : "rgba(255,255,255,0.3)",
                border: isActive ? `1px solid ${STAGE_COLOR[s]}` : "1px solid rgba(255,255,255,0.1)",
              }}>{s}</div>
              {i < STAGES.length - 1 && <div style={{ color: "rgba(255,255,255,0.2)", fontSize: 12 }}>→</div>}
            </React.Fragment>
          );
        })}
      </div>

      {lc && (
        <div>
          <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: 14, marginBottom: 14 }}>
            <div style={{ fontSize: 13, marginBottom: 4 }}>Current Stage: <b style={{ color: STAGE_COLOR[lc.stage] || "var(--accent)" }}>{lc.stage}</b></div>
            <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Allowed transitions: {(lc.allowed_transitions||[]).join(", ") || "None (terminal)"}</div>
          </div>

          {lc.allowed_transitions?.length > 0 && (
            <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
              <div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>Advance to</div>
                <select value={transStage} onChange={e => setTransStage(e.target.value)}
                  style={{ padding: "6px 12px", background: "var(--secondary)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6 }}>
                  <option value="">Select stage…</option>
                  {lc.allowed_transitions.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>Note (optional)</div>
                <input value={transNote} onChange={e => setTransNote(e.target.value)} placeholder="Approval note…"
                  style={{ padding: "6px 12px", background: "var(--secondary)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6, width: "100%", boxSizing: "border-box" }} />
              </div>
              <button onClick={advance} disabled={busy || !transStage} style={{ padding: "8px 20px", background: "var(--accent)", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer" }}>
                {busy ? "…" : "Advance →"}
              </button>
            </div>
          )}

          <div style={{ fontSize: 12, color: "var(--accent)", fontWeight: 600, marginBottom: 8 }}>History</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {(lc.history||[]).map((h, i) => (
              <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", fontSize: 12, padding: "5px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                <div style={{ width: 90, fontWeight: 600, color: STAGE_COLOR[h.stage] || "var(--text)" }}>{h.stage}</div>
                <div style={{ color: "var(--text-muted)" }}>{h.ts ? new Date(h.ts).toLocaleString() : ""}</div>
                <div style={{ color: "var(--text-muted)" }}>by {h.user}</div>
                {h.note && <div style={{ color: "var(--text-secondary)", fontStyle: "italic" }}>{h.note}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
      {!selEvent && <div style={{ color: "var(--text-muted)", textAlign: "center", padding: 40 }}>Select an event to manage its 10-stage lifecycle</div>}
    </div>
  );
}

// ─── Alerts Screen (Module 7) ─────────────────────────────────────────────────

function AlertsScreen({ area }) {
  const isNoida = area === "noida";
  const [alerts, setAlerts] = useState([]);
  const [filter, setFilter] = useState("ALL");  // ALL | OPEN | ACKNOWLEDGED | RESOLVED
  const [priorityFilter, setPriorityFilter] = useState("ALL");
  const [seeding, setSeeding] = useState(false);
  const [acting, setActing] = useState(null);

  const load = () => apiFetch("/api/dashboard/alerts?limit=100").then(d => {
    if (d) setAlerts(d.alerts || []);
  });

  useEffect(() => {
    load();
    const iv = setInterval(load, 15000);
    return () => clearInterval(iv);
  }, []);

  const seedDemo = async () => {
    setSeeding(true);
    await fetch("/api/dashboard/alerts/seed-demo", { method: "POST" });
    await load();
    setSeeding(false);
  };

  const doAction = async (alertId, action) => {
    setActing(alertId + action);
    await fetch(`/api/dashboard/alerts/${alertId}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, user: "operator" }),
    });
    await load();
    setActing(null);
  };

  const counts = {
    OPEN: alerts.filter(a => (a.state||"OPEN") === "OPEN" && !a.resolved).length,
    ACKNOWLEDGED: alerts.filter(a => (a.state||"OPEN") === "ACKNOWLEDGED").length,
    RESOLVED: alerts.filter(a => a.resolved || (a.state||"OPEN") === "RESOLVED").length,
  };

  const alertTypeIcon = t => t === "critical" ? "🔴" : t === "warning" ? "🟡" : "🔵";
  const stateColor = s => s === "OPEN" ? "var(--danger)" : s === "ACKNOWLEDGED" ? "var(--warning)" : "var(--success)";

  // For Noida: only show DR-related alerts (filter by source type)
  const displayAlerts = isNoida
    ? alerts.filter(a => !a.source || ["DR","Demand Response","Consumer","M&V"].includes(a.source))
    : alerts;
  const filteredDisplay = displayAlerts.filter(a => {
    const state = a.state || (a.resolved ? "RESOLVED" : "OPEN");
    const matchState = filter === "ALL" || state === filter;
    const matchPriority = priorityFilter === "ALL" || a.priority === priorityFilter;
    return matchState && matchPriority;
  });

  return (
    <div>
      {isNoida && (
        <div style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.25)", borderRadius: 8, padding: "8px 16px", marginBottom: 12, fontSize: 12, color: "var(--accent)" }}>
          🏙 Showing DR-related alarms only · PVVNL Noida area
        </div>
      )}
      <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4,1fr)" }}>
        <KpiCard label="Open" value={counts.OPEN} color="var(--danger)" icon="🔔" sub="Requires attention" />
        <KpiCard label="Acknowledged" value={counts.ACKNOWLEDGED} color="var(--warning)" icon="👁️" sub="Under review" />
        <KpiCard label="Resolved" value={counts.RESOLVED} color="var(--success)" icon="✅" sub="Closed" />
        <KpiCard label="Total Alerts" value={displayAlerts.length} color="var(--cyan)" icon="📋" sub="All time (session)" />
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
        <div className="tabs">
          {["ALL","OPEN","ACKNOWLEDGED","RESOLVED"].map(f => (
            <div key={f} className={`tab ${filter===f?"active":""}`} onClick={() => setFilter(f)}>
              {f === "ALL" ? "All" : f} {f !== "ALL" && counts[f] > 0 ? `(${counts[f]})` : ""}
            </div>
          ))}
        </div>
        <select value={priorityFilter} onChange={e => setPriorityFilter(e.target.value)}
          style={{ background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 10px", borderRadius: 6, fontSize: 12 }}>
          <option value="ALL">All Priorities</option>
          <option value="HIGH">HIGH</option>
          <option value="MEDIUM">MEDIUM</option>
          <option value="LOW">LOW</option>
        </select>
        <button onClick={seedDemo} disabled={seeding}
          style={{ background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text-muted)", padding: "6px 12px", borderRadius: 6, cursor: "pointer", fontSize: 12 }}>
          {seeding ? "Seeding…" : "+ Seed Demo Alerts"}
        </button>
      </div>

      <div className="card" style={{ padding: 0 }}>
        <table>
          <thead>
            <tr>
              <th>Type</th><th>Priority</th><th>State</th><th>Message</th>
              <th>Module</th><th>Resource</th><th>Created</th><th>Acknowledged</th><th>Resolved</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {filteredDisplay.length === 0 && (
              <tr><td colSpan={10} style={{ textAlign: "center", color: "var(--text-muted)", padding: 24 }}>
                No alerts match filter. {alerts.length === 0 && <span>Click "+ Seed Demo Alerts" to add sample alerts.</span>}
              </td></tr>
            )}
            {filteredDisplay.map(a => {
              const state = a.state || (a.resolved ? "RESOLVED" : "OPEN");
              return (
                <tr key={a.id} style={{ opacity: state === "RESOLVED" ? 0.6 : 1 }}>
                  <td>{alertTypeIcon(a.alert_type)}</td>
                  <td>
                    <span className={`badge ${a.priority==="HIGH"?"badge-critical":a.priority==="MEDIUM"?"badge-warning":"badge-info"}`}>
                      {a.priority}
                    </span>
                  </td>
                  <td>
                    <span style={{ fontWeight: 600, fontSize: 11, color: stateColor(state) }}>{state}</span>
                  </td>
                  <td style={{ fontSize: 12, maxWidth: 320 }}>{a.message}</td>
                  <td><span className="tag">{a.module || "—"}</span></td>
                  <td style={{ fontSize: 10, fontFamily: "monospace", color: "var(--text-muted)" }}>{a.resource_id || "—"}</td>
                  <td style={{ fontSize: 10, color: "var(--text-muted)", whiteSpace: "nowrap" }}>
                    {a.created_at ? new Date(a.created_at).toLocaleTimeString() : "—"}
                  </td>
                  <td style={{ fontSize: 10, color: "var(--text-muted)", whiteSpace: "nowrap" }}>
                    {a.acknowledged_at ? new Date(a.acknowledged_at).toLocaleTimeString() : "—"}
                    {a.acknowledged_by ? <div style={{ color: "var(--cyan)" }}>{a.acknowledged_by}</div> : null}
                  </td>
                  <td style={{ fontSize: 10, color: "var(--text-muted)", whiteSpace: "nowrap" }}>
                    {a.resolved_at ? new Date(a.resolved_at).toLocaleTimeString() : "—"}
                    {a.resolved_by ? <div style={{ color: "var(--success)" }}>{a.resolved_by}</div> : null}
                  </td>
                  <td style={{ whiteSpace: "nowrap" }}>
                    {state === "OPEN" && (
                      <button onClick={() => doAction(a.id, "acknowledge")}
                        disabled={acting === a.id + "acknowledge"}
                        style={{ background: "rgba(245,158,11,0.15)", border: "1px solid var(--warning)", color: "var(--warning)", padding: "3px 8px", borderRadius: 4, cursor: "pointer", fontSize: 10, marginRight: 4 }}>
                        Ack
                      </button>
                    )}
                    {(state === "OPEN" || state === "ACKNOWLEDGED") && (
                      <button onClick={() => doAction(a.id, "resolve")}
                        disabled={acting === a.id + "resolve"}
                        style={{ background: "rgba(16,185,129,0.15)", border: "1px solid var(--success)", color: "var(--success)", padding: "3px 8px", borderRadius: 4, cursor: "pointer", fontSize: 10 }}>
                        Resolve
                      </button>
                    )}
                    {state === "RESOLVED" && (
                      <span style={{ fontSize: 10, color: "var(--success)" }}>✓ Closed</span>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="card" style={{ marginTop: 14 }}>
        <div className="card-title">📋 Alert Lifecycle</div>
        <div style={{ display: "flex", gap: 0, alignItems: "center", justifyContent: "center", padding: "16px 0" }}>
          {[
            { state: "OPEN", color: "var(--danger)", desc: "Alert generated", icon: "🔴" },
            { state: "→", color: "var(--text-muted)", desc: "", icon: "" },
            { state: "ACKNOWLEDGED", color: "var(--warning)", desc: "Operator is investigating", icon: "🟡" },
            { state: "→", color: "var(--text-muted)", desc: "", icon: "" },
            { state: "RESOLVED", color: "var(--success)", desc: "Root cause addressed", icon: "🟢" },
          ].map((s, i) => s.state === "→" ? (
            <div key={i} style={{ fontSize: 20, color: s.color, margin: "0 16px" }}>→</div>
          ) : (
            <div key={i} style={{ textAlign: "center", width: 140 }}>
              <div style={{ fontSize: 24 }}>{s.icon}</div>
              <div style={{ fontWeight: 700, color: s.color, marginTop: 4 }}>{s.state}</div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>{s.desc}</div>
            </div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginTop: 8, fontSize: 11 }}>
          {[
            ["Configurable Thresholds", "Voltage > 244V / < 216V, Loading > 80%, HC > 80%"],
            ["Auto-generation", "Monitoring loop generates alerts; operator action required to close"],
            ["PRD Module 7", "Alert Management — OPEN / ACKNOWLEDGED / RESOLVED lifecycle"],
          ].map(([k,v]) => (
            <div key={k} style={{ background: "var(--bg)", borderRadius: 6, padding: "8px 12px" }}>
              <div style={{ fontWeight: 600, marginBottom: 4, color: "var(--cyan)" }}>{k}</div>
              <div style={{ color: "var(--text-muted)" }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Programs Screen (Module C) ──────────────────────────────────────────────

function ProgramsScreen({ area }) {
  const isNoida = area === "noida";
  const { useState, useEffect } = React;
  const [programs, setPrograms] = useState([]);
  const [selected, setSelected] = useState(null);
  const [counterparty, setCounterparty] = useState(null);
  const [prosumers, setProsumers] = useState([]);
  const [tab, setTab] = useState("counterparty");
  const [showCreate, setShowCreate] = useState(false);
  const [form, setForm] = useState({ program_name: "", program_description: "", feeder_scope: "LK1", start_date: "2026-01-01", end_date: "2026-12-31", counterparty_name: "" });
  const [saving, setSaving] = useState(false);

  const load = () => apiFetch("/api/programs").then(d => d && setPrograms(d.programs || []));
  useEffect(() => { load(); }, []);

  const selectProgram = async (prog) => {
    setSelected(prog);
    setTab("counterparty");
    const [cp, pr] = await Promise.all([
      apiFetch(`/api/programs/${prog.program_id}/counterparty`),
      apiFetch(`/api/programs/${prog.program_id}/prosumers`),
    ]);
    if (cp) setCounterparty(cp);
    if (pr) setProsumers(pr.enrollments || []);
  };

  const createProgram = async () => {
    setSaving(true);
    const body = { ...form, feeder_scope: form.feeder_scope ? form.feeder_scope.split(",").map(s => s.trim()) : [] };
    const r = await fetch("/api/programs", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (r.ok) { await load(); setShowCreate(false); setForm({ program_name: "", program_description: "", feeder_scope: "LK1", start_date: "2026-01-01", end_date: "2026-12-31", counterparty_name: "" }); }
    setSaving(false);
  };

  const activateProgram = async (pid, status) => {
    await fetch(`/api/programs/${pid}/status`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status }) });
    load();
    if (selected?.program_id === pid) setSelected(prev => ({ ...prev, status }));
  };

  const statusColor = s => ({ ACTIVE: "var(--success)", DRAFT: "var(--text-muted)", PAUSED: "var(--warning)", CLOSED: "var(--danger)" }[s] || "var(--text-muted)");

  // 30-day bar chart SVG
  const BarChart30d = ({ data }) => {
    if (!data?.length) return null;
    const W = 600, H = 120, PL = 36, PR = 8, PT = 6, PB = 24;
    const cw = W - PL - PR, ch = H - PT - PB;
    const maxV = Math.max(...data.map(d => d.gen_kwh), 1);
    const bw = (cw / data.length) * 0.7;
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: H }} preserveAspectRatio="none">
        {[0, 0.5, 1].map(t => <line key={t} x1={PL} x2={W - PR} y1={PT + ch * t} y2={PT + ch * t} stroke="#2A3A52" strokeDasharray="3 3" />)}
        {data.map((d, i) => {
          const gx = PL + (i / data.length) * cw + (cw / data.length - bw) / 2;
          const bh = (d.gen_kwh / maxV) * ch;
          return (
            <g key={i}>
              <rect x={gx} y={PT + ch - bh} width={bw} height={bh} fill="#FCD34D" rx={1} opacity={0.85} />
              {i % 6 === 0 && <text x={gx + bw / 2} y={H - 8} textAnchor="middle" fontSize={8} fill="#8B9CB8">{d.date}</text>}
            </g>
          );
        })}
        {[0, 0.5, 1].map(t => <text key={t} x={PL - 3} y={PT + ch * (1 - t) + 4} textAnchor="end" fontSize={8} fill="#8B9CB8">{Math.round(maxV * t)}</text>)}
      </svg>
    );
  };

  if (selected) {
    return (
      <div className="screen" style={{ overflowY: "auto" }}>
        <div className="screen-header" style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setSelected(null)} style={{ background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text-muted)", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 12 }}>← Back</button>
          <div>
            <div className="screen-title">{selected.program_name}</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)" }}>ID: {selected.program_id} · Incentive: {selected.incentive_type} (Phase 1 locked) · {selected.start_date} → {selected.end_date}</div>
          </div>
          <span style={{ marginLeft: "auto", padding: "4px 14px", borderRadius: 12, background: "rgba(0,0,0,0.3)", border: `1px solid ${statusColor(selected.status)}`, color: statusColor(selected.status), fontSize: 12, fontWeight: 700 }}>{selected.status}</span>
          {selected.status === "DRAFT" && <button onClick={() => activateProgram(selected.program_id, "ACTIVE")} style={{ background: "var(--success)", border: "none", color: "#fff", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>Activate</button>}
          {selected.status === "ACTIVE" && <button onClick={() => activateProgram(selected.program_id, "PAUSED")} style={{ background: "var(--warning)", border: "none", color: "#000", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>Pause</button>}
        </div>

        {counterparty && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, marginBottom: 16 }}>
            {(isNoida ? [
              ["C&I Consumers", counterparty.enrolled_count, "var(--cyan)"],
              ["Registered", counterparty.registered_count, "var(--success)"],
              ["Total Load (MD)", `${counterparty.total_capacity_kWp} kVA`, "var(--warning)"],
              ["Last DR Reduction", `${counterparty.total_gen_kW} kW`, "var(--accent)"],
              ["Today's Savings", `${counterparty.today_gen_kWh} kWh`, "var(--solar)"],
            ] : [
              ["Total Capacity", `${counterparty.total_capacity_kWp} kWp`, "var(--solar)"],
              ["Current Gen", `${counterparty.total_gen_kW} kW`, "var(--success)"],
              ["Today's Gen", `${counterparty.today_gen_kWh} kWh`, "var(--cyan)"],
              ["Enrolled", counterparty.enrolled_count, "var(--text)"],
              ["Registered", counterparty.registered_count, "var(--success)"],
            ]).map(([label, val, color]) => (
              <div key={label} style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 8, padding: "12px 14px" }}>
                <div style={{ fontSize: 10, color: "var(--text-muted)", textTransform: "uppercase" }}>{label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color, marginTop: 4 }}>{val}</div>
              </div>
            ))}
          </div>
        )}

        <div className="tab-bar" style={{ marginBottom: 14 }}>
          {[["counterparty", isNoida ? "📊 DR Pool" : "📊 Counterparty"], ["prosumers", isNoida ? "👥 C&I Consumers" : "👥 Prosumers"]].map(([id, label]) => (
            <div key={id} className={`tab ${tab === id ? "active" : ""}`} onClick={() => setTab(id)}>{label}</div>
          ))}
        </div>

        {tab === "counterparty" && counterparty && (
          <div>
            <div className="card">
              <div className="card-title">{isNoida ? "📈 30-Day DR Reduction — Pool Aggregate (kWh/day)" : "📈 30-Day Generation — Counterparty Aggregate (kWh/day)"}</div>
              <BarChart30d data={counterparty.gen_30d} />
            </div>
            <div className="card" style={{ marginTop: 12 }}>
              <div className="card-title">{isNoida ? "🏙️ Zone Breakdown" : "🏗️ DT Breakdown"}</div>
              <table>
                <thead><tr><th>{isNoida ? "Zone / Feeder" : "DT ID"}</th><th>{isNoida ? "Consumers" : "DERs"}</th><th>{isNoida ? "Contracted MD (kVA)" : "Capacity (kWp)"}</th><th>{isNoida ? "Last DR (kW)" : "Current Gen (kW)"}</th></tr></thead>
                <tbody>
                  {counterparty.dt_breakdown.map(dt => (
                    <tr key={dt.dt_id}>
                      <td style={{ fontWeight: 600 }}>{dt.dt_id}</td>
                      <td>{dt.der_count}</td>
                      <td style={{ color: "var(--solar)" }}>{dt.capacity_kWp}</td>
                      <td style={{ color: "var(--success)" }}>{dt.gen_kW}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="card" style={{ marginTop: 12, borderColor: "var(--border)", fontSize: 12 }}>
              <div className="card-title">ℹ️ {isNoida ? "DR Program Model (Phase 1)" : "Counterparty Model (Phase 1)"}</div>
              <div style={{ color: "var(--text-muted)", lineHeight: 1.8 }}>
                {isNoida
                  ? <>All C&amp;I consumers enrolled in <strong style={{ color: "var(--text)" }}>{counterparty.counterparty_name}</strong> participate as a single DR pool. Baseline (CBL) computed per CERC methodology. No market standing or SLDC participation in Phase 1.</>
                  : <>All prosumers in <strong style={{ color: "var(--text)" }}>{counterparty.counterparty_name}</strong> are reported as a single counterparty entity. This is an internal operational grouping (Option C per PRD). No VPP regulatory registration, no SLDC participation, no market standing in Phase 1.</>
                }
                &nbsp;Incentive type is <strong style={{ color: "var(--accent)" }}>ADVISORY</strong> — locked for Phase 1.
              </div>
            </div>
          </div>
        )}

        {tab === "prosumers" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 12, color: "var(--text-muted)" }}>{prosumers.length} enrolled {isNoida ? "C&I consumers" : "prosumers"}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={async () => { await fetch(`/api/programs/${selected.program_id}/prosumers/seed-demo`, { method: "POST" }); const pr = await apiFetch(`/api/programs/${selected.program_id}/prosumers`); if (pr) setProsumers(pr.enrollments || []); }}
                  style={{ background: "var(--secondary)", border: "none", color: "#fff", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 12 }}>
                  {isNoida ? "+ Seed Noida C&I" : "+ Seed LK1 DERs"}
                </button>
              </div>
            </div>
            <div className="card" style={{ padding: 0, overflow: "hidden" }}>
              <table>
                <thead><tr><th>Consumer ID</th><th>Name</th><th>DT</th><th>Capacity (kWp)</th><th>Metering</th><th>Status</th><th>Invited</th><th>Registered</th></tr></thead>
                <tbody>
                  {prosumers.map(e => {
                    const sColor = { REGISTERED: "var(--success)", INVITED: "var(--warning)", SUSPENDED: "var(--danger)", REMOVED: "var(--text-muted)" }[e.enrolment_status] || "var(--text-muted)";
                    return (
                      <tr key={e.consumer_id}>
                        <td style={{ fontFamily: "monospace", fontSize: 11 }}>{e.consumer_id}</td>
                        <td>{e.name}</td>
                        <td>{e.dt_id}</td>
                        <td style={{ color: "var(--solar)" }}>{e.capacity_kWp}</td>
                        <td><span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "rgba(16,185,129,0.1)", color: "var(--success)", border: "1px solid rgba(16,185,129,0.3)" }}>{e.metering_type}</span></td>
                        <td><span style={{ fontSize: 10, fontWeight: 700, color: sColor }}>{e.enrolment_status}</span></td>
                        <td style={{ fontSize: 10, color: "var(--text-muted)" }}>{e.invited_at ? e.invited_at.slice(0, 10) : "—"}</td>
                        <td style={{ fontSize: 10, color: "var(--text-muted)" }}>{e.registered_at ? e.registered_at.slice(0, 10) : "—"}</td>
                      </tr>
                    );
                  })}
                  {prosumers.length === 0 && <tr><td colSpan={8} style={{ textAlign: "center", padding: 24, color: "var(--text-muted)" }}>No {isNoida ? "C&I consumers" : "prosumers"} enrolled. Click "{isNoida ? "Seed Noida C&I" : "Seed LK1 DERs"}" to add demo data.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="screen" style={{ overflowY: "auto" }}>
      <div className="screen-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div className="screen-title">{isNoida ? "📋 DR Programs" : "📋 DERMS Programs"}</div>
          <div className="screen-sub">{isNoida ? "Manage demand response programs and enrolment for PVVNL Noida C&I consumers" : "Manage programs, enrol prosumers, track counterparty performance"}</div>
        </div>
        <button onClick={() => setShowCreate(true)} style={{ background: "var(--accent)", border: "none", color: "#000", borderRadius: 7, padding: "8px 18px", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>+ New Program</button>
      </div>
      {isNoida && (
        <div style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.3)", borderRadius: 8, padding: "10px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 16 }}>🏙</span>
          <span style={{ fontSize: 13, color: "var(--text-muted)" }}><strong style={{ color: "var(--text)" }}>PVVNL Noida</strong> — Demand Response Management &nbsp;·&nbsp; Programs shown are DR programs for C&amp;I consumers in the Noida jurisdiction.</span>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 20 }}>
        {[
          ["Active Programs", programs.filter(p => p.status === "ACTIVE").length, "var(--success)"],
          ["Total Enrolled", programs.reduce((s, p) => s + (p.enrolled_count || 0), 0), "var(--solar)"],
          ["Total Registered", programs.reduce((s, p) => s + (p.registered_count || 0), 0), "var(--cyan)"],
        ].map(([label, val, color]) => (
          <div key={label} style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 18px" }}>
            <div style={{ fontSize: 11, color: "var(--text-muted)", textTransform: "uppercase" }}>{label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color }}>{val}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <table>
          <thead>
            <tr><th>Program</th><th>Feeder Scope</th><th>Status</th><th>Incentive</th><th>Enrolled</th><th>Registered</th><th>Period</th><th></th></tr>
          </thead>
          <tbody>
            {programs.map(p => (
              <tr key={p.program_id} style={{ cursor: "pointer" }} onClick={() => selectProgram(p)}>
                <td>
                  <div style={{ fontWeight: 600 }}>{p.program_name}</div>
                  <div style={{ fontSize: 10, color: "var(--text-muted)" }}>{p.program_id}</div>
                </td>
                <td style={{ fontSize: 11 }}>{(p.feeder_scope || []).join(", ") || "—"}</td>
                <td><span style={{ fontWeight: 700, color: statusColor(p.status), fontSize: 11 }}>{p.status}</span></td>
                <td><span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "rgba(247,179,43,0.15)", color: "var(--accent)", border: "1px solid rgba(247,179,43,0.3)" }}>{p.incentive_type}</span></td>
                <td>{p.enrolled_count || 0}</td>
                <td style={{ color: "var(--success)" }}>{p.registered_count || 0}</td>
                <td style={{ fontSize: 11, color: "var(--text-muted)" }}>{p.start_date} → {p.end_date}</td>
                <td><span style={{ color: "var(--accent)", fontSize: 12 }}>View →</span></td>
              </tr>
            ))}
            {programs.length === 0 && <tr><td colSpan={8} style={{ textAlign: "center", padding: 24, color: "var(--text-muted)" }}>No programs yet. Click "New Program" to create one.</td></tr>}
          </tbody>
        </table>
      </div>

      {showCreate && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}>
          <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 12, padding: 28, width: 480 }}>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 18 }}>Create New Program</div>
            {[
              ["Program Name", "program_name", "text", isNoida ? "e.g. Noida C&I Peak Shaving 2026" : "e.g. Varanasi Voltage Pilot 2026"],
              ["Description", "program_description", "text", "Programme objective"],
              [isNoida ? "Area / Zone" : "Feeder Scope (comma-sep)", "feeder_scope", "text", isNoida ? "e.g. Noida Sector 18, Sector 62" : "e.g. LK1, LK2"],
              ["Counterparty Name", "counterparty_name", "text", isNoida ? "e.g. PVVNL Noida C&I Pool 2026" : "e.g. PuVVNL DER Pool 2026"],
              ["Start Date", "start_date", "date", ""],
              ["End Date", "end_date", "date", ""],
            ].map(([label, key, type, ph]) => (
              <div key={key} style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 11, color: "var(--text-muted)", display: "block", marginBottom: 4, textTransform: "uppercase" }}>{label}</label>
                <input type={type} placeholder={ph} value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                  style={{ width: "100%", background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6, padding: "8px 12px", fontSize: 13, boxSizing: "border-box" }} />
              </div>
            ))}
            <div style={{ fontSize: 11, color: "var(--text-muted)", padding: "8px 12px", background: "var(--bg)", borderRadius: 6, marginBottom: 14 }}>
              Incentive type is locked to <strong style={{ color: "var(--accent)" }}>ADVISORY</strong> in Phase 1. Financial and lucky draw incentives are Phase 2.
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setShowCreate(false)} style={{ background: "transparent", border: "1px solid var(--border)", color: "var(--text-muted)", borderRadius: 6, padding: "7px 16px", cursor: "pointer" }}>Cancel</button>
              <button onClick={createProgram} disabled={saving || !form.program_name}
                style={{ background: "var(--accent)", border: "none", color: "#000", borderRadius: 6, padding: "7px 18px", cursor: "pointer", fontWeight: 700 }}>
                {saving ? "Creating…" : "Create Program"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function IntegrationScreen() {
  const [tab, setTab] = React.useState("counterparties");
  return (
    <div>
      <div style={{ display: "flex", gap: 4, marginBottom: 20, borderBottom: "1px solid var(--border)", paddingBottom: 0 }}>
        {[["counterparties", "🔌 Counterparties"], ["netconfig", "⚙️ Network Config"]].map(([t, l]) => (
          <button key={t} onClick={() => setTab(t)} style={{
            padding: "8px 18px", border: "none", background: "transparent",
            color: tab === t ? "var(--accent)" : "var(--text-muted)", cursor: "pointer", fontSize: 13, fontWeight: tab === t ? 600 : 400,
            borderBottom: tab === t ? "2px solid var(--accent)" : "2px solid transparent", marginBottom: -1,
          }}>{l}</button>
        ))}
      </div>
      {tab === "counterparties" && <CounterpartiesTab />}
      {tab === "netconfig"      && <NetworkConfigTab />}
    </div>
  );
}

function CounterpartiesTab() {
  const [cps, setCps] = React.useState([]);
  const [expanded, setExpanded] = React.useState(null);
  const [detail, setDetail] = React.useState({});
  const [showAdd, setShowAdd] = React.useState(false);
  const [testing, setTesting] = React.useState({});
  const [syncing, setSyncing] = React.useState({});
  const [newCp, setNewCp] = React.useState({
    name: "", type: "DER_AGGREGATOR", api_base_url: "", auth_type: "api_key",
    api_key_header: "X-API-Key", api_key: "", notes: ""
  });
  const [addErr, setAddErr] = React.useState("");

  const reload = () => apiFetch("/api/counterparties").then(d => setCps(d.counterparties || []));
  React.useEffect(() => { reload(); }, []);

  const healthColor = h => h === "ok" ? "var(--success)" : h === "error" ? "var(--danger)" : "var(--text-muted)";
  const healthLabel = h => h === "ok" ? "● Healthy" : h === "error" ? "● Error" : "● Unknown";

  const testCp = async (id) => {
    setTesting(p => ({ ...p, [id]: true }));
    const r = await apiFetch(`/api/counterparties/${id}/test`, { method: "POST" });
    reload();
    setTesting(p => ({ ...p, [id]: false }));
    alert(r.ok ? `✅ Connected: ${r.provider} — ${r.der_count} DERs` : `❌ Failed: ${r.error}`);
  };

  const syncCp = async (id) => {
    setSyncing(p => ({ ...p, [id]: true }));
    const r = await apiFetch(`/api/counterparties/${id}/sync`, { method: "POST" });
    reload();
    setSyncing(p => ({ ...p, [id]: false }));
    if (r.status === "synced") alert(`✅ Synced ${r.count} DERs into fleet`);
    else alert(`❌ Sync failed: ${r.detail || "unknown error"}`);
  };

  const deleteCp = async (id) => {
    if (!confirm("Remove this counterparty?")) return;
    await apiFetch(`/api/counterparties/${id}`, { method: "DELETE" });
    reload();
    if (expanded === id) setExpanded(null);
  };

  const expandCp = async (id) => {
    if (expanded === id) { setExpanded(null); return; }
    setExpanded(id);
    if (!detail[id]) {
      const [assets, forecast, baseline, telemetry] = await Promise.all([
        apiFetch(`/api/counterparties/${id}/assets`).catch(() => ({ assets: [] })),
        apiFetch(`/api/counterparties/${id}/forecast`).catch(() => ({ forecast: [] })),
        apiFetch(`/api/counterparties/${id}/baseline`).catch(() => ({ baseline: [] })),
        apiFetch(`/api/counterparties/${id}/telemetry`).catch(() => ({ telemetry: [] })),
      ]);
      const telMap = {};
      (telemetry.telemetry || []).forEach(t => { telMap[t.id] = t; });
      setDetail(p => ({ ...p, [id]: { assets: assets.assets || [], forecast: forecast.forecast || [], baseline: baseline.baseline || [], telMap } }));
    }
  };

  const addCounterparty = async () => {
    setAddErr("");
    if (!newCp.name || !newCp.api_base_url) { setAddErr("Name and API URL are required"); return; }
    const r = await apiFetch("/api/counterparties", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(newCp) });
    if (r.id) { reload(); setShowAdd(false); setNewCp({ name: "", type: "DER_AGGREGATOR", api_base_url: "", auth_type: "api_key", api_key_header: "X-API-Key", api_key: "", notes: "" }); }
    else setAddErr(r.detail || "Failed to add counterparty");
  };

  const inp = { background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", padding: "7px 10px", fontSize: 12, width: "100%", boxSizing: "border-box" };
  const sel = { ...inp };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
        <div>
          <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>DER Aggregator Counterparties</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
            Integrate third-party DER aggregators via REST API. Each counterparty exposes assets, telemetry, baseline and forecast endpoints.
          </div>
        </div>
        <button onClick={() => setShowAdd(p => !p)} style={{ padding: "8px 16px", background: "var(--accent)", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600, flexShrink: 0, marginLeft: 16 }}>
          + Add Counterparty
        </button>
      </div>

      {showAdd && (
        <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 10, padding: 20, marginBottom: 16 }}>
          <div style={{ fontWeight: 600, fontSize: 13, color: "var(--accent)", marginBottom: 14 }}>Configure New Counterparty</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>Organisation Name *</div>
              <input style={inp} placeholder="e.g. SunEnergy Aggregators Pvt Ltd" value={newCp.name} onChange={e => setNewCp(p => ({ ...p, name: e.target.value }))} />
            </div>
            <div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>Type</div>
              <select style={sel} value={newCp.type} onChange={e => setNewCp(p => ({ ...p, type: e.target.value }))}>
                <option value="DER_AGGREGATOR">DER Aggregator</option>
                <option value="VPP_OPERATOR">VPP Operator</option>
                <option value="METERING_AGENCY">Metering Agency</option>
                <option value="EPC_CONTRACTOR">EPC Contractor</option>
              </select>
            </div>
            <div style={{ gridColumn: "1 / -1" }}>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>API Base URL * <span style={{ color: "rgba(255,255,255,0.3)" }}>(e.g. https://api.example.com/v1)</span></div>
              <input style={inp} placeholder="https://api.aggregator.com/v1" value={newCp.api_base_url} onChange={e => setNewCp(p => ({ ...p, api_base_url: e.target.value }))} />
            </div>
            <div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>Auth Type</div>
              <select style={sel} value={newCp.auth_type} onChange={e => setNewCp(p => ({ ...p, auth_type: e.target.value }))}>
                <option value="api_key">API Key (Header)</option>
                <option value="bearer">Bearer Token</option>
                <option value="none">No Auth</option>
              </select>
            </div>
            {newCp.auth_type === "api_key" && (
              <div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>API Key Header</div>
                <input style={inp} placeholder="X-API-Key" value={newCp.api_key_header} onChange={e => setNewCp(p => ({ ...p, api_key_header: e.target.value }))} />
              </div>
            )}
            {newCp.auth_type !== "none" && (
              <div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>API Key / Token</div>
                <input style={inp} type="password" placeholder="••••••••" value={newCp.api_key} onChange={e => setNewCp(p => ({ ...p, api_key: e.target.value }))} />
              </div>
            )}
            <div style={{ gridColumn: "1 / -1" }}>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>Notes</div>
              <input style={inp} placeholder="Optional notes about this counterparty" value={newCp.notes} onChange={e => setNewCp(p => ({ ...p, notes: e.target.value }))} />
            </div>
          </div>
          <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 10, marginBottom: 4, fontStyle: "italic" }}>
            Required endpoints: GET /health · /assets · /telemetry · /forecast · /baseline
          </div>
          {addErr && <div style={{ color: "var(--danger)", fontSize: 12, marginBottom: 8 }}>❌ {addErr}</div>}
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button onClick={addCounterparty} style={{ padding: "8px 20px", background: "var(--accent)", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>Save Counterparty</button>
            <button onClick={() => setShowAdd(false)} style={{ padding: "8px 16px", background: "transparent", color: "var(--text-muted)", border: "1px solid var(--border)", borderRadius: 6, cursor: "pointer", fontSize: 13 }}>Cancel</button>
          </div>
        </div>
      )}

      {cps.length === 0 && !showAdd && (
        <div style={{ padding: 40, textAlign: "center", color: "var(--text-muted)", fontSize: 12 }}>
          No counterparties configured. Click "+ Add Counterparty" to integrate your first DER aggregator.
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {cps.map(cp => (
          <div key={cp.id} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden" }}>
            {/* Header row */}
            <div style={{ display: "flex", alignItems: "center", padding: "14px 16px", gap: 12, cursor: "pointer" }} onClick={() => expandCp(cp.id)}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: "var(--text)", marginBottom: 2 }}>{cp.name}</div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "monospace", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cp.api_base_url}</div>
              </div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", background: "rgba(255,255,255,0.06)", padding: "3px 8px", borderRadius: 4, flexShrink: 0 }}>{cp.type?.replace("_", " ")}</div>
              <div style={{ fontSize: 11, color: healthColor(cp.health), fontWeight: 600, flexShrink: 0 }}>{healthLabel(cp.health)}</div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", flexShrink: 0 }}>{cp.der_count || 0} DERs</div>
              {cp.last_sync && <div style={{ fontSize: 10, color: "var(--text-muted)", flexShrink: 0 }}>Synced {new Date(cp.last_sync).toLocaleString("en-IN", { dateStyle: "short", timeStyle: "short" })}</div>}
              <div style={{ display: "flex", gap: 6, flexShrink: 0 }} onClick={e => e.stopPropagation()}>
                <button disabled={testing[cp.id]} onClick={() => testCp(cp.id)} style={{ padding: "5px 10px", background: "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.3)", color: "var(--accent)", borderRadius: 5, cursor: "pointer", fontSize: 11 }}>
                  {testing[cp.id] ? "…" : "Test"}
                </button>
                <button disabled={syncing[cp.id]} onClick={() => syncCp(cp.id)} style={{ padding: "5px 10px", background: "rgba(16,185,129,0.12)", border: "1px solid rgba(16,185,129,0.3)", color: "var(--success)", borderRadius: 5, cursor: "pointer", fontSize: 11 }}>
                  {syncing[cp.id] ? "…" : "Sync Assets"}
                </button>
                <button onClick={() => deleteCp(cp.id)} style={{ padding: "5px 8px", background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)", color: "var(--danger)", borderRadius: 5, cursor: "pointer", fontSize: 11 }}>✕</button>
              </div>
              <div style={{ color: "var(--text-muted)", fontSize: 12 }}>{expanded === cp.id ? "▲" : "▼"}</div>
            </div>

            {/* Expanded detail */}
            {expanded === cp.id && (
              <div style={{ borderTop: "1px solid var(--border)", padding: 16 }}>
                {!detail[cp.id] ? (
                  <div style={{ color: "var(--text-muted)", fontSize: 12 }}>Loading counterparty data…</div>
                ) : (
                  <CPDetail cp={cp} d={detail[cp.id]} />
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function CPDetail({ cp, d }) {
  const [view, setView] = React.useState("assets");
  const tabBtn = (t, l) => (
    <button onClick={() => setView(t)} style={{ padding: "5px 12px", border: "none", background: view === t ? "rgba(99,102,241,0.2)" : "transparent", color: view === t ? "var(--accent)" : "var(--text-muted)", borderRadius: 5, cursor: "pointer", fontSize: 11 }}>{l}</button>
  );

  const totalForecast = (d.forecast || []).reduce((s, r) => s + (r.forecast_kw || 0), 0);
  const peakForecast = Math.max(...(d.forecast || []).map(r => r.forecast_kw || 0), 0);

  return (
    <div>
      {/* Summary KPIs */}
      <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
        <KpiCard label="DER Assets" value={d.assets.length} sub="registered with counterparty" color="var(--accent)" icon="⚡" />
        <KpiCard label="Total Capacity" value={(d.assets.reduce((s, a) => s + (a.capacity_kw || 0), 0)).toFixed(0)} unit="kW" sub="nameplate" color="var(--cyan)" icon="☀️" />
        <KpiCard label="Daily Forecast" value={totalForecast.toFixed(0)} unit="kWh" sub={`Peak: ${peakForecast.toFixed(0)} kW`} color="var(--success)" icon="📈" />
        <KpiCard label="Auth Type" value={cp.auth_type?.replace("_", " ").toUpperCase()} sub={`Header: ${cp.api_key_header}`} color="var(--text-muted)" icon="🔑" />
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, marginBottom: 12, borderBottom: "1px solid var(--border)", paddingBottom: 0 }}>
        {tabBtn("assets", "Assets")}
        {tabBtn("telemetry", "Live Telemetry")}
        {tabBtn("forecast", "D+1 Forecast")}
        {tabBtn("baseline", "Baseline")}
      </div>

      {/* Assets */}
      {view === "assets" && (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr>{["Asset ID","Name","Type","Capacity","Feeder","DT","Status"].map(h => (
              <th key={h} style={{ padding: "5px 8px", textAlign: "left", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {d.assets.map(a => (
              <tr key={a.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 11, color: "var(--text-muted)" }}>{a.id}</td>
                <td style={{ padding: "6px 8px", color: "var(--text)" }}>{a.name}</td>
                <td style={{ padding: "6px 8px", color: "var(--text-muted)" }}>{a.type}</td>
                <td style={{ padding: "6px 8px", fontWeight: 600 }}>{a.capacity_kw} kW</td>
                <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 11 }}>{a.feeder_id}</td>
                <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 11 }}>{a.dt_id}</td>
                <td style={{ padding: "6px 8px" }}><span style={{ color: "var(--success)", fontWeight: 600 }}>● {a.status || "Active"}</span></td>
              </tr>
            ))}
            {d.assets.length === 0 && <tr><td colSpan={7} style={{ padding: 20, textAlign: "center", color: "var(--text-muted)" }}>No assets — click "Sync Assets" to pull from API</td></tr>}
          </tbody>
        </table>
      )}

      {/* Live Telemetry */}
      {view === "telemetry" && (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr>{["Asset ID","Current kW","Voltage V","CUF %","Status","Source ID"].map(h => (
              <th key={h} style={{ padding: "5px 8px", textAlign: "left", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {Object.entries(d.telMap).map(([id, t]) => (
              <tr key={id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 11, color: "var(--text-muted)" }}>{id}</td>
                <td style={{ padding: "6px 8px", fontWeight: 700, color: "var(--success)" }}>{t.current_kw} kW</td>
                <td style={{ padding: "6px 8px" }}>{t.voltage_v} V</td>
                <td style={{ padding: "6px 8px" }}>{t.cuf_pct}%</td>
                <td style={{ padding: "6px 8px", color: "var(--success)" }}>● {t.status}</td>
                <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 10, color: "var(--text-muted)" }}>{id}</td>
              </tr>
            ))}
            {Object.keys(d.telMap).length === 0 && <tr><td colSpan={6} style={{ padding: 20, textAlign: "center", color: "var(--text-muted)" }}>No telemetry data</td></tr>}
          </tbody>
        </table>
      )}

      {/* D+1 Forecast */}
      {view === "forecast" && (
        <div>
          <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10 }}>24-hour generation forecast from counterparty API (P10 / P50 / P90)</div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 80, marginBottom: 8 }}>
            {(d.forecast || []).map((r, i) => {
              const maxKw = Math.max(...(d.forecast || []).map(x => x.p90_kw || 0), 1);
              const h50 = Math.round((r.forecast_kw / maxKw) * 72);
              const h90 = Math.round((r.p90_kw / maxKw) * 72);
              return (
                <div key={i} title={`${r.hour_ist}:00 IST — P50: ${r.forecast_kw}kW P90: ${r.p90_kw}kW`}
                  style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: 80 }}>
                  <div style={{ width: "100%", background: "rgba(99,102,241,0.15)", height: h90, borderRadius: "2px 2px 0 0", position: "relative" }}>
                    <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "var(--accent)", height: h50, borderRadius: "2px 2px 0 0", opacity: 0.8 }} />
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--text-muted)" }}>
            <span>0:00</span><span>6:00 IST</span><span>12:00</span><span>18:00</span><span>24:00</span>
          </div>
          <div style={{ display: "flex", gap: 12, marginTop: 8, fontSize: 11, color: "var(--text-muted)" }}>
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 12, height: 10, background: "var(--accent)", borderRadius: 2, display: "inline-block" }} />P50 forecast</span>
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 12, height: 10, background: "rgba(99,102,241,0.3)", borderRadius: 2, display: "inline-block" }} />P90 band</span>
            <span style={{ marginLeft: "auto" }}>Daily total: {totalForecast.toFixed(0)} kWh · Peak: {peakForecast.toFixed(0)} kW</span>
          </div>
        </div>
      )}

      {/* Baseline */}
      {view === "baseline" && (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr>{["Asset","Nameplate kW","Expected kWh/day","CUF %","Peak Hour kW"].map(h => (
              <th key={h} style={{ padding: "5px 8px", textAlign: "left", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {(d.baseline || []).map(b => {
              const tel = d.telMap[b.id] || {};
              const actual = tel.current_kw ?? null;
              const expected = b.daily_expected_kwh || 0;
              const cuf = ((b.hourly_expected_kw || []).reduce((s, v) => s + v, 0) / ((b.nameplate_kw || 1) * 24) * 100).toFixed(1);
              const peak = Math.max(...(b.hourly_expected_kw || [0])).toFixed(1);
              return (
                <tr key={b.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                  <td style={{ padding: "6px 8px" }}>
                    <div style={{ fontSize: 12, color: "var(--text)" }}>{b.name || b.id}</div>
                    <div style={{ fontSize: 10, fontFamily: "monospace", color: "var(--text-muted)" }}>{b.id}</div>
                  </td>
                  <td style={{ padding: "6px 8px" }}>{b.nameplate_kw} kW</td>
                  <td style={{ padding: "6px 8px", fontWeight: 600 }}>
                    {expected.toFixed(1)} kWh
                    {actual !== null && <span style={{ fontSize: 10, color: actual > 0 ? "var(--success)" : "var(--text-muted)", marginLeft: 6 }}>Live: {actual} kW</span>}
                  </td>
                  <td style={{ padding: "6px 8px" }}>{cuf}%</td>
                  <td style={{ padding: "6px 8px" }}>{peak} kW</td>
                </tr>
              );
            })}
            {(d.baseline || []).length === 0 && <tr><td colSpan={5} style={{ padding: 20, textAlign: "center", color: "var(--text-muted)" }}>No baseline data</td></tr>}
          </tbody>
        </table>
      )}
    </div>
  );
}

function NetworkConfigTab() {
  const [cfg, setCfg] = React.useState(null);
  const [dts, setDts] = React.useState([]);
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [feederCfg, setFeederCfg] = React.useState({});

  React.useEffect(() => {
    Promise.all([
      apiFetch("/api/loadflow/config"),
      apiFetch("/api/loadflow/sandbox/init?feeder_id=LK1"),
    ]).then(([c, init]) => {
      setCfg(c);
      setDts(init.dts || []);
      const fc = c.feeders?.LK1 || {};
      setFeederCfg({
        conductor_type: fc.conductor_type || "ACSR_WEASEL_80",
        feeder_head_voltage_pu: fc.feeder_head_voltage_pu ?? 1.0,
        dt_transformer_z_pct: fc.dt_transformer_z_pct ?? 4.5,
        voltage_upper_pu: fc.voltage_upper_pu ?? 1.06,
        voltage_lower_pu: fc.voltage_lower_pu ?? 0.94,
        voltage_pre_alert_upper_pu: fc.voltage_pre_alert_upper_pu ?? 1.04,
        voltage_pre_alert_lower_pu: fc.voltage_pre_alert_lower_pu ?? 0.96,
        dt_kva_overrides: { ...(fc.dt_kva_overrides || {}) },
      });
    });
  }, []);

  const save = async () => {
    setSaving(true); setSaved(false);
    const body = {
      power_factor: cfg?.global?.power_factor,
      diversity_factor: cfg?.global?.diversity_factor,
      hc_green_pct: cfg?.global?.hc_green_pct,
      hc_amber_pct: cfg?.global?.hc_amber_pct,
      feeder: {
        feeder_id: "LK1",
        conductor_type: feederCfg.conductor_type,
        feeder_head_voltage_pu: parseFloat(feederCfg.feeder_head_voltage_pu),
        dt_transformer_z_pct: parseFloat(feederCfg.dt_transformer_z_pct),
        voltage_upper_pu: parseFloat(feederCfg.voltage_upper_pu),
        voltage_lower_pu: parseFloat(feederCfg.voltage_lower_pu),
        voltage_pre_alert_upper_pu: parseFloat(feederCfg.voltage_pre_alert_upper_pu),
        voltage_pre_alert_lower_pu: parseFloat(feederCfg.voltage_pre_alert_lower_pu),
        dt_kva_overrides: feederCfg.dt_kva_overrides,
      },
    };
    await apiFetch("/api/loadflow/config", { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  if (!cfg) return <div style={{ padding: 40, textAlign: "center", color: "var(--text-muted)" }}>Loading network config…</div>;

  const inp = { background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", padding: "6px 10px", fontSize: 12, width: "100%", boxSizing: "border-box" };
  const sel = { ...inp };
  const conductors = cfg.conductor_library || {};

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <div>
          <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>Load Flow Network Configuration — LK1</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
            All parameters that feed into the pandapower BFS model. Changes take effect on next load flow run.
          </div>
        </div>
        <button onClick={save} disabled={saving} style={{ padding: "8px 20px", background: saved ? "var(--success)" : "var(--accent)", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600, flexShrink: 0, marginLeft: 16 }}>
          {saving ? "Saving…" : saved ? "✓ Saved" : "Save Config"}
        </button>
      </div>

      {/* Feeder electrical params */}
      <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 10, padding: 16, marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 14 }}>Feeder Electrical Parameters</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14 }}>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Conductor Type</div>
            <select style={sel} value={feederCfg.conductor_type} onChange={e => setFeederCfg(p => ({ ...p, conductor_type: e.target.value }))}>
              {Object.entries(conductors).map(([k, v]) => <option key={k} value={k}>{v.label} ({v.r_ohm_per_km}Ω/km, {v.max_current_a}A)</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Head Voltage (pu) <span style={{ color: "rgba(255,255,255,0.3)" }}>slack bus</span></div>
            <input style={inp} type="number" step="0.01" min="0.9" max="1.1" value={feederCfg.feeder_head_voltage_pu} onChange={e => setFeederCfg(p => ({ ...p, feeder_head_voltage_pu: e.target.value }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>DT Transformer Impedance (%)</div>
            <input style={inp} type="number" step="0.1" min="1" max="10" value={feederCfg.dt_transformer_z_pct} onChange={e => setFeederCfg(p => ({ ...p, dt_transformer_z_pct: e.target.value }))} />
          </div>
        </div>
      </div>

      {/* Voltage limits */}
      <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 10, padding: 16, marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 14 }}>Voltage Limits (CEA Regulation)</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Upper Limit (pu)</div>
            <input style={inp} type="number" step="0.01" value={feederCfg.voltage_upper_pu} onChange={e => setFeederCfg(p => ({ ...p, voltage_upper_pu: e.target.value }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Lower Limit (pu)</div>
            <input style={inp} type="number" step="0.01" value={feederCfg.voltage_lower_pu} onChange={e => setFeederCfg(p => ({ ...p, voltage_lower_pu: e.target.value }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Pre-Alert Upper (pu)</div>
            <input style={inp} type="number" step="0.01" value={feederCfg.voltage_pre_alert_upper_pu} onChange={e => setFeederCfg(p => ({ ...p, voltage_pre_alert_upper_pu: e.target.value }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Pre-Alert Lower (pu)</div>
            <input style={inp} type="number" step="0.01" value={feederCfg.voltage_pre_alert_lower_pu} onChange={e => setFeederCfg(p => ({ ...p, voltage_pre_alert_lower_pu: e.target.value }))} />
          </div>
        </div>
      </div>

      {/* Global HC params */}
      <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 10, padding: 16, marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 14 }}>Hosting Capacity Parameters</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Power Factor</div>
            <input style={inp} type="number" step="0.01" min="0.7" max="1.0" value={cfg.global?.power_factor ?? 0.95}
              onChange={e => setCfg(p => ({ ...p, global: { ...p.global, power_factor: parseFloat(e.target.value) } }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>Diversity Factor</div>
            <input style={inp} type="number" step="0.05" min="0.5" max="1.0" value={cfg.global?.diversity_factor ?? 0.80}
              onChange={e => setCfg(p => ({ ...p, global: { ...p.global, diversity_factor: parseFloat(e.target.value) } }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>HC Green Threshold (%)</div>
            <input style={inp} type="number" step="5" min="20" max="100" value={cfg.global?.hc_green_pct ?? 60}
              onChange={e => setCfg(p => ({ ...p, global: { ...p.global, hc_green_pct: parseFloat(e.target.value) } }))} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>HC Amber Threshold (%)</div>
            <input style={inp} type="number" step="5" min="20" max="100" value={cfg.global?.hc_amber_pct ?? 85}
              onChange={e => setCfg(p => ({ ...p, global: { ...p.global, hc_amber_pct: parseFloat(e.target.value) } }))} />
          </div>
        </div>
      </div>

      {/* Per-DT kVA overrides */}
      <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 10, padding: 16 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>Per-DT Transformer kVA Overrides</div>
        <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 12 }}>
          Override the default rated kVA for individual transformers. Used by load flow and hosting capacity calculations.
          Leave blank to use nameplate value.
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr>
              {["DT Name", "DT ID", "Default kVA", "Override kVA"].map(h => (
                <th key={h} style={{ padding: "5px 8px", textAlign: "left", fontWeight: 500, fontSize: 11, color: "var(--text-muted)", borderBottom: "1px solid var(--border)" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {dts.map(dt => (
              <tr key={dt.dt_id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                <td style={{ padding: "6px 8px", color: "var(--text)" }}>{dt.dt_name || dt.dt_id}</td>
                <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 11, color: "var(--text-muted)" }}>{dt.dt_id}</td>
                <td style={{ padding: "6px 8px", color: "var(--text-muted)" }}>{dt.rated_kva} kVA</td>
                <td style={{ padding: "6px 8px" }}>
                  <input
                    style={{ background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", padding: "4px 8px", fontSize: 12, width: 90 }}
                    type="number" step="25" min="0" placeholder={dt.rated_kva}
                    value={feederCfg.dt_kva_overrides[dt.dt_id] || ""}
                    onChange={e => {
                      const v = e.target.value;
                      setFeederCfg(p => ({
                        ...p,
                        dt_kva_overrides: v ? { ...p.dt_kva_overrides, [dt.dt_id]: parseFloat(v) }
                          : Object.fromEntries(Object.entries(p.dt_kva_overrides).filter(([k]) => k !== dt.dt_id))
                      }));
                    }}
                  />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Manual DER Registration (used in DER Fleet screen) ─────────────────────

function RegisterDERModal({ onClose, onDone }) {
  const [dts, setDts] = React.useState([]);
  const [form, setForm] = React.useState({
    feeder_id: "LK1", dt_id: "", der_type: "Solar PV", nameplate_kw: "",
    location_name: "", consumer_id: "", meter_id: "", commission_date: "",
    metering_type: "NET", notes: "",
  });
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState("");

  React.useEffect(() => {
    apiFetch("/api/loadflow/sandbox/init?feeder_id=LK1").then(d => setDts(d.dts || []));
  }, []);

  const inp = { background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", padding: "7px 10px", fontSize: 12, width: "100%", boxSizing: "border-box" };

  const submit = async () => {
    setErr("");
    if (!form.dt_id || !form.nameplate_kw) { setErr("DT and Nameplate kW are required"); return; }
    setSaving(true);
    const r = await apiFetch("/api/ders/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ...form, nameplate_kw: parseFloat(form.nameplate_kw) }) });
    setSaving(false);
    if (r.der_id) { onDone(r.der_id); onClose(); }
    else setErr(r.detail || "Registration failed");
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
      <div style={{ background: "var(--bg-panel)", border: "1px solid var(--border)", borderRadius: 12, padding: 24, width: 540, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>Register DER Manually</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--text-muted)", cursor: "pointer", fontSize: 18 }}>✕</button>
        </div>
        <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 16 }}>
          Add a DER asset manually when MDMS data is not yet available. Performance data can be updated later via MDMS API or counterparty sync.
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>

}

function DTScheduleView({ dtId }) {
  const [schedule, setSchedule] = React.useState(null);
  React.useEffect(() => {
    fetch(`/api/oe/${dtId}/schedule`).then(r=>r.json()).then(d => setSchedule(d.blocks || [])).catch(()=>{});
  }, [dtId]);

  if (!schedule) return <div style={{ color: "var(--text-muted)", padding: 20, textAlign: "center" }}>Loading schedule…</div>;

  const chartData = schedule.map(b => ({
    label: b.time,
    oe_total: (b.ders || []).reduce((s, d) => s + d.oe_kw, 0),
    forecast: b.forecast_gen_kw || 0,
    load: b.consumer_load_kw || 0,
  }));

  return (
    <div>
      <div style={{ fontSize: 12, color: "var(--accent)", fontWeight: 600, marginBottom: 8 }}>{dtId} — 48-block OE Schedule</div>
      <SvgLineChart
        data={chartData}
        lines={[
          { key: "oe_total", label: "Total OE (kW)", color: "#10B981", dash: "5 3" },
          { key: "forecast", label: "Gen Forecast (kW)", color: "#FCD34D" },
          { key: "load", label: "Consumer Load (kW)", color: "#60A5FA", dash: "3 3" },
        ]}
        height={200}
      />
      <div style={{ marginTop: 10, fontSize: 11, color: "var(--text-muted)" }}>
        RPF forecast blocks: {schedule.filter(b => b.rpf_forecast).length} of 48
      </div>
    </div>
  );
}

// ── Load Flow Sandbox ─────────────────────────────────────────────────────────
function SandboxTab() {
  const [conductors, setConductors] = React.useState({});
  const [ders, setDers] = React.useState([]);
  const [dtList, setDtList] = React.useState([]);
  const [headVoltage, setHeadVoltage] = React.useState("1.03");
  const [conductorType, setConductorType] = React.useState("ACSR_WEASEL_80");
  const [dtLoads, setDtLoads] = React.useState({});
  const [derGens, setDerGens] = React.useState({});
  const [result, setResult] = React.useState(null);
  const [running, setRunning] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [loaded, setLoaded] = React.useState(false);
  const [loadError, setLoadError] = React.useState(false);

  const loadInit = () => {
    setLoadError(false);
    fetch("/api/loadflow/sandbox/init?feeder_id=LK1")
      .then(r => r.json())
      .then(data => {
        setConductors(data.conductors || {});
        const dts = data.dts || [];
        setDtList(dts);
        const dl = {};
        dts.forEach(dt => { dl[dt.dt_id] = String((dt.total_load_kw || 0).toFixed(1)); });
        setDtLoads(dl);
        const apiDers = data.ders || [];
        setDers(apiDers);
        const dg = {};
        apiDers.forEach(d => { dg[d.der_id] = String((d.current_kw || 0).toFixed(1)); });
        setDerGens(dg);
        setLoaded(true);
      })
      .catch(() => { setLoadError(true); setLoaded(true); });
  };

  React.useEffect(() => { loadInit(); }, []);

  const runSandbox = () => {
    setRunning(true); setError(null); setResult(null);
    const payload = {
      feeder_id: "LK1",
      feeder_head_voltage_pu: parseFloat(headVoltage) || 1.03,
      conductor_type: conductorType,
      dt_loads: Object.fromEntries(
        Object.entries(dtLoads).filter(([, v]) => v !== "").map(([k, v]) => [k, parseFloat(v) || 0])
      ),
      der_gens: Object.fromEntries(
        Object.entries(derGens).filter(([, v]) => v !== "").map(([k, v]) => [k, parseFloat(v) || 0])
      ),
      dt_kva_overrides: {},
    };
    fetch("/api/loadflow/sandbox", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    }).then(r => r.json()).then(data => {
      if (data.status === "failed" || data.detail) {
        setError(data.error || data.detail || "Unknown error");
      } else {
        setResult(data);
      }
      setRunning(false);
    }).catch(e => { setError(String(e)); setRunning(false); });
  };

  const inp = { background: "rgba(255,255,255,0.06)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", padding: "3px 6px", width: 80, fontSize: 12 };
  const sel = { ...inp, width: "auto" };

  if (!loaded) return (
    <div style={{ padding: 40, textAlign: "center" }}>
      <div style={{ color: "var(--text-muted)", marginBottom: 8 }}>Loading Lanka Feeder (LK1) data…</div>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>Fetching DTs, DERs and conductor library</div>
    </div>
  );

  if (loadError) return (
    <div style={{ padding: 40, textAlign: "center" }}>
      <div style={{ color: "#EF4444", marginBottom: 12 }}>Failed to load init data from server.</div>
      <button onClick={loadInit} style={{ padding: "8px 20px", background: "var(--accent)", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13 }}>
        Retry
      </button>
